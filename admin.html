<!DOCTYPE html>
<html lang="kk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Smart Mercury Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPrimary: '#f59e0b',
                        brandSecondary: '#38bdf8',
                        bgDeep: '#0f172a',
                        bgSurface: '#1e293b',
                        textMain: '#f8fafc',
                        textMuted: '#94a3b8',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .sidebar-item-active {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border-right: 4px solid #f59e0b;
        }
        .dashboard-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .dashboard-card:hover {
            border-color: rgba(245, 158, 11, 0.2);
            transform: translateY(-2px);
        }
        .nav-link { transition: all 0.2s ease; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); }
        .hide { display: none; }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-80 bg-bgSurface border-r border-white/5 hidden lg:flex flex-col relative z-20">
            <div class="p-8 border-b border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-brandPrimary flex items-center justify-center text-bgDeep shadow-lg">
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-8.4 8.4M12 6c3.3 0 6 2.7 6 6s-2.7 6-6 6"/></svg>
                    </div>
                    <div>
                        <span class="font-display font-bold text-lg block tracking-tight">Smart Mercury</span>
                        <span class="text-[10px] text-brandPrimary font-black uppercase tracking-widest">Enterprise Suite</span>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <p class="px-4 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-textMuted">Негізгі</p>
                <button onclick="switchTab('overview')" id="nav-overview" class="sidebar-item-active nav-link w-full text-left px-5 py-3.5 rounded-xl font-bold flex items-center gap-4">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 4h4"/></svg>
                    Шолу
                </button>
                <button onclick="switchTab('analytics')" id="nav-analytics" class="nav-link w-full text-left px-5 py-3.5 rounded-xl font-bold flex items-center gap-4 text-textMuted">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    Аналитика
                </button>
                <p class="px-4 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-textMuted">Басқару</p>
                <button onclick="switchTab('pricing')" id="nav-pricing" class="nav-link w-full text-left px-5 py-3.5 rounded-xl font-bold flex items-center gap-4 text-textMuted">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Бағаларды реттеу
                </button>
                <button onclick="switchTab('logistics')" id="nav-logistics" class="nav-link w-full text-left px-5 py-3.5 rounded-xl font-bold flex items-center gap-4 text-textMuted">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1m-4 0h5"/></svg>
                    Логистика
                </button>
                <button onclick="switchTab('users')" id="nav-users" class="nav-link w-full text-left px-5 py-3.5 rounded-xl font-bold flex items-center gap-4 text-textMuted">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 10a3 3 0 11-6 0 3 3 0 016 0zM15 20H9a6 6 0 016-6v-2a6 6 0 00-6 6h6z"/></svg>
                    Клиенттер
                </button>
                <p class="px-4 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-textMuted">Жүйе</p>
                <button onclick="switchTab('audit')" id="nav-audit" class="nav-link w-full text-left px-5 py-3.5 rounded-xl font-bold flex items-center gap-4 text-textMuted">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Аудит журналы
                </button>
            </nav>

            <div class="p-6 border-t border-white/5">
                <a href="index.html" class="w-full flex items-center gap-3 text-textMuted hover:text-red-500 px-5 py-3 rounded-xl text-sm font-bold transition-all">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Шығу
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto flex flex-col">
            <!-- Header -->
            <header class="h-24 bg-bgDeep border-b border-white/5 flex items-center justify-between px-10 sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <h1 id="tab-title" class="font-display text-2xl font-black text-white tracking-tight">Басқару панелі</h1>
                </div>
                <div class="flex items-center gap-6">
                    <div class="bg-white/5 border border-white/10 px-4 py-2 rounded-2xl flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        <span class="text-xs font-bold text-textMuted">Жүйе статусы: Белсенді</span>
                    </div>
                    <div class="w-px h-10 bg-white/5"></div>
                    <div class="flex items-center gap-4">
                        <div class="text-right hidden sm:block">
                            <span class="block text-sm font-bold text-white">Admin User</span>
                            <span class="block text-[10px] text-brandPrimary font-black uppercase">Басқарушы</span>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-brandPrimary text-bgDeep flex items-center justify-center font-black shadow-lg">A</div>
                    </div>
                </div>
            </header>

            <!-- Scrollable Content -->
            <div class="p-10">
                <!-- Overview Tab -->
                <section id="section-overview" class="space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <div class="dashboard-card p-8 rounded-[32px]">
                            <div class="w-12 h-12 rounded-2xl bg-amber-500/10 text-brandPrimary flex items-center justify-center mb-6"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                            <span class="text-[10px] font-black text-textMuted uppercase tracking-widest block mb-1">Жылдық айналым</span>
                            <span class="text-3xl font-black block">₸ 24.5М</span>
                            <span class="text-xs font-bold text-green-500 mt-2 block">+12.4%</span>
                        </div>
                        <div class="dashboard-card p-8 rounded-[32px]">
                            <div class="w-12 h-12 rounded-2xl bg-sky-500/10 text-brandSecondary flex items-center justify-center mb-6"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M17 20h5v-2a3 3 0 00-5.856-1.487M15 10a3 3 0 11-6 0 3 3 0 016 0zM15 20H9a6 6 0 016-6v-2a6 6 0 00-6 6h6z"/></svg></div>
                            <span class="text-[10px] font-black text-textMuted uppercase tracking-widest block mb-1">Активті клиенттер</span>
                            <span class="text-3xl font-black block">854</span>
                            <span class="text-xs font-bold text-green-500 mt-2 block">+24 жаңа</span>
                        </div>
                        <div class="dashboard-card p-8 rounded-[32px]">
                            <div class="w-12 h-12 rounded-2xl bg-purple-500/10 text-purple-400 flex items-center justify-center mb-6"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1m-4 0h5"/></svg></div>
                            <span class="text-[10px] font-black text-textMuted uppercase tracking-widest block mb-1">Орындаудағы тапсырыс</span>
                            <span class="text-3xl font-black block">42</span>
                            <span class="text-xs font-bold text-brandPrimary mt-2 block">12 шұғыл</span>
                        </div>
                        <div class="dashboard-card p-8 rounded-[32px]">
                            <div class="w-12 h-12 rounded-2xl bg-green-500/10 text-green-400 flex items-center justify-center mb-6"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                            <span class="text-[10px] font-black text-textMuted uppercase tracking-widest block mb-1">Жүйелік қауіпсіздік</span>
                            <span class="text-3xl font-black block">100%</span>
                            <span class="text-xs font-bold text-green-500 mt-2 block">Оңтайлы</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="dashboard-card p-10 rounded-[40px]">
                            <h3 class="font-display font-bold text-xl mb-8">Сатылым динамикасы</h3>
                            <div class="h-[350px]"><canvas id="mainChart"></canvas></div>
                        </div>
                        <div class="dashboard-card p-10 rounded-[40px]">
                            <h3 class="font-display font-bold text-xl mb-8">Отын түрлерінің үлесі</h3>
                            <div class="h-[350px] flex items-center justify-center"><canvas id="pieChart"></canvas></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('section[id^="section-"]').forEach(s => s.classList.add('hide'));
            const section = document.getElementById(`section-${tabId}`);
            if (section) section.classList.remove('hide');

            document.querySelectorAll('.sidebar-item-active').forEach(i => {
                i.classList.remove('sidebar-item-active');
                i.classList.add('text-textMuted');
            });

            const activeNav = document.getElementById(`nav-${tabId}`);
            if (activeNav) {
                activeNav.classList.add('sidebar-item-active');
                activeNav.classList.remove('text-textMuted');
            }

            const titles = { overview: 'Шолу', analytics: 'Аналитика', pricing: 'Бағаларды реттеу', logistics: 'Логистика бақылауы', users: 'Клиенттер базасы', audit: 'Аудит журналы' };
            document.getElementById('tab-title').textContent = titles[tabId] || 'Басқару панелі';
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Main Chart
            const ctxMain = document.getElementById('mainChart').getContext('2d');
            new Chart(ctxMain, {
                type: 'line',
                data: {
                    labels: ['Қаң', 'Ақп', 'Нау', 'Сәу', 'Мам', 'Мау'],
                    datasets: [{
                        label: 'Сатылым (Млн ₸)',
                        data: [15, 22, 18, 30, 26, 35],
                        borderColor: '#f59e0b',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(245, 158, 11, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });

            // Pie Chart
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: ['АИ-95', 'ДТ', 'JET A-1', 'АИ-92'],
                    datasets: [{
                        data: [40, 25, 20, 15],
                        backgroundColor: ['#f59e0b', '#10b981', '#38bdf8', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', font: { weight: 'bold' } }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
