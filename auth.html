<!DOCTYPE html>
<html lang="kk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | Smart Mercury Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPrimary: '#f59e0b',  /* Amber 500 */
                        brandSecondary: '#38bdf8',/* Sky 400 */
                        bgDeep: '#0f172a',        /* Slate 950 */
                        bgSurface: '#1e293b',     /* Slate 800 */
                        textMain: '#f8fafc',
                        textMuted: '#94a3b8',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .auth-glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-style {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            transition: all 0.3s ease;
        }
        .input-style:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
            outline: none;
        }
        .form-container { transition: opacity 0.4s ease, transform 0.4s ease; }
        .hidden-form { opacity: 0; pointer-events: none; position: absolute; transform: translateY(10px); }
        .visible-form { opacity: 1; pointer-events: auto; position: relative; transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-amber-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-sky-500/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-[1100px] grid grid-cols-1 lg:grid-cols-2 auth-glass rounded-[50px] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.4)] overflow-hidden relative z-10">

        <!-- Side Branding -->
        <div class="hidden lg:flex flex-col justify-between p-16 bg-gradient-to-br from-bgSurface to-bgDeep text-white relative border-r border-white/5">
            <div class="relative z-10">
                <a href="index.html" class="flex items-center gap-3 mb-20 group">
                    <div class="w-12 h-12 rounded-2xl bg-brandPrimary flex items-center justify-center text-bgDeep shadow-xl group-hover:scale-110 transition-transform">
                        <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-8.4 8.4M12 6c3.3 0 6 2.7 6 6s-2.7 6-6 6"/></svg>
                    </div>
                    <span class="font-display font-bold text-2xl tracking-tight">Smart Mercury</span>
                </a>
                <h2 class="font-display text-5xl font-extrabold leading-[1.1] mb-8">Интеллектуалды <br><span class="text-brandPrimary">энергия</span></h2>
                <p class="text-textMuted text-lg leading-relaxed">Біздің экожүйеге қосылып, бизнесіңізді жаңа деңгейге көтеріңіз.</p>
            </div>

            <div class="relative z-10 flex items-center gap-6">
                <div class="flex -space-x-2">
                    <div class="w-10 h-10 rounded-full border-2 border-bgSurface bg-amber-500/20"></div>
                    <div class="w-10 h-10 rounded-full border-2 border-bgSurface bg-amber-500/20"></div>
                    <div class="w-10 h-10 rounded-full border-2 border-bgSurface bg-amber-500/20"></div>
                </div>
                <span class="text-xs font-bold uppercase tracking-widest text-textMuted">850+ активті компания</span>
            </div>
        </div>

        <!-- Form Area -->
        <div class="p-10 lg:p-20 bg-bgSurface/40 relative">

            <!-- Tab Switcher -->
            <div class="flex bg-black/20 p-1.5 rounded-2xl border border-white/5 mb-12 w-fit">
                <button onclick="toggleForm('login')" id="btn-login" class="px-10 py-3 rounded-xl text-sm font-bold transition-all bg-brandPrimary text-bgDeep shadow-sm">Кіру</button>
                <button onclick="toggleForm('register')" id="btn-register" class="px-10 py-3 rounded-xl text-sm font-bold transition-all text-textMuted hover:text-brandPrimary">Тіркелу</button>
            </div>

            <!-- Login Form -->
            <div id="form-login" class="visible-form form-container">
                <h3 class="font-display text-3xl font-extrabold text-white mb-2">Қош келдіңіз</h3>
                <p class="text-textMuted text-sm mb-10">Жүйеге кіру үшін деректерді енгізіңіз</p>

                <form class="space-y-6" onsubmit="handleAuth(event, 'login')">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-textMuted">Email мекенжайы</label>
                        <input type="email" required placeholder="admin@sme.kz" class="w-full input-style rounded-2xl px-6 py-4.5 text-sm font-semibold">
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black uppercase tracking-widest text-textMuted">Құпиясөз</label>
                            <button type="button" class="text-[10px] font-black uppercase tracking-widest text-brandPrimary">Ұмыттыңыз ба?</button>
                        </div>
                        <input type="password" required placeholder="••••••••" class="w-full input-style rounded-2xl px-6 py-4.5 text-sm font-semibold">
                    </div>
                    <button type="submit" class="w-full bg-brandPrimary hover:bg-amber-600 text-bgDeep py-5 rounded-[24px] font-bold shadow-xl shadow-amber-900/20 transition-all hover:scale-[1.02] active:scale-100">
                        Кіру
                    </button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="form-register" class="hidden-form form-container">
                <h3 class="font-display text-3xl font-extrabold text-white mb-2">Тіркелу</h3>
                <p class="text-textMuted text-sm mb-8">Бизнес-серіктес ретінде тіркелуге өтінім</p>

                <form class="space-y-4" onsubmit="handleAuth(event, 'register')">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[9px] font-black uppercase tracking-widest text-textMuted">Компания аты</label>
                            <input type="text" required placeholder='ЖШС "Mercury"' class="w-full input-style rounded-xl px-5 py-3.5 text-sm font-semibold">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[9px] font-black uppercase tracking-widest text-textMuted">БИН</label>
                            <input type="text" required placeholder="123456789012" class="w-full input-style rounded-xl px-5 py-3.5 text-sm font-semibold">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[9px] font-black uppercase tracking-widest text-textMuted">Байланыс телефоны</label>
                        <input type="tel" required placeholder="+7 (777) 000-00-00" class="w-full input-style rounded-xl px-5 py-3.5 text-sm font-semibold">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[9px] font-black uppercase tracking-widest text-textMuted">Корпоративтік Email</label>
                        <input type="email" required placeholder="info@company.kz" class="w-full input-style rounded-xl px-5 py-3.5 text-sm font-semibold">
                    </div>
                    <button type="submit" class="w-full bg-brandPrimary hover:bg-amber-600 text-bgDeep py-5 rounded-[24px] font-bold shadow-xl shadow-amber-900/20 transition-all mt-4">
                        Өтінімді жіберу
                    </button>
                </form>
            </div>

            <!-- Loading State -->
            <div id="state-loading" class="hidden-form absolute inset-0 bg-bgDeep/80 backdrop-blur-sm z-50 flex items-center justify-center">
                <div class="text-center">
                    <div class="w-12 h-12 border-4 border-white/10 border-t-brandPrimary rounded-full animate-spin mx-auto mb-4"></div>
                    <span class="text-xs font-black uppercase tracking-widest text-textMuted">Өңделуде...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleForm(type) {
            const isLogin = type === 'login';

            document.getElementById('form-login').className = isLogin ? 'visible-form form-container' : 'hidden-form form-container';
            document.getElementById('form-register').className = !isLogin ? 'visible-form form-container' : 'hidden-form form-container';

            document.getElementById('btn-login').className = isLogin
                ? 'px-10 py-3 rounded-xl text-sm font-bold transition-all bg-brandPrimary text-bgDeep shadow-sm'
                : 'px-10 py-3 rounded-xl text-sm font-bold transition-all text-textMuted hover:text-brandPrimary';

            document.getElementById('btn-register').className = !isLogin
                ? 'px-10 py-3 rounded-xl text-sm font-bold transition-all bg-brandPrimary text-bgDeep shadow-sm'
                : 'px-10 py-3 rounded-xl text-sm font-bold transition-all text-textMuted hover:text-brandPrimary';
        }

        function handleAuth(e, type) {
            e.preventDefault();
            document.getElementById('state-loading').classList.remove('hidden-form');
            document.getElementById('state-loading').classList.add('flex');

            setTimeout(() => {
                if(type === 'login') {
                    window.location.href = 'cabinet.html';
                } else {
                    alert('Сіздің тіркелу туралы өтініміңіз қабылданды. Жақын арада менеджер хабарласады.');
                    location.reload();
                }
            }, 1500);
        }
    </script>
</body>
</html>
