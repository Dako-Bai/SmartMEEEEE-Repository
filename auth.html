<!DOCTYPE html>
<html lang="kk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Smart Mercury Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primaryBlue: '#0ea5e9',
                        accentYellow: '#f59e0b',
                        lightBg: '#f8fafc',
                        textDark: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .auth-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
        .input-field {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            background: white;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
            outline: none;
        }
        .hidden-form { display: none; opacity: 0; }
        .visible-form { display: block; opacity: 1; animation: fadeIn 0.4s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">

    <div class="w-full max-w-[1000px] grid grid-cols-1 lg:grid-cols-2 auth-card rounded-[40px] overflow-hidden">

        <!-- Left: Branding -->
        <div class="hidden lg:flex flex-col justify-between p-12 bg-sky-600 text-white relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10">
                <svg class="w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0 100 C 20 0 50 0 100 100 Z" fill="white"/></svg>
            </div>

            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-12">
                    <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center shadow-lg">
                        <svg class="w-7 h-7 text-sky-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-8.4 8.4M12 6c3.3 0 6 2.7 6 6s-2.7 6-6 6"/></svg>
                    </div>
                    <span class="font-black text-xl tracking-tight">Smart Mercury</span>
                </div>
                <h1 class="text-5xl font-black leading-tight mb-6">Энергияның <br>жаңа сапасы</h1>
                <p class="text-sky-100 text-lg leading-relaxed">Корпоративтік клиенттерге арналған кешенді шешімдер мен бақылау жүйесі.</p>
            </div>

            <div class="relative z-10 space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>
                    <span class="text-sm font-bold">Argus Live интеграциясы</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>
                    <span class="text-sm font-bold">24/7 техникалық қолдау</span>
                </div>
            </div>
        </div>

        <!-- Right: Forms -->
        <div class="p-8 lg:p-16 flex flex-col justify-center bg-white">
            <div class="flex bg-slate-100 p-1 rounded-2xl border border-slate-200 mb-10 w-fit mx-auto lg:mx-0">
                <button id="toggle-login" onclick="showForm('login')" class="px-8 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-sky-600 shadow-sm">Кіру</button>
                <button id="toggle-register" onclick="showForm('register')" class="px-8 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-sky-600">Тіркелу</button>
            </div>

            <!-- Login -->
            <div id="login-form" class="visible-form">
                <h2 class="text-3xl font-black mb-2 text-slate-900">Қош келдіңіз</h2>
                <p class="text-slate-500 mb-8 text-sm">Жүйеге кіру үшін деректеріңізді енгізіңіз</p>
                <form class="space-y-5" onsubmit="handleAuth(event, 'login')">
                    <div>
                        <label class="block text-[10px] uppercase font-black text-slate-400 tracking-widest mb-2">Email</label>
                        <input type="email" placeholder="admin@sme.kz" required class="w-full input-field rounded-2xl px-5 py-4 text-sm text-slate-900">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-black text-slate-400 tracking-widest mb-2">Құпиясөз</label>
                        <input type="password" placeholder="••••••••" required class="w-full input-field rounded-2xl px-5 py-4 text-sm text-slate-900">
                    </div>
                    <button type="submit" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-sky-100">Кіру</button>
                </form>
            </div>

            <!-- Register -->
            <div id="register-form" class="hidden-form">
                <h2 class="text-3xl font-black mb-2 text-slate-900">Серіктес болу</h2>
                <p class="text-slate-500 mb-8 text-sm">Тіркелуге өтінім қалдырыңыз</p>
                <form class="space-y-4" onsubmit="handleAuth(event, 'register')">
                    <input type="text" placeholder='ЖШС "Компания"' required class="w-full input-field rounded-xl px-4 py-3 text-sm">
                    <input type="text" placeholder="БИН" required class="w-full input-field rounded-xl px-4 py-3 text-sm">
                    <input type="email" placeholder="Email" required class="w-full input-field rounded-xl px-4 py-3 text-sm">
                    <button type="submit" class="w-full bg-accentYellow hover:bg-amber-600 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-amber-100 mt-4">Өтінім беру</button>
                </form>
            </div>

            <!-- Success -->
            <div id="success-state" class="hidden-form text-center py-10">
                <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center text-green-600 mx-auto mb-6">
                    <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h2 id="success-title" class="text-2xl font-black mb-2">Сәтті!</h2>
                <p id="success-msg" class="text-slate-500 text-sm">Күте тұрыңыз...</p>
            </div>
        </div>
    </div>

    <script>
        function showForm(formId) {
            ['login', 'register', 'success'].forEach(f => {
                const el = document.getElementById(`${f}-form`) || document.getElementById(`${f}-state`);
                el.classList.add('hidden-form'); el.classList.remove('visible-form');
            });
            const active = document.getElementById(`${formId}-form`) || document.getElementById(`${formId}-state`);
            active.classList.remove('hidden-form'); active.classList.add('visible-form');

            if (formId !== 'success') {
                document.getElementById('toggle-login').className = formId === 'login' ? 'px-8 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-sky-600 shadow-sm' : 'px-8 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-sky-600';
                document.getElementById('toggle-register').className = formId === 'register' ? 'px-8 py-2.5 rounded-xl text-sm font-bold transition-all bg-white text-sky-600 shadow-sm' : 'px-8 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-sky-600';
            }
        }

        function handleAuth(e, type) {
            e.preventDefault();
            const title = document.getElementById('success-title');
            const msg = document.getElementById('success-msg');
            if (type === 'login') {
                title.textContent = 'Қош келдіңіз!'; msg.textContent = 'Басқару панеліне өтіп жатырсыз...';
                showForm('success'); setTimeout(() => window.location.href = 'admin.html', 1500);
            } else {
                title.textContent = 'Өтінім қабылданды'; msg.textContent = 'Менеджер сізбен хабарласады.';
                showForm('success'); setTimeout(() => showForm('login'), 3000);
            }
        }
    </script>
</body>
</html>
