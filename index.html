  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind Configuration -->

    window.tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],

            cosmic: {
              deep: '#0b1329',
              slate: '#121f3d',
              gold: '#fbbf24',

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background-color: #0b1329;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(18, 31, 61, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .barrel {
        position: relative;
        width: 100%;
        height: 100%;
        background: #0f172a;
        border-radius: 10% / 50%;
        overflow: hidden;
        border: 2px solid rgba(255,255,255,0.1);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .barrel-fill {
        position: absolute;
        bottom: 0;
        width: 100%;
        transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>

    const AppContext = createContext();

    function AppProvider({ children }) {
      const [state, setState] = useState(() => {
        const saved = localStorage.getItem('sme_master_state_v2');
        return saved ? JSON.parse(saved) : {
          user: null,
          language: 'KZ',
          currentPath: '/home',
          banner: {
            url: "https://images.unsplash.com/photo-1542060748-10c28b629f6f?auto=format&fit=crop&q=80&w=1200",
            title: { KZ: "Smart Mercury Energy - Басқару Хабы", RU: "Smart Mercury Energy - Хаб Управления", EN: "Smart Mercury Energy - Management Hub" },
            desc: { KZ: "Мұнай өнімдері мен авиаотынды басқарудың кешенді жүйесі.", RU: "Комплексная система управления нефтепродуктами и авиатопливом.", EN: "Integrated petroleum and aviation fuel management system." }
          },
          spotPrices: [
            { id: 1, name: "АИ-92", standard: "EURO-5", price: 245, trend: 1.5, status: "up" },
            { id: 2, name: "АИ-95", standard: "EURO-5", price: 285, trend: 0.8, status: "up" },
            { id: 3, name: "ТС-1", standard: "JIG-2", price: 410, trend: -0.4, status: "down" },
            { id: 4, name: "JET A-1", standard: "JIG-2", price: 425, trend: 2.1, status: "up" },
          ],
          regionalRates: [
            { id: 1, region: "Алматы", fuel: "АИ-95", price: 275000, cat: "auto" },
            { id: 2, region: "Астана", fuel: "ДТ (Лето)", price: 295000, cat: "auto" },
            { id: 3, region: "Шымкент", fuel: "JET A-1", price: 380000, cat: "avia" },
            { id: 4, region: "Атырау", fuel: "ТС-1", price: 375000, cat: "avia" },
          ],
          reservoirs: Array.from({ length: 13 }, (_, i) => ({
            id: i + 1,
            name: `RES-${String(i + 1).padStart(2, '0')}`,
            volume: 40 + Math.floor(Math.random() * 50),
            water: 1.2 + Math.random(),
            temp: 14 + Math.floor(Math.random() * 8),
            fuelType: i < 5 ? "Авиаотын" : i < 9 ? "Керосин" : "Автоотын"
          })),
          stations: [
            { id: 1, code: "ALA-04", volume: 12000, limit: 20000 },
            { id: 2, code: "AST-12", volume: 8500, limit: 15000 },
            { id: 3, code: "SHY-02", volume: 14000, limit: 20000 },
          ],
          users: [
            { id: 1, name: "Arman Admin", email: "admin@sme.kz", role: "Admin" },
            { id: 2, name: "Public User", email: "user@sme.kz", role: "User" }
          ],
          directors: [
            { id: 1, name: "Ерсұлтан Ахметов", role: "CEO", img: "https://i.pravatar.cc/150?u=ersultan" },
            { id: 2, name: "Марат Сәдібеков", role: "COO", img: "https://i.pravatar.cc/150?u=marat" },
          ],
          auditLogs: []
        };
      });

      useEffect(() => {
        localStorage.setItem('sme_master_state_v2', JSON.stringify(state));
      }, [state]);

      useEffect(() => {
        const handleHash = () => setState(s => ({ ...s, currentPath: window.location.hash.replace('#', '') || '/home' }));
        window.addEventListener('hashchange', handleHash);
        handleHash();
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const t = (key) => dictionary[state.language][key] || key;

      const log = (action) => {
        const newLog = { id: Date.now(), user: state.user?.name || "System", action, time: new Date().toLocaleTimeString() };
        setState(s => ({ ...s, auditLogs: [newLog, ...s.auditLogs].slice(0, 50) }));
      };

      return <AppContext.Provider value={{ state, setState, t, log }}>{children}</AppContext.Provider>;
    }

    const HomeView = () => {
      const { state, t } = useContext(AppContext);
      const [calc, setCalc] = useState({ id: state.regionalRates[0].id, vol: 1000 });
      const rate = state.regionalRates.find(r => r.id == calc.id);
      const total = (rate?.price || 0) * (calc.vol / 1000);

      return (
        <div className="fade-in space-y-16">
          <div className="relative h-[500px] rounded-[40px] overflow-hidden group shadow-2xl">
            <img src={state.banner.url} className="w-full h-full object-cover opacity-60 transition-transform duration-1000 group-hover:scale-105" />
            <div className="absolute inset-0 bg-gradient-to-t from-[#0b1329] via-transparent to-transparent flex flex-col justify-center px-12">
              <h1 className="text-6xl font-black mb-6 max-w-4xl leading-tight text-white">{state.banner.title[state.language]}</h1>
              <p className="text-xl text-slate-300 max-w-2xl font-medium">{state.banner.desc[state.language]}</p>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
            {state.spotPrices.map(p => (
              <div key={p.id} className="glass p-8 rounded-3xl border-t-4 border-amber-400 hover:scale-[1.02] transition-transform">
                <div className="flex justify-between mb-4">
                  <span className="text-[10px] font-black text-slate-500 uppercase">{p.standard}</span>
                  <span className={`text-[10px] font-black ${p.status==='up'?'text-emerald-400':'text-danger'}`}>{p.status==='up'?'▲':'▼'} {p.trend}%</span>
                </div>
                <h4 className="text-2xl font-black text-white">{p.name}</h4>
                <p className="text-3xl font-black text-amber-300 mt-2">{p.price} <span className="text-xs text-slate-500">KZT/L</span></p>
              </div>
            ))}
          </div>

          <div className="glass p-12 rounded-[40px] grid md:grid-cols-2 gap-12 items-center">
            <div>
              <h3 className="text-3xl font-black mb-8">{t('calculator')}</h3>
              <div className="space-y-6">
                <div>
                  <label className="text-xs font-black text-slate-500 uppercase mb-2 block">{t('fuelType')}</label>
                  <select value={calc.id} onChange={e=>setCalc({...calc,id:e.target.value})} className="w-full bg-[#0b1329] border border-white/10 p-4 rounded-2xl text-white outline-none">
                    {state.regionalRates.map(r=><option key={r.id} value={r.id}>{r.region} - {r.fuel}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-xs font-black text-slate-500 uppercase mb-2 block">{t('volume')} (L)</label>
                  <input type="number" value={calc.vol} onChange={e=>setCalc({...calc,vol:e.target.value})} className="w-full bg-[#0b1329] border border-white/10 p-4 rounded-2xl text-white outline-none" />
                </div>
              </div>
            </div>
            <div className="bg-blue-600/10 border border-blue-600/20 p-10 rounded-[40px] text-center">
              <p className="text-xs font-black text-blue-400 uppercase mb-4">{t('results')}</p>
              <div className="space-y-4">
                <p className="text-sm text-slate-400">{t('withoutVAT')}: <span className="text-xl font-black text-white">{total.toLocaleString()} KZT</span></p>
                <p className="text-sm text-slate-400">{t('withVAT')} (12%): <span className="text-4xl font-black text-amber-300">{(total*1.12).toLocaleString()} KZT</span></p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const MonitoringView = () => {
      const { state, t } = useContext(AppContext);
      const [sel, setSel] = useState(null);
      return (
        <div className="fade-in space-y-12">
          <h2 className="text-4xl font-black">{t('depotStorage')}</h2>
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-6">
            {state.reservoirs.map(r => (
              <div key={r.id} onClick={()=>setSel(r)} className={`glass p-4 rounded-3xl cursor-pointer transition-all ${sel?.id===r.id?'ring-2 ring-amber-400':''}`}>
                <div className="barrel h-32 mb-4">
                  <div className={`barrel-fill ${r.volume<30?'bg-danger':r.volume<60?'bg-amber-400':'bg-emerald-400'}`} style={{height:`${r.volume}%`}}></div>
                </div>
                <p className="text-center text-xs font-black">{r.name}</p>
                <p className="text-center text-[10px] text-slate-500 uppercase">{r.fuelType}</p>
              </div>
            ))}
          </div>
          {sel && (
            <div className="glass p-10 rounded-[40px] grid md:grid-cols-4 gap-8 text-center animate-fade-in border-amber-400/20">
              <div><p className="text-[10px] font-black text-slate-500 uppercase">{t('volume')}</p><p className="text-2xl font-black text-white">{sel.volume}%</p></div>
              <div><p className="text-[10px] font-black text-slate-500 uppercase">{t('waterLevel')}</p><p className="text-2xl font-black text-blue-400">{sel.water.toFixed(2)} cm</p></div>
              <div><p className="text-[10px] font-black text-slate-500 uppercase">{t('temp')}</p><p className="text-2xl font-black text-emerald-400">{sel.temp}°C</p></div>
              <div><p className="text-[10px] font-black text-slate-500 uppercase">Status</p><p className="text-2xl font-black text-emerald-400">Normal</p></div>
            </div>
          )}
        </div>
      );
    };

    const PricesView = () => {
      const { state, t } = useContext(AppContext);
      const [cat, setCat] = useState('all');
      const filtered = state.regionalRates.filter(r => cat === 'all' || r.cat === cat);

      return (
        <div className="fade-in space-y-12">
          <header className="flex justify-between items-end">
            <div><h2 className="text-4xl font-black mb-4">{t('prices')}</h2><p className="text-slate-500">{t('regionalCMS')}</p></div>
            <div className="flex bg-white/5 p-1 rounded-xl">
              {['all','auto','avia'].map(x => <button key={x} onClick={()=>setCat(x)} className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${cat===x?'bg-amber-400 text-black':'text-slate-500 hover:text-white'}`}>{t(x)}</button>)}
            </div>
          </header>
          <div className="glass rounded-[32px] overflow-hidden">
            <table className="w-full text-left">
              <thead className="bg-white/5 border-b border-white/10">
                <tr>
                  <th className="px-8 py-6 text-[10px] font-black uppercase text-slate-500">{t('region')}</th>
                  <th className="px-8 py-6 text-[10px] font-black uppercase text-slate-500">{t('fuelType')}</th>
                  <th className="px-8 py-6 text-[10px] font-black uppercase text-slate-500 text-right">{t('totalPrice')} (T/Tonne)</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-white/5">
                {filtered.map(r => (
                  <tr key={r.id} className="hover:bg-white/[0.02]">
                    <td className="px-8 py-6 font-bold">{r.region}</td>
                    <td className="px-8 py-6"><span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${r.cat==='auto'?'bg-blue-600/10 text-blue-400':'bg-amber-400/10 text-amber-400'}`}>{r.fuel}</span></td>
                    <td className="px-8 py-6 text-right font-black text-xl text-white">{r.price.toLocaleString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    const ContactsView = () => {
      const { state, t } = useContext(AppContext);
      return (
        <div className="fade-in space-y-24">
          <section>
            <h2 className="text-4xl font-black mb-12 text-center">{t('directors')}</h2>
            <div className="grid md:grid-cols-2 gap-12">
              {state.directors.map(d => (
                <div key={d.id} className="glass p-8 rounded-[40px] flex items-center gap-8 border-white/5 hover:border-amber-400/20 transition-all">
                  <img src={d.img} className="w-32 h-32 rounded-[32px] object-cover ring-4 ring-white/5" />
                  <div><h3 className="text-2xl font-black">{d.name}</h3><p className="text-amber-400 font-bold uppercase text-xs tracking-widest">{d.role}</p></div>
                </div>
              ))}
            </div>
          </section>
          <section className="grid lg:grid-cols-2 gap-16 items-center">
            <div>
              <h3 className="text-3xl font-black mb-6">{t('logistics')}</h3>
              <p className="text-slate-400 text-lg leading-relaxed mb-8">Smart Mercury Energy facilities are strategic hubs located 6km from the airport terminal, offering superior rail and road logistics.</p>
              <div className="glass p-8 rounded-3xl flex items-center gap-6"><div className="w-16 h-16 rounded-2xl bg-blue-600/10 flex items-center justify-center text-blue-400"><i data-lucide="map-pin"></i></div><div><p className="font-black">Airport Hub Zone</p><p className="text-slate-500 text-xs font-black uppercase">6 KM Range</p></div></div>
            </div>
            <div className="glass p-8 rounded-[40px] space-y-6">
              <h3 className="text-xl font-black">{t('feedback')}</h3>
              <div className="space-y-4">
                <input placeholder={t('name')} className="w-full bg-[#0b1329] p-4 rounded-xl outline-none" />
                <textarea placeholder={t('message')} className="w-full bg-[#0b1329] p-4 rounded-xl outline-none h-32" />
                <button className="w-full bg-amber-400 text-black font-black py-4 rounded-xl">{t('send')}</button>
              </div>
            </div>
          </section>
        </div>
      );
    };

    const AdminView = () => {
      const { state, setState, t, log } = useContext(AppContext);
      const [tab, setTab] = useState('banner');
      const [s, setS] = useState('');
      const filteredLogs = state.auditLogs.filter(l => l.action.toLowerCase().includes(s.toLowerCase()));

      return (
        <div className="fade-in flex flex-col lg:flex-row gap-12 min-h-[600px]">
          <aside className="lg:w-64 space-y-2">
            {['banner','spot','rates','stations','users','logs'].map(x => (
              <button key={x} onClick={()=>setTab(x)} className={`w-full text-left px-8 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${tab===x?'bg-blue-600 shadow-xl text-white':'hover:bg-white/5 text-slate-500'}`}>
                {t(x==='banner'?'bannerCMS':x==='spot'?'spotCMS':x==='rates'?'regionalCMS':x==='stations'?'gasStations':x==='users'?'users':'auditLogs')}
              </button>
            ))}
          </aside>
          <div className="flex-1 glass p-12 rounded-[40px]">
            {tab === 'banner' && (
              <div className="space-y-8 animate-fade-in">
                <h3 className="text-3xl font-black">{t('bannerCMS')}</h3>
                <div className="grid gap-6">
                  <div><label className="text-[10px] font-black text-slate-500 uppercase">Image URL</label><input value={state.banner.url} onChange={e=>setState({...state,banner:{...state.banner,url:e.target.value}})} className="w-full bg-[#0b1329] p-4 rounded-xl mt-2 outline-none" /></div>
                  <div className="grid md:grid-cols-3 gap-4">
                    {['KZ','RU','EN'].map(l => <div key={l}><label className="text-[10px] font-black text-slate-500 uppercase">Title ({l})</label><input value={state.banner.title[l]} onChange={e=>{const b={...state.banner};b.title[l]=e.target.value;setState({...state,banner:b});}} className="w-full bg-[#0b1329] p-4 rounded-xl mt-2 outline-none" /></div>)}
                  </div>
                </div>
                <button onClick={()=>log("Updated Banner")} className="bg-amber-400 text-black font-black px-10 py-4 rounded-xl">SAVE</button>
              </div>
            )}
            {tab === 'spot' && (
              <div className="space-y-8 animate-fade-in">
                <h3 className="text-3xl font-black">{t('spotCMS')}</h3>
                <div className="space-y-4">
                  {state.spotPrices.map(p => (
                    <div key={p.id} className="flex items-center gap-4 bg-white/5 p-4 rounded-xl">
                      <span className="w-20 font-black">{p.name}</span>
                      <input type="number" value={p.price} onChange={e=>{const list=[...state.spotPrices];list.find(x=>x.id===p.id).price=e.target.value;setState({...state,spotPrices:list});}} className="bg-[#0b1329] p-2 rounded-lg w-24 outline-none" />
                      <button onClick={()=>log(`Updated ${p.name} price`)} className="text-[10px] font-black text-blue-400">{t('save')}</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {tab === 'logs' && (
              <div className="space-y-8 animate-fade-in">
                <div className="flex justify-between items-center"><h3 className="text-3xl font-black">{t('auditLogs')}</h3><button onClick={()=>setState({...state,auditLogs:[]})} className="text-danger text-xs font-black">{t('clearLogs')}</button></div>
                <input placeholder={t('search')} value={s} onChange={e=>setS(e.target.value)} className="w-full bg-[#0b1329] p-4 rounded-xl outline-none" />
                <div className="space-y-3">{filteredLogs.map(l => <div key={l.id} className="p-4 bg-white/5 rounded-2xl flex justify-between text-xs"><span><b className="text-amber-400">{l.user}:</b> {l.action}</span><span className="text-slate-500">{l.time}</span></div>)}</div>
              </div>
            )}
            {tab === 'users' && (
               <div className="space-y-8 animate-fade-in">
                  <h3 className="text-3xl font-black">{t('users')}</h3>
                  <div className="glass rounded-2xl overflow-hidden">
                    <table className="w-full text-left">
                      <thead className="bg-white/5"><tr><th className="p-4 text-[10px] uppercase text-slate-500">{t('user')}</th><th className="p-4 text-[10px] uppercase text-slate-500">{t('role')}</th></tr></thead>
                      <tbody>{state.users.map(u=>(<tr key={u.id} className="border-t border-white/5"><td className="p-4">{u.name}</td><td className="p-4"><select value={u.role} onChange={e=>{const us=[...state.users];us.find(x=>x.id===u.id).role=e.target.value;setState({...state,users:us});log(`Role change for ${u.name}`);}} className="bg-transparent text-amber-400 font-bold"><option value="User">User</option><option value="Admin">Admin</option></select></td></tr>))}</tbody>
                    </table>
                  </div>
               </div>
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const { state, setState, t } = useContext(AppContext);
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

      const Nav = () => (
        <nav className="fixed top-0 w-full z-50 glass px-12 py-5 flex justify-between items-center shadow-2xl">
          <div className="flex items-center gap-4 cursor-pointer" onClick={()=>window.location.hash='#/home'}>
            <div className="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center shadow-lg shadow-amber-400/20"><i data-lucide="zap" className="text-[#0b1329]"></i></div>
            <span className="text-2xl font-black uppercase tracking-tighter">Smart <span className="text-amber-400">Mercury</span></span>
          </div>
          <div className="hidden lg:flex gap-10 text-[10px] font-black uppercase tracking-widest">
            {['home','monitoring','prices','contacts'].map(x=>(
              <a key={x} href={`#/${x}`} className={`transition-all hover:text-amber-400 ${state.currentPath==='/'+x?'text-amber-400 border-b-2 border-amber-400 pb-1':''}`}>{t(x)}</a>
            ))}
          </div>
          <div className="flex items-center gap-6">
            <select value={state.language} onChange={e=>setState({...state,language:e.target.value})} className="bg-transparent text-white font-black outline-none"><option value="KZ">KZ</option><option value="RU">RU</option><option value="EN">EN</option></select>
            {state.user ? (
              <div className="flex items-center gap-4 border-l border-white/10 pl-6">
                <span className="text-[10px] font-black uppercase text-amber-400">{state.user.role}</span>
                {state.user.role==='Admin' && <a href="#/admin" className={`text-[10px] font-black transition-all ${state.currentPath==='/admin'?'text-blue-400':'text-slate-500'}`}>ADMIN</a>}
                <button onClick={()=>setState({...state,user:null})} className="text-slate-500"><i data-lucide="log-out" className="w-4 h-4"></i></button>
              </div>
            ) : (
              <button onClick={()=>setState({...state,user:state.users[0]})} className="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black shadow-lg shadow-blue-600/20">LOGIN</button>
            )}
          </div>
        </nav>
      );

      const View = () => {
        if (state.currentPath === '/admin' && state.user?.role === 'Admin') return <AdminView />;
        if (state.currentPath === '/monitoring') return <MonitoringView />;
        if (state.currentPath === '/prices') return <PricesView />;
        if (state.currentPath === '/contacts') return <ContactsView />;
        return <HomeView />;
      };

      return (
        <div className="min-h-screen flex flex-col">
          <Nav />
          <main className="flex-grow pt-32 px-12 max-w-7xl mx-auto w-full pb-20"><View /></main>
          <footer className="py-12 border-t border-white/5 text-center text-[10px] text-slate-500 font-black uppercase tracking-[0.5em]">© 2026 Smart Mercury Energy Hub</footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppProvider><App /></AppProvider>);
  </script>
</body>
</html>
