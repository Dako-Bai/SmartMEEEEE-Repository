    <style>
        :root {
            --cosmic-deep: #0B1329;
            --cosmic-slate: #121F3D;
            --cosmic-accent: #3B82F6;
            --cosmic-gold: #FBBF24;
            --cosmic-emerald: #10B981;
            --cosmic-rose: #F43F5E;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--cosmic-deep);
            color: #F8FAFC;
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Styles */
        .glass-panel {
            background: rgba(18, 31, 61, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.6);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: var(--cosmic-accent) !important;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* 3D Barrel Effect */
        .barrel {
            position: relative;
            width: 100%;
            height: 140px;
            background: linear-gradient(to right, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .barrel-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(to top, rgba(59, 130, 246, 0.8), rgba(59, 130, 246, 0.4));
        }
        .fluid-wave {
            position: absolute;
            top: -15px;
            left: 0;
            width: 200%;
            height: 30px;
            background: radial-gradient(circle at 50% 100%, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: waveMove 3s infinite linear;
        }
        @keyframes waveMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--cosmic-deep); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Mobile Sidebar */
        #mobile-sidebar {
            transition: transform 0.3s ease-in-out;
            transform: translateX(-100%);
        }
        #mobile-sidebar.open {
            transform: translateX(0);
        }

        function init() {
            renderNav();

            // Hash Router

            if (['home', 'monitoring', 'prices', 'contacts', 'admin', 'cabinet', 'login', 'register'].includes(hash)) {
                state.activeTab = hash;
            }

            switchTab(state.activeTab);
            logAction("System initialized");

            window.onpopstate = () => {
                const newHash = window.location.hash.replace('#/', '') || 'home';
                if (newHash !== state.activeTab) switchTab(newHash);
            };
        }

                            <h3 class="text-3xl font-black uppercase tracking-tighter text-white">${dict[state.lang].pricingEngine}</h3>
                        </div>
                        <div class="grid lg:grid-cols-2 gap-10">
                            <!-- Regional Rates -->
                            <div class="glass-panel rounded-[40px] overflow-hidden col-span-2">
                                <div class="bg-white/5 p-6 border-b border-white/5 flex justify-between items-center">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Regional Distribution CRUD</span>
                                    <button onclick="openAddRateModal()" class="bg-blue-600 text-white text-[9px] font-black uppercase px-4 py-2 rounded-xl">+ Add New Rate</button>
                                </div>
                                <table class="w-full text-left">
                                    <thead class="bg-black/20">
                                        <tr><th class="p-6 text-[9px] uppercase font-black text-slate-500">Region</th><th class="p-6 text-[9px] uppercase font-black text-slate-500">Fuel Grade</th><th class="p-6 text-[9px] uppercase font-black text-slate-500">Rate (KZT/T)</th><th class="p-6 text-[9px] uppercase font-black text-slate-500 text-right">Actions</th></tr>
                                    </thead>
                                    <tbody class="divide-y divide-white/5">
                                        ${state.prices.regional.map((r, i) => `
                                            <tr class="hover:bg-white/[0.02]">
                                                <td class="p-6 text-sm font-black text-white">${r.region}</td>
                                                <td class="p-6"><span class="px-3 py-1 rounded-full bg-white/5 text-[8px] font-black uppercase tracking-widest text-slate-400 border border-white/5">${r.fuel}</span></td>
                                                <td class="p-6 text-xl font-black text-cosmic-gold tracking-tighter">${r.price.toLocaleString()}</td>
                                                <td class="p-6 text-right">
                                                    <button onclick="editRegionalRate(${i})" class="text-slate-600 hover:text-blue-400 mr-4"><i class="fa-solid fa-pen"></i></button>
                                                    <button onclick="deleteRegionalRate(${i})" class="text-slate-600 hover:text-rose-500"><i class="fa-solid fa-trash"></i></button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            <!-- Spot Simulation Config -->
                            <div class="glass-card p-10 rounded-[48px] space-y-8">
                                <h4 class="text-xl font-black uppercase tracking-tighter text-white">${dict[state.lang].spotCtrl}</h4>
                                <div class="space-y-6">
                                    ${state.prices.spot.map((s, i) => `
                                        <div class="flex items-center justify-between p-6 bg-white/5 rounded-[32px] border border-white/5">
                                            <div><p class="text-sm font-black text-white uppercase">${s.name}</p><p class="text-[9px] text-slate-500 font-bold uppercase mt-1">Trend: ${s.status === 'up' ? '▲' : '▼'} ${s.trend}%</p></div>
                                            <div class="flex items-center gap-4">
                                                <input type="number" value="${s.price}" onchange="updateSpotPrice(${i}, this.value)" class="glass-input w-28 p-2 rounded-xl text-center font-black text-cosmic-gold text-sm" />
                                                <i class="fa-solid fa-check text-emerald-500 opacity-50"></i>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <!-- Auto-Price Info -->
                            <div class="glass-card p-10 rounded-[48px] flex flex-col justify-center items-center text-center space-y-6 border-white/5">
                                <div class="w-20 h-20 rounded-full bg-cosmic-gold/10 flex items-center justify-center text-cosmic-gold text-4xl shadow-[0_0_40px_rgba(245,158,11,0.2)]"><i class="fa-solid fa-bolt"></i></div>
                                <div><h4 class="text-xl font-black uppercase tracking-tighter text-white">${dict[state.lang].marketSync}</h4><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2 max-w-xs">Connecting to global Singapore & Argus indices for automated pricing adjustments.</p></div>
                                <button onclick="showToast('Connection Refreshed', 'success')" class="bg-cosmic-gold text-cosmic-deep px-8 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Refresh Link</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (tab === 'requests') {
                return `
                    <div class="space-y-12 fade-in">
                        <h3 class="text-3xl font-black uppercase tracking-tighter text-white">${dict[state.lang].registrations}</h3>
                        <div class="glass-panel rounded-[40px] overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-black/20">
                                    <tr><th class="p-8 text-[9px] uppercase font-black text-slate-500">${dict[state.lang].company}</th><th class="p-8 text-[9px] uppercase font-black text-slate-500">${dict[state.lang].bin}</th><th class="p-8 text-[9px] uppercase font-black text-slate-500">${dict[state.lang].time}</th><th class="p-8 text-[9px] uppercase font-black text-slate-500 text-right">${dict[state.lang].action}</th></tr>
                                </thead>
                                <tbody class="divide-y divide-white/5 font-bold">
                                    ${state.registrations.map(r => `
                                        <tr class="hover:bg-white/[0.02]">
                                            <td class="p-8"><div><p class="text-sm text-white">${r.name}</p><p class="text-[10px] text-slate-500 font-bold lowercase">${r.email}</p></div></td>
                                            <td class="p-8 text-xs text-slate-400">${r.bin}</td>
                                            <td class="p-8 text-xs text-slate-600 font-medium">${r.time}</td>
                                            <td class="p-8 flex justify-end gap-3">
                                                <button onclick="approveReg(${r.id})" class="bg-emerald-500/10 text-emerald-400 text-[10px] font-black uppercase border border-emerald-500/30 px-4 py-2 rounded-xl hover:bg-emerald-500 hover:text-black transition-all">${dict[state.lang].approve}</button>
                                                <button onclick="rejectReg(${r.id})" class="bg-rose-500/10 text-rose-400 text-[10px] font-black uppercase border border-rose-500/30 px-4 py-2 rounded-xl hover:bg-rose-500 hover:text-black transition-all">${dict[state.lang].reject}</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${state.registrations.length === 0 ? '<tr><td colspan="4" class="p-20 text-center text-slate-700 font-black uppercase text-xs tracking-widest">No pending applications</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            if (tab === 'users') {
                return `
                    <div class="space-y-12 fade-in">
                        <div class="flex justify-between items-center">
                            <h3 class="text-3xl font-black uppercase tracking-tighter text-white">${dict[state.lang].users}</h3>
                        </div>
                        <div class="glass-panel rounded-[40px] overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-black/20">
                                    <tr><th class="p-8 text-[9px] uppercase font-black text-slate-500">${dict[state.lang].identity}</th><th class="p-8 text-[9px] uppercase font-black text-slate-500">${dict[state.lang].role}</th><th class="p-8 text-[9px] uppercase font-black text-slate-500">${dict[state.lang].authDetail}</th><th class="p-8 text-[9px] uppercase font-black text-slate-500 text-right">${dict[state.lang].status}</th></tr>
                                </thead>
                                <tbody class="divide-y divide-white/5 font-bold">
                                    ${state.users.map(u => `
                                        <tr class="hover:bg-white/[0.02] transition-all">
                                            <td class="p-8"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-xs text-white uppercase">${u.name.charAt(0)}</div><div><p class="text-sm text-white">${u.name}</p><p class="text-[10px] text-slate-500 lowercase">${u.email}</p></div></div></td>
                                            <td class="p-8"><span class="inline-block px-3 py-1 rounded-lg ${u.role==='Admin'?'bg-amber-500/10 text-amber-500 border border-amber-500/20':'bg-blue-500/10 text-blue-500 border border-blue-500/20'} text-[9px] font-black uppercase tracking-widest">${u.role}</span></td>
                                            <td class="p-8 text-xs text-slate-600">BIN: ${u.bin}</td>
                                            <td class="p-8 text-right"><span class="px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-[9px] uppercase tracking-widest border border-emerald-500/20">● Operational</span></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            if (tab === 'audit') {
                return `
                    <div class="space-y-12 fade-in">
                        <div class="flex justify-between items-center">
                            <h3 class="text-3xl font-black uppercase tracking-tighter text-white">${dict[state.lang].audit}</h3>
                            <button onclick="clearAuditLogs()" class="bg-rose-500/10 text-rose-400 text-[10px] font-black uppercase px-6 py-3 rounded-2xl border border-rose-500/20 hover:bg-rose-500 hover:text-white transition-all">Purge Logs</button>
                        </div>
                        <div class="glass-panel p-4 rounded-3xl flex gap-4 items-center">
                            <div class="w-10 h-10 rounded-2xl bg-white/5 flex items-center justify-center text-slate-500"><i class="fa-solid fa-magnifying-glass"></i></div>
                            <input id="audit-search" placeholder="Search movements..." class="bg-transparent flex-1 outline-none text-sm font-bold text-white" oninput="filterAudit(this.value)" />
                        </div>
                        <div class="space-y-4 max-h-[600px] overflow-y-auto pr-2 no-scrollbar" id="audit-list">
                            ${state.auditLogs.map(l => `
                                <div class="glass-card p-6 rounded-[32px] flex justify-between items-center group">
                                    <div class="flex items-center gap-6">
                                        <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-slate-500 group-hover:text-blue-400 transition-colors"><i class="fa-solid fa-bolt-lightning"></i></div>
                                        <div><p class="text-xs font-black text-white uppercase">${l.user}</p><p class="text-sm text-slate-400 font-medium mt-1">${l.action}</p></div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[10px] font-black text-slate-600 uppercase">${l.time}</p>
                                        <p class="text-[8px] text-emerald-500/40 uppercase mt-1">Verified</p>
                                    </div>
                                </div>
                            `).join('')}
                            ${state.auditLogs.length === 0 ? '<p class="text-center text-slate-700 py-10 font-black uppercase text-xs tracking-widest">No logs</p>' : ''}
                        </div>
                    </div>
                `;
            }
        }

        // 11. ADMIN ACTIONS
        function saveCMSBanner() {
            state.banner.url = document.getElementById('cms-banner-url').value;
            state.banner.title.KZ = document.getElementById('cms-banner-title').value;
            state.banner.desc.KZ = document.getElementById('cms-banner-desc').value;
            logAction("Updated Hero Banner CMS");
            showToast("Hero Section Updated", "success");
            if (state.activeTab === 'home') renderHome();
        }

        function addNewsItem() {
            openModal(`
                <h3 class="text-2xl font-black uppercase tracking-tighter text-white mb-8">Add Corporate News</h3>
                <div class="space-y-6">
                    <input id="new-news-title" class="glass-input w-full p-4 rounded-xl font-bold" placeholder="News Title (KZ)" />
                    <textarea id="new-news-sub" class="glass-input w-full p-4 rounded-xl font-bold h-24" placeholder="Description (KZ)"></textarea>
                    <button onclick="handleSaveNews()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-[10px]">Publish News</button>
                </div>
            `);
        }

        function handleSaveNews() {
            const title = document.getElementById('new-news-title').value;
            const sub = document.getElementById('new-news-sub').value;
            if (!title) return;
            state.news.unshift({
                id: Date.now(),
                title: { KZ: title, RU: title, EN: title },
                subtitle: { KZ: sub, RU: sub, EN: sub },
                date: new Date().toISOString().split('T')[0],
                img: "https://images.unsplash.com/photo-1541888946425-d81bb19240f5?auto=format&fit=crop&w=800&q=80"
            });
            logAction("Added news item: " + title);
            closeModal();
            renderAdmin();
        }

        function deleteNews(idx) {
            state.news.splice(idx, 1);
            logAction("Deleted news item");
            renderAdmin();
        }

        function editNews(idx) {
            const n = state.news[idx];
            openModal(`
                <h3 class="text-2xl font-black uppercase tracking-tighter text-white mb-8">Edit News</h3>
                <div class="space-y-6">
                    <input id="edit-news-title" value="${n.title.KZ}" class="glass-input w-full p-4 rounded-xl font-bold" />
                    <textarea id="edit-news-sub" class="glass-input w-full p-4 rounded-xl font-bold h-24">${n.subtitle.KZ}</textarea>
                    <button onclick="handleUpdateNews(${idx})" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-[10px]">Update News</button>
                </div>
            `);
        }

        function handleUpdateNews(idx) {
            state.news[idx].title.KZ = document.getElementById('edit-news-title').value;
            state.news[idx].subtitle.KZ = document.getElementById('edit-news-sub').value;
            logAction("Updated news item");
            closeModal();
            renderAdmin();
        }

        function approveReg(id) {
            const req = state.registrations.find(r => r.id === id);
            if (req) {
                const newUser = {
                    id: Date.now(),
                    name: req.name,
                    email: req.email,
                    bin: req.bin,
                    role: 'User',
                    status: 'Active',
                    balance: 15000000,
                    orders: []
                };
                state.users.push(newUser);
                state.registrations = state.registrations.filter(r => r.id !== id);
                logAction(`Approved Partner: ${req.name}`);
                showToast(`Partner Approved: ${req.name}`, 'success');
                renderAdmin();
            }
        }

        function rejectReg(id) {
            state.registrations = state.registrations.filter(r => r.id !== id);
            logAction("Rejected registration request");
            showToast("Request Rejected", "error");
            renderAdmin();
        }

        function updateSpotPrice(idx, val) {
            state.prices.spot[idx].price = parseFloat(val);
            logAction(`Manual spot adjust: ${state.prices.spot[idx].name}`);
            showToast("Spot Price Adjusted", "info");
        }

        function deleteRegionalRate(idx) {
            state.prices.regional.splice(idx, 1);
            logAction("Deleted regional rate");
            renderAdmin();
        }

        function openAddRateModal() {
            openModal(`
                <h3 class="text-2xl font-black uppercase tracking-tighter text-white mb-8">Add Regional Rate</h3>
                <div class="space-y-6">
                    <input id="new-reg-name" class="glass-input w-full p-4 rounded-xl font-bold" placeholder="Region Name" />
                    <input id="new-reg-fuel" class="glass-input w-full p-4 rounded-xl font-bold" placeholder="Fuel Grade" value="AI-92" />
                    <input id="new-reg-price" type="number" class="glass-input w-full p-4 rounded-xl font-bold" placeholder="Price (KZT/T)" />
                    <button onclick="handleAddRate()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-[10px]">Add Rate</button>
                </div>
            `);
        }

        function handleAddRate() {
            const region = document.getElementById('new-reg-name').value;
            const fuel = document.getElementById('new-reg-fuel').value;
            const price = document.getElementById('new-reg-price').value;
            if (region && price) {
                state.prices.regional.push({ region, fuel, price: parseFloat(price), cat: 'auto' });
                logAction(`Added rate: ${region}`);
                closeModal();
                renderAdmin();
            }
        }

        function editRegionalRate(idx) {
            const r = state.prices.regional[idx];
            openModal(`
                <h3 class="text-2xl font-black uppercase tracking-tighter text-white mb-8">Edit Rate</h3>
                <div class="space-y-6">
                    <input id="edit-reg-name" value="${r.region}" class="glass-input w-full p-4 rounded-xl font-bold" />
                    <input id="edit-reg-price" type="number" value="${r.price}" class="glass-input w-full p-4 rounded-xl font-bold" />
                    <button onclick="handleUpdateRate(${idx})" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-[10px]">Update Rate</button>
                </div>
            `);
        }

        function handleUpdateRate(idx) {
            state.prices.regional[idx].region = document.getElementById('edit-reg-name').value;
            state.prices.regional[idx].price = parseFloat(document.getElementById('edit-reg-price').value);
            logAction("Updated regional rate");
            closeModal();
            renderAdmin();
        }

        function clearAuditLogs() {
            state.auditLogs = [];
            showToast("Audit Logs Purged", "error");
            renderAdmin();
        }

        function filterAudit(val) {
            const list = document.getElementById('audit-list');
            const items = list.querySelectorAll('.glass-card');
            const query = val.toLowerCase();
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        }

        // 12. SIMULATIONS
        setInterval(() => {
            state.prices.spot.forEach(p => {
                const change = (Math.random() - 0.5) * 600;
                p.price += change;
                p.trend = Math.abs(((change / p.price) * 100).toFixed(2));
                p.status = change > 0 ? 'up' : 'down';
            });
            if (state.activeTab === 'home') renderHome();
            if (state.activeTab === 'admin' && state.adminTab === 'prices') renderAdmin();
        }, 5000);

        setInterval(() => {
            state.metrics.cpu = 5 + Math.floor(Math.random() * 20);
            state.metrics.ram = 25 + Math.floor(Math.random() * 15);
            state.metrics.latency = 40 + Math.floor(Math.random() * 10);

            const cpuBar = document.getElementById('metric-cpu-bar');
            if (cpuBar) {
                cpuBar.style.width = state.metrics.cpu + '%';
                document.getElementById('metric-cpu-val').innerText = state.metrics.cpu + '%';
                document.getElementById('metric-ram-bar').style.width = state.metrics.ram + '%';
                document.getElementById('metric-ram-val').innerText = state.metrics.ram + '%';
                document.getElementById('metric-latency').innerHTML = state.metrics.latency + ' <span class="text-xs">ms</span>';
            }
        }, 3000);

        // INIT
        window.onload = init;
    </script>
</body>
</html>
