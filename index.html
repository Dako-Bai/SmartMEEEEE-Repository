<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilmek | Адамзаттың ойына ортақтас</title>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#050505',
                        deepSlate: '#121417',
                        platinum: '#E5E5E5',
                        amberGold: '#FFB400',
                        sageGray: '#A0A0A0',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        :root {
            --bg-primary: #050505;
            --bg-secondary: #121417;
            --text-primary: #E5E5E5;
            --text-secondary: #A0A0A0;
            --accent: #FFB400;
            --glass-bg: rgba(18, 20, 23, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        .light-theme {
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --accent: #D97706;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        .gold-gradient {
            background: linear-gradient(135deg, var(--accent) 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .hover-lift { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .hover-lift:hover { transform: translateY(-12px) scale(1.01); box-shadow: 0 40px 80px -20px rgba(0,0,0,0.4); }

        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            z-index: 1;
        }
        .btn-premium::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: all 0.6s ease;
            z-index: -1;
        }
        .btn-premium:hover::after { left: 100%; }

        .breathe-animation { animation: breathe 10s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.5); opacity: 0.5; } }

        .constellation-link {
            stroke: var(--accent);
            stroke-opacity: 0.1;
            stroke-dasharray: 4, 4;
            transition: all 0.5s ease;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .ornament-bg {
            opacity: 0.02;
            pointer-events: none;
            position: absolute;
            z-index: 0;
        }

        .active-tab-indicator {
            box-shadow: 0 0 20px var(--accent);
        }

        .shadow-gold-glow {
            box-shadow: 0 0 20px rgba(255, 180, 0, 0.4);
        }
    </style>
</head>
<body id="body-tag" class="selection:bg-amberGold selection:text-obsidian">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- ASSETS ---
        const KAZAKH_ORNAMENT_PATH = `M50 0 C 60 20 80 30 100 30 C 80 30 70 50 70 70 C 70 90 50 100 50 100 C 50 100 30 90 30 70 C 30 50 20 30 0 30 C 20 30 40 20 50 0`;

        const THOUGHTS_DATABASE = [
            { id: 1, author: "Abai", cat: "wisdom", tags: ["ethics", "logic"], text: { kk: "Адам болам десеңіз, оған себепші бес нәрсе бар: өсек, өтірік, мақтаншақ, еріншек, бекер мал шашпақ - бұлардан сақ бол.", en: "If you want to be a human, beware of five things: gossip, lying, boasting, laziness, and waste." } },
            { id: 2, author: "Al-Farabi", cat: "education", tags: ["science", "logic"], text: { kk: "Тәрбиесіз берілген білім — адамзаттың қас жауы.", en: "Knowledge without upbringing is the enemy of mankind." } },
            { id: 3, author: "Shakarim", cat: "life", tags: ["conscience", "ethics"], text: { kk: "Ар-ұяттың күзеті — әркімнің өз жүрегінде.", en: "The guardian of conscience is in everyone's heart." } },
            { id: 4, author: "Marcus Aurelius", cat: "stoic", tags: ["life", "discipline"], text: { kk: "Өміріңнің бақыты ойыңның сапасына байланысты.", en: "The happiness of your life depends upon the quality of your thoughts." } },
            { id: 5, author: "Socrates", cat: "wisdom", tags: ["truth", "inquiry"], text: { kk: "Мен ешнәрсе білмейтінімді білемін.", en: "I know that I know nothing." } },
            { id: 6, author: "Rumi", cat: "mystic", tags: ["love", "spirituality"], text: { kk: "Кеше мен ақылды едім, сондықтан әлемді өзгерткім келді. Бүгін мен данамын, сондықтан өзімді өзгертемін.", en: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself." } }
        ];

        // --- COMPONENTS ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: iconRef.current, attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const KazakhOrnament = ({ className = "w-10 h-10 text-amberGold" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="currentColor" dangerouslySetInnerHTML={{ __html: `<path d="${KAZAKH_ORNAMENT_PATH}" />` }} />
        );

        const Toast = ({ message, type, onClose }) => (
            <div className={`fixed bottom-10 right-10 z-[500] px-8 py-5 rounded-3xl glass border-2 flex items-center gap-5 animate-slide-up ${type === 'success' ? 'border-amberGold/30 text-amberGold' : 'border-red-500/30 text-red-500'}`}>
                <Icon name={type === 'success' ? 'sparkles' : 'alert-circle'} className="w-5 h-5" />
                <span className="text-[11px] font-black uppercase tracking-[0.2em]">{message}</span>
                <button onClick={onClose} className="ml-4 opacity-40 hover:opacity-100"><Icon name="x" className="w-4 h-4" /></button>
            </div>
        );

        // --- MODULES ---

        const HeritageModule = ({ lang, addXp }) => {
            const [search, setSearch] = useState('');
            const [activeTag, setTag] = useState(null);
            const [speaking, setSpeaking] = useState(null);

            const filtered = useMemo(() => THOUGHTS_DATABASE.filter(q =>
                (q.author.toLowerCase().includes(search.toLowerCase()) || q.text[lang].toLowerCase().includes(search.toLowerCase())) &&
                (!activeTag || q.tags.includes(activeTag))
            ), [search, lang, activeTag]);

            const speak = (id, text) => {
                window.speechSynthesis.cancel();
                if (speaking === id) { setSpeaking(null); return; }
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = lang === 'kk' ? 'tr-TR' : 'en-US';
                utter.onend = () => setSpeaking(null);
                setSpeaking(id);
                window.speechSynthesis.speak(utter);
            };

            const generateCard = (q) => {
                const canvas = document.createElement('canvas');
                canvas.width = 1200; canvas.height = 1200;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 1200, 1200);

                // Drawing Ornament
                ctx.globalAlpha = 0.05;
                ctx.fillStyle = '#FFB400';
                const path = new Path2D(KAZAKH_ORNAMENT_PATH);
                ctx.save(); ctx.translate(600, 600); ctx.scale(8, 8); ctx.fill(path); ctx.restore();

                ctx.globalAlpha = 1.0;
                ctx.fillStyle = '#FFB400'; ctx.font = '700 40px Inter'; ctx.textAlign = 'center';
                ctx.fillText('BILMEK • WISDOM', 600, 180);

                ctx.fillStyle = '#E5E5E5'; ctx.font = 'italic 54px "Playfair Display"';
                const words = `"${q.text[lang]}"`.split(' ');
                let line = '', y = 500;
                for(let n=0; n<words.length; n++) {
                    let test = line + words[n] + ' ';
                    if (ctx.measureText(test).width > 900) { ctx.fillText(line, 600, y); line = words[n] + ' '; y += 80; }
                    else line = test;
                }
                ctx.fillText(line, 600, y);

                ctx.fillStyle = '#FFB400'; ctx.font = '700 36px Inter';
                ctx.fillText(q.author.toUpperCase(), 600, y + 140);

                const link = document.createElement('a');
                link.download = `bilmek_wisdom_${q.author}.png`; link.href = canvas.toDataURL(); link.click();
                addXp(30);
            };

            return (
                <div className="space-y-24 fade-in">
                    <div className="max-w-2xl mx-auto relative group">
                        <Icon name="search" className="absolute left-8 top-1/2 -translate-y-1/2 text-sageGray" />
                        <input
                            type="text" placeholder="Explore the library of souls..." value={search} onChange={e => setSearch(e.target.value)}
                            className="w-full bg-white/5 border-2 border-white/10 rounded-full pl-20 pr-10 py-6 text-sm focus:border-amberGold outline-none transition-all shadow-inner font-medium"
                        />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                        {filtered.map(q => (
                            <div key={q.id} className="glass p-12 rounded-[50px] flex flex-col justify-between h-[520px] hover-lift relative overflow-hidden group">
                                <div className="absolute top-0 right-0 p-10 opacity-5 group-hover:opacity-10 transition-opacity"><KazakhOrnament className="w-32 h-32" /></div>
                                <div className="space-y-12 relative z-10">
                                    <div className="flex justify-between items-center">
                                        <div className="w-14 h-14 rounded-2xl bg-amberGold/10 flex items-center justify-center text-amberGold border border-amberGold/20"><Icon name="quote" className="w-7 h-7" /></div>
                                        <div className="flex gap-4 opacity-30 group-hover:opacity-100 transition-all">
                                            <button onClick={() => speak(q.id, q.text[lang])} className={`p-3 rounded-full transition-all ${speaking === q.id ? "bg-amberGold text-obsidian scale-110" : "hover:text-amberGold hover:bg-white/5"}`}><Icon name="volume-2" /></button>
                                            <button onClick={() => generateCard(q)} className="p-3 rounded-full hover:text-amberGold hover:bg-white/5 transition-all"><Icon name="download" /></button>
                                        </div>
                                    </div>
                                    <p className="text-3xl font-serif italic leading-relaxed text-platinum group-hover:text-amberGold transition-colors">"{q.text[lang]}"</p>
                                </div>
                                <div className="mt-auto pt-10 border-t border-white/5 relative z-10 flex flex-col gap-6">
                                    <h4 className="text-[11px] font-black uppercase tracking-[0.5em] text-amberGold">{q.author}</h4>
                                    <div className="flex flex-wrap gap-2">
                                        {q.tags.map(t => <button key={t} onClick={() => setTag(activeTag === t ? null : t)} className={`text-[9px] font-bold uppercase tracking-widest px-3 py-1 rounded-lg ${activeTag === t ? "bg-amberGold text-obsidian shadow-lg" : "bg-white/5 text-sageGray hover:text-white"}`}>#{t}</button>)}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ReflectionModule = ({ lang, addXp }) => {
            const [text, setText] = useState('');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('bilmek_ref_v2') || '[]'));
            const [aura, setAura] = useState({ color: 'rgba(160, 160, 160, 0.1)', mood: 'neutral' });

            useEffect(() => {
                const lower = text.toLowerCase();
                const keywords = {
                    joy: ['happy', 'бақыт', 'қуаныш', 'сәттілік', 'love'],
                    thought: ['think', 'ой', 'сұрақ', 'philosoph', 'logic'],
                    melancholy: ['sad', 'мұң', 'жалғыз', 'death', 'өлім', 'dark'],
                    peace: ['calm', 'тыныш', 'zen', 'meditat', 'breath']
                };

                let detectedMood = 'neutral';
                let detectedColor = 'rgba(160, 160, 160, 0.1)';

                if (keywords.joy.some(k => lower.includes(k))) { detectedMood = 'joy'; detectedColor = 'rgba(255, 180, 0, 0.2)'; }
                else if (keywords.thought.some(k => lower.includes(k))) { detectedMood = 'thought'; detectedColor = 'rgba(56, 189, 248, 0.2)'; }
                else if (keywords.melancholy.some(k => lower.includes(k))) { detectedMood = 'melancholy'; detectedColor = 'rgba(31, 41, 55, 0.4)'; }
                else if (keywords.peace.some(k => lower.includes(k))) { detectedMood = 'peace'; detectedColor = 'rgba(52, 211, 153, 0.2)'; }

                setAura({ mood: detectedMood, color: detectedColor });
            }, [text]);

            const save = () => {
                if (!text.trim()) return;
                const entry = { id: Date.now(), text, mood: aura.mood, date: new Date().toLocaleDateString() };
                const next = [entry, ...entries];
                setEntries(next);
                localStorage.setItem('bilmek_ref_v2', JSON.stringify(next));
                setText(''); addXp(60);
            };

            const mirroredQuote = useMemo(() => THOUGHTS_DATABASE[Math.floor(Math.random() * THOUGHTS_DATABASE.length)], [aura.mood]);

            return (
                <div className="max-w-5xl mx-auto space-y-24 fade-in">
                    <div className="relative glass p-20 rounded-[80px] overflow-hidden border-2 border-white/5">
                        <div className="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full blur-[120px] transition-all duration-1000" style={{ background: aura.color }}></div>
                        <div className="relative z-10 space-y-16">
                            <div className="flex justify-between items-center">
                                <span className="text-[11px] font-black uppercase tracking-[0.6em] text-amberGold">Aura Reflection: {aura.mood}</span>
                                <KazakhOrnament className="w-10 h-10 opacity-30" />
                            </div>
                            <textarea
                                value={text} onChange={e => setText(e.target.value)}
                                placeholder="Whisper your thoughts to the digital eternal..."
                                className="w-full h-80 bg-transparent text-5xl font-serif italic text-center outline-none resize-none placeholder:opacity-5 leading-relaxed text-platinum"
                            />
                            {text.length > 30 && (
                                <div className="p-10 bg-white/5 border border-white/5 rounded-3xl animate-fade-in text-center shadow-xl">
                                    <p className="text-base text-sageGray italic mb-2">Resonating with Ancient Echoes:</p>
                                    <p className="text-xl text-platinum italic">"{mirroredQuote.text[lang]}" — {mirroredQuote.author}</p>
                                </div>
                            )}
                            <div className="flex justify-center">
                                <button onClick={save} className="btn-premium px-20 py-6 bg-amberGold text-obsidian rounded-2xl font-black uppercase text-[11px] tracking-[0.3em] hover:scale-105 transition-all shadow-2xl active:scale-95">Enshrine Reflection</button>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                        {entries.map(e => (
                            <div key={e.id} className="glass p-12 rounded-[50px] flex flex-col justify-between hover-lift border border-white/5">
                                <p className="text-2xl font-serif italic text-platinum leading-relaxed">"{e.text}"</p>
                                <div className="mt-12 pt-8 border-t border-white/5 flex justify-between items-center">
                                    <span className="text-[10px] font-bold text-sageGray uppercase tracking-widest">{e.date}</span>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[9px] font-black uppercase tracking-widest text-amberGold/50">{e.mood}</span>
                                        <div className="w-3 h-3 rounded-full shadow-lg" style={{ backgroundColor: e.mood === 'joy' ? '#FFB400' : (e.mood === 'thought' ? '#38BDF8' : '#1F2937') }}></div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ZenModule = ({ lang, addXp }) => {
            const [stage, setStage] = useState('breathe');
            const [pollData, setPollData] = useState(() => JSON.parse(localStorage.getItem('bilmek_poll_v3') || '[45, 30, 25]'));
            const [voted, setVoted] = useState(() => localStorage.getItem('bilmek_voted_v3') === 'true');
            const [ambient, setAmbient] = useState(false);
            const audioRef = useRef(null);

            const toggleAmbient = () => {
                if (!audioRef.current) {
                    audioRef.current = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
                    audioRef.current.loop = true; audioRef.current.volume = 0.2;
                }
                if (ambient) audioRef.current.pause();
                else audioRef.current.play().catch(() => {});
                setAmbient(!ambient);
            };

            const vote = (idx) => {
                if (voted) return;
                const next = [...pollData]; next[idx]++;
                setPollData(next);
                localStorage.setItem('bilmek_poll_v3', JSON.stringify(next));
                localStorage.setItem('bilmek_voted_v3', 'true');
                setVoted(true); addXp(50); setStage('result');
            };

            return (
                <div className="max-w-4xl mx-auto space-y-24 fade-in">
                    {stage === 'breathe' && (
                        <div className="flex flex-col items-center justify-center py-20 space-y-24">
                            <div className="relative w-72 h-72 flex items-center justify-center">
                                <div className="absolute inset-0 border-2 border-amberGold/40 rounded-full breathe-animation"></div>
                                <div className="absolute inset-10 border border-amberGold/20 rounded-full breathe-animation" style={{ animationDelay: '2.5s' }}></div>
                                <div className="absolute inset-20 border border-amberGold/10 rounded-full breathe-animation" style={{ animationDelay: '5s' }}></div>
                                <Icon name="wind" className="w-16 h-16 text-amberGold relative z-10 animate-pulse" />
                            </div>
                            <div className="text-center space-y-8">
                                <h3 className="text-6xl font-serif italic text-platinum tracking-tight leading-tight">Sync With Reality</h3>
                                <p className="text-[13px] font-black uppercase tracking-[1em] text-sageGray">Inhale Knowledge • Exhale Illusion</p>
                                <button onClick={toggleAmbient} className={`flex items-center gap-3 mx-auto px-8 py-3 rounded-full border-2 transition-all ${ambient ? 'border-amberGold text-amberGold shadow-lg' : 'border-white/10 text-sageGray'}`}>
                                    <Icon name={ambient ? "volume-2" : "volume-x"} className="w-5 h-5" />
                                    <span className="text-[10px] font-black uppercase tracking-widest">{ambient ? "Atmosphere Enabled" : "Atmosphere Disabled"}</span>
                                </button>
                            </div>
                            <button onClick={() => setStage('inquiry')} className="px-20 py-6 border-2 border-platinum/10 text-platinum text-[11px] font-black uppercase tracking-[0.4em] hover:bg-platinum hover:text-obsidian transition-all duration-700 rounded-2xl">Enter Silent Contemplation</button>
                        </div>
                    )}

                    {stage === 'inquiry' && (
                        <div className="glass p-24 rounded-[80px] text-center space-y-20 border-2 border-white/5">
                             <span className="text-[11px] font-black uppercase tracking-[0.8em] text-amberGold">Collective Dilemma</span>
                             <h4 className="text-5xl font-serif italic text-platinum leading-tight">
                                {lang === 'kk' ? "Уақыт — сызық па, әлде айналым ба?" : "Is time a forward line or a returning circle?"}
                             </h4>
                             <div className="grid grid-cols-1 md:grid-cols-3 gap-10 max-w-3xl mx-auto">
                                {[ { kk: "Сызық", en: "A Line" }, { kk: "Айналым", en: "A Circle" }, { kk: "Екеуі де емес", en: "Neither" } ].map((opt, i) => (
                                    <button key={i} onClick={() => vote(i)} className="p-10 border-2 border-white/5 hover:border-amberGold transition-all font-serif italic text-2xl rounded-3xl bg-white/5 hover-lift">
                                        {opt[lang]}
                                    </button>
                                ))}
                             </div>
                        </div>
                    )}

                    {stage === 'result' && (
                        <div className="glass p-20 rounded-[80px] space-y-20 border-2 border-white/5">
                             <div className="text-center">
                                <h3 className="text-4xl font-serif italic text-platinum">The Shared Resonance</h3>
                                <p className="text-sageGray text-[11px] font-black uppercase tracking-[0.5em] mt-6 opacity-60">Neural alignment across the platform</p>
                             </div>
                             <div className="space-y-12 max-w-xl mx-auto">
                                {[ { label: {kk: "Сызық", en: "Line"}, color: "#FFB400" }, { label: {kk: "Айналым", en: "Circle"}, color: "#A0A0A0" }, { label: {kk: "Өзге", en: "Other"}, color: "#121417" } ].map((item, i) => {
                                    const total = pollData.reduce((a,b)=>a+b, 0);
                                    const p = Math.round((pollData[i]/total)*100);
                                    return (
                                        <div key={i} className="space-y-4">
                                            <div className="flex justify-between items-end px-3">
                                                <span className="text-xs font-black uppercase tracking-widest text-sageGray">{item.label[lang]}</span>
                                                <span className="text-3xl font-serif italic text-amberGold">{p}%</span>
                                            </div>
                                            <div className="w-full h-2 bg-white/5 relative overflow-hidden rounded-full">
                                                <div className="absolute top-0 left-0 h-full transition-all duration-1000 ease-out shadow-gold-glow" style={{ width: `${p}%`, background: item.color }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                             </div>
                             <div className="text-center">
                                <button onClick={() => setStage('breathe')} className="text-[11px] font-black uppercase tracking-widest text-sageGray hover:text-amberGold transition-colors">Reset Experience</button>
                             </div>
                        </div>
                    )}
                </div>
            );
        };

        const SocraticImmersive = ({ node, lang, onExit, addXp }) => {
            const [step, setStep] = useState(0);
            const [displayText, setDisplayText] = useState('');

            const dialogs = {
                1: [ // Soul
                    { q: { kk: "Сен жанның өлмейтініне сенесің бе?", en: "Do you believe the soul is immortal?" },
                      a: [ { t: {kk: "Иә, ол мәңгілік", en: "Yes, it is eternal"}, xp: 40 }, { t: {kk: "Жоқ, ол денемен бірге өледі", en: "No, it dies with the body"}, xp: 20 } ] },
                    { q: { kk: "Егер жан мәңгілік болса, оның қажеттілігі не?", en: "If the soul is eternal, what is its primary need?" },
                      a: [ { t: {kk: "Білім мен таным", en: "Knowledge and Understanding"}, xp: 60 }, { t: {kk: "Тыныштық", en: "Tranquility"}, xp: 30 } ] }
                ],
                2: [ // Truth
                    { q: { kk: "Шындық объективті ме, әлде субъективті ме?", en: "Is truth objective or subjective?" },
                      a: [ { t: {kk: "Объективті шындық бар", en: "Objective truth exists"}, xp: 50 }, { t: {kk: "Әркімнің өз шындығы бар", en: "Everyone has their own truth"}, xp: 30 } ] }
                ]
            };

            const currentScript = dialogs[node.id] || [{ q: {kk: "Ойлануға дайынсың ба?", en: "Are you ready to contemplate?"}, a: [{t: {kk: "Дайынмын", en: "Ready"}, xp: 20}] }];

            useEffect(() => {
                let i = 0; const full = currentScript[step]?.q[lang] || "";
                setDisplayText("");
                const timer = setInterval(() => {
                    setDisplayText(p => p + full.charAt(i)); i++;
                    if (i >= full.length) clearInterval(timer);
                }, 40);
                return () => clearInterval(timer);
            }, [step, lang]);

            const handleNext = (xpVal) => {
                addXp(xpVal);
                if (step < currentScript.length - 1) setStep(p => p + 1);
                else onExit();
            };

            return (
                <div className="fixed inset-0 z-[300] bg-obsidian/98 backdrop-blur-3xl flex flex-col items-center justify-center p-12 fade-in">
                    <button onClick={onExit} className="absolute top-12 right-12 text-sageGray hover:text-white transition-all"><Icon name="x" className="w-10 h-10" /></button>
                    <div className="max-w-4xl w-full space-y-24 text-center">
                        <div className="space-y-6">
                            <span className="text-[12px] font-black uppercase tracking-[1em] text-amberGold">Dialogue: {node.label[lang]}</span>
                            <h2 className="text-6xl font-serif italic text-platinum leading-tight min-h-[160px]">{displayText}</h2>
                        </div>
                        <div className="flex flex-col gap-8 items-center">
                            {currentScript[step]?.a.map((ans, i) => (
                                <button key={i} onClick={() => handleNext(ans.xp)} className="group relative px-16 py-7 border-2 border-white/5 hover:border-amberGold transition-all rounded-[30px] w-full max-w-xl bg-white/5 overflow-hidden active:scale-95">
                                    <div className="absolute inset-0 bg-amberGold/0 group-hover:bg-amberGold/5 transition-colors"></div>
                                    <span className="relative z-10 text-2xl font-serif italic text-sageGray group-hover:text-platinum">{ans.t[lang]}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const ConnectionModule = ({ lang, addXp }) => {
            const [nodes, setNodes] = useState([
                { id: 1, x: 500, y: 300, label: {kk: "Жан", en: "Soul"}, color: "#FFB400" },
                { id: 2, x: 300, y: 150, label: {kk: "Ар", en: "Truth"}, color: "#A0A0A0" },
                { id: 3, x: 700, y: 150, label: {kk: "Махаббат", en: "Love"}, color: "#A0A0A0" },
                { id: 4, x: 250, y: 450, label: {kk: "Еркіндік", en: "Freedom"}, color: "#A0A0A0" },
                { id: 5, x: 750, y: 450, label: {kk: "Уақыт", en: "Time"}, color: "#A0A0A0" },
            ]);
            const links = [ {s: 1, t: 2}, {s: 1, t: 3}, {s: 1, t: 4}, {s: 1, t: 5} ];
            const [dragging, setDragging] = useState(null);
            const [activeNode, setActiveNode] = useState(null);

            const onMouseMove = (e) => {
                if (dragging === null) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (1000 / rect.width);
                const y = (e.clientY - rect.top) * (600 / rect.height);
                setNodes(nodes.map(n => n.id === dragging ? { ...n, x, y } : n));
            };

            return (
                <div className="max-w-6xl mx-auto space-y-24 fade-in">
                    <div className="relative aspect-[10/6] glass rounded-[80px] border-2 border-white/5 overflow-hidden cursor-crosshair"
                         onMouseMove={onMouseMove} onMouseUp={() => setDragging(null)}>
                        <svg viewBox="0 0 1000 600" className="w-full h-full select-none">
                            {links.map((l, i) => {
                                const sn = nodes.find(n => n.id === l.s), tn = nodes.find(n => n.id === l.t);
                                return <line key={i} x1={sn.x} y1={sn.y} x2={tn.x} y2={tn.y} className="constellation-link" strokeWidth="2" />;
                            })}
                            {nodes.map(n => (
                                <g key={n.id} onMouseDown={() => setDragging(n.id)} onClick={() => setActiveNode(n)} className="cursor-grab active:cursor-grabbing group">
                                    <circle cx={n.x} cy={n.y} r="50" fill="#050505" stroke={activeNode?.id === n.id ? "#FFB400" : "rgba(255,255,255,0.08)"} strokeWidth="3" className="transition-all duration-500 group-hover:stroke-amberGold" />
                                    <text x={n.x} y={n.y + 8} textAnchor="middle" className="text-[11px] font-black uppercase tracking-widest fill-sageGray group-hover:fill-white transition-colors pointer-events-none">{n.label[lang]}</text>
                                </g>
                            ))}
                        </svg>
                        <div className="absolute top-12 left-12 pointer-events-none">
                             <h3 className="text-4xl font-serif italic text-platinum">Cognitive Constellation</h3>
                             <p className="text-[11px] font-black uppercase tracking-widest text-amberGold mt-3">Drag nodes to redefine intellectual relations</p>
                        </div>
                    </div>

                    {activeNode && <SocraticImmersive node={activeNode} lang={lang} onExit={() => setActiveNode(null)} addXp={addXp} />}
                </div>
            );
        };

        const InsightsModule = ({ lang, xp, level, addXp }) => {
            const [prestige, setPrestige] = useState(() => parseInt(localStorage.getItem('bilmek_prestige') || '0'));

            const stats = useMemo(() => {
                const reflections = JSON.parse(localStorage.getItem('bilmek_ref_v2') || '[]');
                const moodCounts = reflections.reduce((acc, r) => {
                    acc[r.mood] = (acc[r.mood] || 0) + 1; return acc;
                }, {});

                const categories = [
                    { label: lang === 'kk' ? "Этика" : "Ethics", value: Math.min(100, (xp / 400) * 10 + (moodCounts.thought || 0) * 8) },
                    { label: lang === 'kk' ? "Логика" : "Logic", value: Math.min(100, (xp / 800) * 20) },
                    { label: lang === 'kk' ? "Руханият" : "Spirituality", value: Math.min(100, (moodCounts.peace || 0) * 20 + (moodCounts.joy || 0) * 15) },
                    { label: lang === 'kk' ? "Метафизика" : "Metaphysics", value: Math.min(100, (moodCounts.melancholy || 0) * 15 + (xp / 1500) * 40) }
                ];
                return { moodCounts, categories, total: reflections.length };
            }, [xp, lang]);

            const handleAscend = () => {
                const next = prestige + 1;
                setPrestige(next); localStorage.setItem('bilmek_prestige', next);
                localStorage.setItem('bilmek_xp_pro', 0); window.location.reload();
            };

            return (
                <div className="max-w-6xl mx-auto space-y-20 fade-in">
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                        <div className="lg:col-span-2 glass p-16 rounded-[70px] space-y-16">
                            <div className="flex justify-between items-end">
                                <div className="space-y-4">
                                    <h3 className="text-5xl font-serif italic text-platinum">Archetype Analysis</h3>
                                    <p className="text-[11px] font-black uppercase tracking-[0.6em] text-amberGold">Intellectual fingerprint</p>
                                </div>
                                <div className="text-right"><span className="text-7xl font-serif italic text-platinum opacity-20">Lvl {level}</span></div>
                            </div>
                            <div className="space-y-12">
                                {stats.categories.map((c, i) => (
                                    <div key={i} className="space-y-4">
                                        <div className="flex justify-between items-end px-2">
                                            <span className="text-[10px] font-black uppercase tracking-widest text-sageGray">{c.label}</span>
                                            <span className="text-2xl font-serif italic text-amberGold">{Math.round(c.value)}%</span>
                                        </div>
                                        <div className="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                                            <div className="h-full bg-amberGold transition-all duration-1000 ease-out shadow-gold-glow" style={{ width: `${c.value}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass p-14 rounded-[60px] flex flex-col justify-between border-r-4 border-amberGold">
                            <div className="space-y-12 text-center">
                                <div className="p-10 bg-white/5 rounded-[40px] border border-white/5 shadow-inner">
                                    <p className="text-6xl font-serif italic text-amberGold">{stats.total}</p>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-sageGray mt-4">Wisdom Captures</p>
                                </div>
                                <div className="space-y-8">
                                    <h4 className="text-[11px] font-black uppercase tracking-widest text-sageGray border-b border-white/5 pb-6">Emotional Mirages</h4>
                                    <div className="flex justify-around items-end h-40">
                                        {['joy', 'thought', 'melancholy', 'peace'].map(m => (
                                            <div key={m} className="flex flex-col items-center gap-3">
                                                <div className="w-2 bg-white/5 rounded-full relative h-32 overflow-hidden">
                                                    <div className="absolute bottom-0 left-0 w-full bg-amberGold rounded-full transition-all duration-1000" style={{ height: `${(stats.moodCounts[m]/stats.total || 0)*100}%` }}></div>
                                                </div>
                                                <span className="text-[8px] font-bold uppercase tracking-widest text-sageGray">{m}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <div className="pt-12 border-t border-white/5 mt-12 space-y-6">
                                <p className="text-[11px] font-black uppercase tracking-widest text-amberGold text-center">Dimensional Evolution</p>
                                {level >= 10 ? (
                                    <button onClick={handleAscend} className="w-full py-5 bg-amberGold text-obsidian rounded-2xl font-black uppercase text-[11px] tracking-widest animate-pulse shadow-2xl">Transcend Ascension {prestige + 1}</button>
                                ) : (
                                    <p className="text-xs text-sageGray italic text-center">{1000 - (xp % 1000)} XP to Next Tier</p>
                                )}
                                {prestige > 0 && <div className="flex justify-center items-center gap-3 text-amberGold"><Icon name="award" className="w-5 h-5" /><span className="text-[11px] font-black uppercase tracking-widest">Ascended Tier {prestige}</span></div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ChallengeModule = ({ lang, addXp }) => {
            const [mode, setMode] = useState('menu');
            const [scramble, setScramble] = useState({ s: [], r: [] });
            const [syllogism, setSyllogism] = useState(null);

            const scrambleSolutions = {
                kk: "Мен ешнәрсе білмейтінімді білемін",
                en: "I know that I know nothing"
            };

            const startScramble = () => {
                const words = scrambleSolutions[lang].split(' ');
                const shuffled = [...words].sort(() => Math.random() - 0.5);
                setScramble({ s: shuffled, r: [] }); setMode('scramble');
            };

            const pickWord = (w, i) => {
                const nextR = [...scramble.r, w];
                const nextS = scramble.s.filter((_, idx) => idx !== i);
                setScramble({ s: nextS, r: nextR });
                if (nextR.length === scrambleSolutions[lang].split(' ').length) {
                    if (nextR.join(' ') === scrambleSolutions[lang]) { addXp(120); setTimeout(() => setMode('menu'), 1500); }
                    else { setTimeout(() => startScramble(), 800); }
                }
            };

            const startSyllogism = () => {
                const pool = [
                    { p1: {kk: "Барлық адамдар өледі.", en: "All humans are mortal."}, p2: {kk: "Сократ - адам.", en: "Socrates is a human."}, c: {kk: "Сократ өледі.", en: "Socrates is mortal."}, valid: true },
                    { p1: {kk: "Кейбір философтар сақалды.", en: "Some philosophers have beards."}, p2: {kk: "Абай - философ.", en: "Abai is a philosopher."}, c: {kk: "Абайдың сақалы бар.", en: "Abai has a beard."}, valid: false }
                ];
                setSyllogism(pool[Math.floor(Math.random() * pool.length)]); setMode('syllogism');
            };

            return (
                <div className="max-w-5xl mx-auto space-y-24 fade-in">
                    {mode === 'menu' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                            <div onClick={startScramble} className="glass p-20 rounded-[60px] border-2 border-white/5 cursor-pointer hover:border-amberGold transition-all group text-center hover-lift">
                                <Icon name="brain" className="w-20 h-20 mb-10 text-amberGold group-hover:scale-110 transition-all" />
                                <h3 className="text-4xl font-serif italic text-platinum mb-6">Axiom Reconstructor</h3>
                                <p className="text-[11px] font-black uppercase tracking-[0.3em] text-sageGray">Linguistic structural challenge</p>
                            </div>
                            <div onClick={startSyllogism} className="glass p-20 rounded-[60px] border-2 border-white/5 cursor-pointer hover:border-amberGold transition-all group text-center hover-lift">
                                <Icon name="zap" className="w-20 h-20 mb-10 text-amberGold group-hover:scale-110 transition-all" />
                                <h3 className="text-4xl font-serif italic text-platinum mb-6">Logic Syllogisms</h3>
                                <p className="text-[11px] font-black uppercase tracking-[0.3em] text-sageGray">Deductive reasoning trials</p>
                            </div>
                        </div>
                    )}

                    {mode === 'syllogism' && syllogism && (
                        <div className="glass p-24 rounded-[80px] space-y-20 text-center animate-fade-in border-2 border-white/5">
                             <div className="space-y-6">
                                <span className="text-[11px] font-black uppercase tracking-[0.8em] text-amberGold">Analytical Challenge</span>
                                <div className="space-y-6 text-3xl font-serif italic text-platinum opacity-70">
                                    <p>1. {syllogism.p1[lang]}</p>
                                    <p>2. {syllogism.p2[lang]}</p>
                                </div>
                                <div className="h-[1px] w-48 bg-amberGold/20 mx-auto my-12"></div>
                                <h3 className="text-4xl font-serif italic text-platinum leading-tight">Conclusion: {syllogism.c[lang]}</h3>
                             </div>
                             <div className="flex justify-center gap-12">
                                <button onClick={() => { if(syllogism.valid) addXp(180); setMode('menu'); }} className="px-20 py-6 border-2 border-white/5 hover:border-amberGold hover:bg-amberGold hover:text-obsidian transition-all font-black uppercase text-[11px] tracking-widest rounded-3xl">Valid</button>
                                <button onClick={() => { if(!syllogism.valid) addXp(180); setMode('menu'); }} className="px-20 py-6 border-2 border-white/5 hover:border-red-500 hover:bg-red-500 hover:text-white transition-all font-black uppercase text-[11px] tracking-widest rounded-3xl">Fallacy</button>
                             </div>
                             <button onClick={() => setMode('menu')} className="text-[11px] font-black uppercase tracking-widest text-sageGray hover:text-white transition-colors">Abort Trial</button>
                        </div>
                    )}

                    {mode === 'scramble' && (
                        <div className="glass p-24 rounded-[80px] space-y-20 text-center border-2 border-white/5">
                             <div className="space-y-6">
                                <span className="text-[11px] font-black uppercase tracking-[0.8em] text-amberGold">Axiom Reconstruction</span>
                                <h3 className="text-3xl font-serif italic text-platinum">Reorder the logic of Socrates</h3>
                             </div>
                             <div className="min-h-[160px] p-12 border-2 border-dashed border-white/5 bg-white/2 rounded-[50px] flex flex-wrap justify-center gap-8 items-center">
                                {scramble.r.map((w, i) => <span key={i} className="text-5xl font-serif italic text-platinum animate-fade-in">{w}</span>)}
                             </div>
                             <div className="flex flex-wrap justify-center gap-8">
                                {scramble.s.map((w, i) => (
                                    <button key={i} onClick={() => pickWord(w, i)} className="px-12 py-6 border-2 border-white/5 hover:border-amberGold transition-all font-serif italic text-3xl rounded-[25px] bg-white/5 text-platinum active:scale-90">
                                        {w}
                                    </button>
                                ))}
                             </div>
                             <button onClick={() => setMode('menu')} className="text-[11px] font-black uppercase tracking-widest text-sageGray hover:text-white transition-colors">Abort Trial</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('kk');
            const [activeTab, setTab] = useState('library');
            const [xp, setXp] = useState(() => parseInt(localStorage.getItem('bilmek_xp_pro') || '0'));
            const [level, setLevel] = useState(1);
            const [theme, setTheme] = useState(() => localStorage.getItem('bilmek_theme') || 'dark');
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const newLevel = Math.floor(xp / 1000) + 1;
                if (newLevel !== level) setLevel(newLevel);
                localStorage.setItem('bilmek_xp_pro', xp);
            }, [xp]);

            useEffect(() => {
                const body = document.getElementById('body-tag');
                if (theme === 'light') body.classList.add('light-theme');
                else body.classList.remove('light-theme');
                localStorage.setItem('bilmek_theme', theme);
            }, [theme]);

            const addXp = (val) => {
                setXp(p => p + val);
                const msg = lang === 'kk' ? `+${val} XP Жетілді` : `+${val} XP Ascension`;
                setToast({ message: msg, type: 'success' });
                setTimeout(() => setToast(null), 3000);
            };

            const translations = {
                kk: {
                    library: "Мұра", reflection: "Толғаныс", zen: "Таным", connection: "Байланыс", challenge: "Сынақ", insights: "Даму",
                    level: "Деңгей", xp: "Тәжірибе", slogan: "Адамзаттың ойына ортақтас"
                },
                en: {
                    library: "Heritage", reflection: "Neural Reflection", zen: "Mindfulness", connection: "Knowledge Graph", challenge: "Logic Lab", insights: "Insights",
                    level: "Level", xp: "XP Progress", slogan: "Sharing the mind of humanity"
                }
            };

            const t = translations[lang];

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="fixed top-0 left-0 w-full z-[200] glass px-12 h-24 flex items-center justify-between border-b border-white/5 transition-all duration-700">
                        <div className="flex items-center gap-8">
                            <KazakhOrnament className="w-12 h-12 shadow-2xl" />
                            <div>
                                <h1 className="text-3xl font-black italic gold-gradient tracking-tighter uppercase leading-none">BILMEK</h1>
                                <p className="text-[10px] font-bold text-sageGray uppercase tracking-[0.6em] mt-1">{t.slogan}</p>
                            </div>
                        </div>

                        <nav className="hidden xl:flex items-center gap-14">
                            {['library', 'reflection', 'zen', 'connection', 'challenge', 'insights'].map(key => (
                                <button
                                    key={key} onClick={() => setTab(key)}
                                    className={`relative text-[11px] font-black uppercase tracking-[0.25em] transition-all duration-500 ${activeTab === key ? "text-amberGold" : "text-sageGray hover:text-platinum"}`}
                                >
                                    {t[key]}
                                    {activeTab === key && <span className="absolute -bottom-10 left-1/2 -translate-x-1/2 w-12 h-1 bg-amberGold rounded-full active-tab-indicator"></span>}
                                </button>
                            ))}
                        </nav>

                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex flex-col items-end mr-6">
                                <p className="text-[10px] font-black uppercase tracking-widest text-sageGray">{t.level} {level}</p>
                                <div className="w-40 h-2 bg-white/10 rounded-full mt-2 overflow-hidden border border-white/5">
                                    <div className="h-full bg-amberGold transition-all duration-1000 shadow-gold-glow" style={{ width: `${(xp % 1000) / 10}%` }}></div>
                                </div>
                            </div>
                            <button onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="w-12 h-12 rounded-2xl glass border border-white/10 flex items-center justify-center hover:text-amberGold transition-all"><Icon name={theme === 'dark' ? 'sun' : 'moon'} className="w-5 h-5" /></button>
                            <button onClick={() => setLang(lang === 'kk' ? 'en' : 'kk')} className="w-14 h-14 rounded-2xl glass border-2 border-white/10 text-[11px] font-black uppercase hover:bg-amberGold hover:text-obsidian transition-all duration-500">{lang}</button>
                        </div>
                    </header>

                    <main className="flex-1 pt-40 pb-24 px-12 max-w-7xl mx-auto w-full relative z-10">
                        {activeTab === 'library' && <HeritageModule lang={lang} addXp={addXp} />}
                        {activeTab === 'reflection' && <ReflectionModule lang={lang} addXp={addXp} />}
                        {activeTab === 'zen' && <ZenModule lang={lang} addXp={addXp} />}
                        {activeTab === 'connection' && <ConnectionModule lang={lang} addXp={addXp} />}
                        {activeTab === 'challenge' && <ChallengeModule lang={lang} addXp={addXp} />}
                        {activeTab === 'insights' && <InsightsModule lang={lang} xp={xp} level={level} addXp={addXp} />}
                    </main>

                    <footer className="py-16 border-t border-white/5 text-center px-12">
                         <p className="text-[11px] font-bold text-sageGray uppercase tracking-[1em] opacity-40">© 2026 Bilmek Ultimate • Neural Philosophical Intelligence Platform</p>
                    </footer>

                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}

                    <div className="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
                         <div className="absolute top-[-15%] left-[-15%] w-[50%] h-[50%] bg-amberGold/5 rounded-full blur-[140px]"></div>
                         <div className="absolute bottom-[-15%] right-[-15%] w-[50%] h-[50%] bg-amberGold/5 rounded-full blur-[140px]"></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
