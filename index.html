        :root {

            box-shadow: 0 15px 45px -10px rgba(0, 163, 255, 0.2);

        /* 3D Liquid Dynamics - V2 */
        .tank-3d {
            perspective: 1200px;
            position: relative;
        }

        .tank-cylinder {
            width: 90px;
            height: 160px;
            background: linear-gradient(145deg, #060a16, #1c2541);
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .liquid-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            transition: height 2s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(to top, var(--sme-secondary), var(--sme-primary));
        }

        .liquid-wave-fast {
            position: absolute;
            top: -15px;
            left: -50%;
            width: 200%;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 43%;
            animation: waveMove 3s linear infinite;
        }

        .liquid-wave-slow {
            position: absolute;
            top: -20px;
            left: -40%;
            width: 200%;
            height: 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40%;
            animation: waveMove 7s linear infinite reverse;
        }

        @keyframes waveMove {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Custom UI Elements */
        .shimmer-btn {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        .btn-primary {
            @apply bg-smeBlue-600 hover:bg-smeBlue-500 text-white font-black py-4 px-10 rounded-2xl transition-all shadow-xl shadow-smeBlue-600/20 active:scale-95;
        }

        .badge-active { @apply bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest; }
        .badge-warning { @apply bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest; }
        .badge-danger { @apply bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest; }

        /* Navigation */
        .nav-link { position: relative; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            width: 0;
            height: 3px;
            background: linear-gradient(to right, #00a3ff, #0072ff);
            transition: all 0.4s ease;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .nav-link.active::after { width: 100%; }

        /* Scroller Styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 163, 255, 0.4); border-radius: 10px; border: 2px solid #0b1329; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 163, 255, 0.7); }

        /* Maps & UI Overlays */
        .map-marker {
            @apply absolute w-6 h-6 bg-smeBlue-600 border-4 border-white rounded-full cursor-pointer transition-transform hover:scale-150 z-10;

        /* Typography */

            @apply text-7xl font-black italic tracking-tighter uppercase leading-[0.85];

        .bio-gradient {
            background: linear-gradient(135deg, #1c2541 0%, #0b1329 100%);
        }
    </style>
