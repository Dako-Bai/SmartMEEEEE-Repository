        body {
            background-color: #0b1329;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(18, 31, 61, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 3D Tank Styles */
        .tank-cylinder {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                rgba(30, 41, 59, 0.9) 0%,
                rgba(71, 85, 105, 0.4) 50%,
                rgba(30, 41, 59, 0.9) 100%);
            border-radius: 10px / 20px;
            box-shadow:
                inset 0 0 30px rgba(0,0,0,0.7),
                0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tank-glint {
            position: absolute;
            top: 0;
            left: 20%;
            width: 15%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            z-index: 15;
            pointer-events: none;
        }

        .tank-top {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(90deg, #334155, #64748b, #334155);
            border-radius: 50%;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3);
        }

        /* Liquid Wave Animation */
        .liquid-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1;
        }

        .wave {
            position: absolute;
            top: -15px;
            left: 0;
            width: 200%;
            height: 30px;
            background: inherit;
            border-radius: 38%;
            opacity: 0.8;
            filter: brightness(1.1);
        }

        .wave-1 { animation: waveMoveSlow 5s linear infinite; }
        .wave-2 { animation: waveMoveFast 3s linear infinite reverse; top: -20px; opacity: 0.4; }

        @keyframes waveMoveSlow {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }
        @keyframes waveMoveFast {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(-360deg); }
        }

        /* Water level styling */
        .water-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #0f766e 0%, #14b8a6 50%, #0f766e 100%);
            z-index: 5;
            transition: height 1s ease-in-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b1329; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

            if (window.lucide) {
                window.lucide.createIcons({ node: toast });
            }

                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';

                    window.lucide.createIcons({

                        attrs: { class: className }

                }
            }, [name, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const InventoryChart = ({ t }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const data = [65, 82, 45, 90, 70, 85, 95];

                ctx.clearRect(0, 0, 800, 200);

                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                for(let i=0; i<6; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * 40);
                    ctx.lineTo(800, i * 40);
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.strokeStyle = '#fcd34d';
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                const step = 800 / (data.length - 1);
                data.forEach((val, i) => {
                    const x = i * step;
                    const y = 200 - (val / 100 * 180);
                    if(i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                ctx.lineTo(800, 200);
                ctx.lineTo(0, 200);
                const grad = ctx.createLinearGradient(0, 0, 0, 200);
                grad.addColorStop(0, 'rgba(252, 211, 77, 0.2)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.fillStyle = '#fcd34d';
                data.forEach((val, i) => {
                    const x = i * step;
                    const y = 200 - (val / 100 * 180);
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });

        const MonitoringHub = ({ t, depotTanks, stations, onRefresh }) => (

        const FuelCalculator = ({ t, prices, lang, onApplyToForm }) => {
            const [selectedFuel, setSelectedFuel] = useState('diesel');
            const [volume, setVolume] = useState(15000);
            const [region, setRegion] = useState('Astana');

            const currentPrice = useMemo(() => {
                return prices[selectedFuel]?.[lang] || prices[selectedFuel]?.kk || 0;
            }, [prices, selectedFuel, lang]);

            const logisticsCostPerLiter = {
                Almaty: 4,
                Astana: 8,
                Shymkent: 3,
                Kokshetau: 9,
                Aktau: 14
            };

            const calculation = useMemo(() => {
                const basePrice = volume * currentPrice;
                const logisticsPrice = volume * (logisticsCostPerLiter[region] || 5);

                // Volume discounts (көлемдік жеңілдіктер)
                let discountPercent = 0;
                if (volume >= 50000) discountPercent = 0.05; // 5%
                else if (volume >= 20000) discountPercent = 0.03; // 3%
                else if (volume >= 10000) discountPercent = 0.015; // 1.5%

                const baseDiscount = basePrice * discountPercent;
                const subtotal = basePrice + logisticsPrice - baseDiscount;
                const vat = subtotal * 0.12; // 12% VAT (ҚҚС)
                const total = subtotal + vat;

                return {
                    basePrice,
                    logisticsPrice,
                    discountPercent: (discountPercent * 100).toFixed(1),
                    discountAmount: baseDiscount,
                    subtotal,
                    vat,
                    total
                };
            }, [volume, currentPrice, region]);

                                        <option value="Astana">Астана (Логистика: +8 ₸/л)</option>

                    logAction(`Тіркелуге жаңа өтінім жіберілді: ${name}`, 'Қонақ');
                    trackVisit('Авторизация', 'Жаңа тіркелу өтінімін қалдырды');
                    showToast('Өтінім жіберілді. Менеджер жауабын күтіңіз.', 'success');
                    setAuthMode('login');
                    return;
                }
                const email = e.target.email.value;
                if (email === 'admin@sme.kz') {
                    setUser({ name: 'Super Admin', role: 'admin' });
                    logAction('Жүйеге кіру (Админ)', 'Super Admin');
                    trackVisit('Басқару панелі', 'Жүйеге кірді (Админ)');
                } else {
                    const clientName = email.split('@')[0];
                    setUser({ name: clientName, role: 'client' });
                    logAction('Жүйеге кіру (Клиент)', clientName);
                    trackVisit('Клиент хабы', 'Жүйеге кірді (Клиент)');
                }
            };

            const handleLogout = () => {
                logAction('Жүйеден шығу', user?.name || 'Қолданушы');
                trackVisit('Шығу', 'Жүйеден шықты');
                setUser(null);
                setCurrentTab('monitoring');
            };

            const handleRefreshData = () => {
                setDepotState(prev => prev.map(tank => ({
                    ...tank,
                    current: Math.round(Math.random() * (tank.capacity - 200) + 200)
                })));
                showToast('Мәліметтер жаңартылды', 'success');
                trackVisit('Мониторинг', '3D отын деңгейінің мәліметтерін қолмен жаңартты');
            };

            const handleNewB2bOrder = (order) => {
                setB2bOrders(prev => [order, ...prev]);
                logAction(`Жаңа көтерме отын тапсырысы қосылды: ${order.company}`, order.company);
                trackVisit('Тапсырыстар', `${order.company} БИН ${order.bin} үшін отын тапсырысын жіберді`);
            };

            const handleUpdateOrderStatus = (orderId, status) => {
                setB2bOrders(prev => prev.map(o => o.id === orderId ? { ...o, status } : o));
                logAction(`Тапсырыс күйі жаңартылды: #${orderId.slice(-4)} -> ${status}`, user.name);
                trackVisit('Әкімшілік', `Тапсырыс статусын ${status} күйіне ауыстырды`);
            };

            const handleDocumentDownload = (doc) => {
                setDocuments(prev => prev.map(d => d.id === doc.id ? { ...d, downloads: d.downloads + 1 } : d));
                trackVisit('Жүктеу орталығы', `Құжат жүктелді: ${doc.title}`);
            };

            const handlePrefillApply = (values) => {
                setCalcPrefill(values);
                setCurrentTab('orderForm');
                showToast('Калькулятор мәліметтері тапсырыс формасына енгізілді', 'info');
                trackVisit('Калькулятор', 'Есептеу нәтижесін тапсырыс формасына өткізді');
            };

            // Track page view logs on menu clicks
            useEffect(() => {
                if (user) {
                    trackVisit(t[currentTab] || currentTab, `Бетті қарады: ${t[currentTab] || currentTab}`);
                }
            }, [currentTab, user]);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-royalBlue/20 rounded-full blur-[120px]"></div>
                            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-mercuryGold/10 rounded-full blur-[120px]"></div>
                        </div>

                        <div className="w-full max-w-md glass p-10 rounded-[40px] shadow-2xl relative z-10 animate-fade-in">
                            <div className="flex flex-col items-center mb-10">
                                <div className="w-16 h-16 bg-mercuryGold rounded-2xl flex items-center justify-center text-cosmicDeep shadow-2xl shadow-amber-400/20 mb-6">
                                    <LucideIcon name="zap" className="w-10 h-10 fill-current text-cosmicDeep" />
                                </div>
                                <h1 className="text-2xl font-display font-black uppercase tracking-tighter italic">Smart Mercury Energy</h1>
                                <p className="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2">Enterprise Solutions v3.5</p>
                            </div>

                            <div className="flex bg-white/5 p-1 rounded-2xl mb-8">
                                <button
                                    type="button"
                                    onClick={() => setAuthMode('login')}
                                    className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${authMode === 'login' ? 'bg-mercuryGold text-cosmicDeep' : 'text-slate-400'}`}
                                >
                                    Кіру
                                </button>
                                <button
                                    type="button"
                                    onClick={() => setAuthMode('register')}
                                    className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${authMode === 'register' ? 'bg-mercuryGold text-cosmicDeep' : 'text-slate-400'}`}
                                >
                                    Тіркелу
                                </button>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-6">
                                {authMode === 'register' && (
                                    <div className="space-y-4 animate-fade-in">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Компания атауы</label>
                                            <input name="companyName" type="text" required className="w-full bg-cosmicDeep border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold focus:border-mercuryGold transition-all outline-none text-white" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">БИН</label>
                                            <input name="bin" type="text" required maxLength="12" placeholder="123456789012" className="w-full bg-cosmicDeep border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold focus:border-mercuryGold transition-all outline-none text-white" />
                                        </div>
                                    </div>
                                )}
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Email</label>
                                    <input
                                        name="email"
                                        type="email"
                                        required
                                        placeholder={authMode === 'login' ? "admin@sme.kz" : "info@company.kz"}
                                        className="w-full bg-cosmicDeep border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold focus:border-mercuryGold transition-all outline-none text-white"
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Құпиясөз</label>
                                    <input
                                        name="password"
                                        type="password"
                                        required
                                        placeholder="••••••••"
                                        className="w-full bg-cosmicDeep border border-white/10 rounded-2xl px-6 py-4 text-sm font-bold focus:border-mercuryGold transition-all outline-none text-white"
                                    />
                                </div>
                                <button className="w-full bg-mercuryGold text-cosmicDeep py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-amber-400/10 hover:bg-white transition-all transform active:scale-95">
                                    {authMode === 'login' ? 'Жүйеге кіру' : 'Өтінім жіберу'}
                                </button>
                            </form>

                            <div className="mt-8 text-center">
                                <a href="#" className="text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-white transition-colors">Құпиясөзді ұмыттыңыз ба?</a>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <Sidebar currentTab={currentTab} setTab={setCurrentTab} t={t} role={user.role} />

                    {/* Floating Notifications */}
                    <div className="fixed bottom-10 right-10 z-[100] w-80">
                        {notifications.map(n => (
                            <NotificationToast key={n.id} notif={n} onClose={() => setNotifications(prev => prev.filter(x => x.id !== n.id))} />
                        ))}
                    </div>

                    <main className="pl-20 lg:ml-64 transition-all duration-300">
                        {/* Header */}
                        <header className="h-24 px-8 flex items-center justify-between sticky top-0 bg-cosmicDeep/80 backdrop-blur-xl z-40 border-b border-white/5">
                            <div className="flex items-center gap-4">
                                <div className="hidden lg:flex items-center gap-2 px-4 py-2 bg-white/5 rounded-2xl border border-white/10 text-xs font-bold text-slate-400">
                                    <LucideIcon name="clock" className="w-4 h-4" />
                                    <span>{new Date().toLocaleDateString()}</span>
                                </div>
                            </div>

                            <div className="flex items-center gap-6">
                                {/* Language Switcher */}
                                <div className="flex p-1 bg-white/5 rounded-2xl border border-white/10">
                                    {['kk', 'ru', 'en'].map(l => (
                                        <button
                                            key={l}
                                            onClick={() => setLang(l)}
                                            className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-tighter transition-all ${lang === l ? "bg-mercuryGold text-cosmicDeep shadow-lg shadow-amber-400/20" : "text-slate-400 hover:text-white"}`}
                                        >
                                            {l}
                                        </button>
                                    ))}
                                </div>

                                <div className="w-12 h-12 glass rounded-2xl flex items-center justify-center text-white relative hover:scale-105 transition-transform cursor-pointer">
                                    <LucideIcon name="bell" />
                                    <span className="absolute top-2 right-2 w-2.5 h-2.5 bg-royalBlue rounded-full border-2 border-cosmicDeep"></span>
                                </div>

                                <div className="flex items-center gap-4 pl-6 border-l border-white/10">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-sm font-black text-white italic tracking-tight">{user.name}</p>
                                        <p className="text-[10px] font-bold text-mercuryGold uppercase tracking-widest opacity-70">{user.role === 'admin' ? 'Chief Hub Controller' : 'Client Access'}</p>
                                    </div>
                                    <button
                                        onClick={handleLogout}
                                        className="w-12 h-12 bg-mercuryGold rounded-2xl shadow-xl shadow-amber-400/10 flex items-center justify-center font-black text-cosmicDeep italic hover:bg-white transition-all"
                                    >
                                        <LucideIcon name="log-out" className="w-5 h-5 text-cosmicDeep" />
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Page Content */}
                        <div className="p-8 max-w-7xl mx-auto">
                            {currentTab === 'monitoring' && (
                                <MonitoringHub
                                    t={t}
                                    depotTanks={depotTanks}
                                    stations={stations}
                                    onRefresh={handleRefreshData}
                                />
                            )}
                            {currentTab === 'calculator' && (
                                <FuelCalculator
                                    t={t}
                                    prices={prices}
                                    lang={lang}
                                    onApplyToForm={handlePrefillApply}
                                />
                            )}
                            {currentTab === 'orderForm' && (
                                <B2bOrderForm
                                    t={t}
                                    initialValues={calcPrefill}
                                    onSubmitOrder={handleNewB2bOrder}
                                    userRole={user.role}
                                    b2bOrders={b2bOrders}
                                    onUpdateStatus={handleUpdateOrderStatus}
                                />
                            )}
                            {currentTab === 'downloadHub' && (
                                <DownloadHub
                                    t={t}
                                    documents={documents}
                                    onDownload={handleDocumentDownload}
                                />
                            )}
                            {currentTab === 'prices' && (
                                <PriceManagement
                                    t={t}
                                    prices={prices}
                                    setPrices={setPrices}
                                    onSave={() => {
                                        logAction('Жанармай бағалары өзгертілді', user.name);
                                        showToast('Бағалар сәтті сақталды', 'success');
                                    }}
                                    lang={lang}
                                />
                            )}
                            {currentTab === 'analytics' && (
                                <VisitorAnalytics
                                    t={t}
                                    analyticsLogs={analyticsLogs}
                                    b2bOrders={b2bOrders}
                                />
                            )}
                            {currentTab === 'admin' && (
                                <AdminPanel
                                    t={t}
                                    stations={stations}
                                    setStations={setStations}
                                    logAction={(msg) => logAction(msg, user.name)}
                                />
                            )}
                            {currentTab === 'requests' && (
                                <UserRequests
                                    t={t}
                                    userRequests={userRequests}
                                    setUserRequests={setUserRequests}
                                    registeredUsers={registeredUsers}
                                    setRegisteredUsers={setRegisteredUsers}
                                    logAction={(msg) => logAction(msg, user.name)}
                                />
                            )}
                            {currentTab === 'audit' && (
                                <AuditLogs
                                    t={t}
                                    logs={logs}
                                />
                            )}
                        </div>
                    </main>

                    {/* Footer Background Effect */}
                    <div className="fixed bottom-0 right-0 w-[500px] h-[500px] bg-royalBlue/5 blur-[150px] -z-10 rounded-full"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
