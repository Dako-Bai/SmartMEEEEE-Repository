<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilmek | Адамзаттың асыл мұрасы</title>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: {
                            50: '#f4f7f4',
                            100: '#e8ece8',
                            200: '#d1dbd1',
                            300: '#adbdb1',
                            400: '#7f9684',
                            500: '#5d7363',
                            600: '#485c4d',
                            700: '#3a4a3e',
                            800: '#2f3b32',
                            900: '#27312a',
                        },
                        gold: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        },
                        premiumDark: '#1a1f1c',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'premium': '0 20px 50px rgba(0, 0, 0, 0.05)',
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        :root {
            --sage-gradient: linear-gradient(135deg, #f4f7f4 0%, #e8ece8 100%);
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #fcd34d 100%);
        }

        body {
            background-color: #f4f7f4;
            color: #27312a;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .premium-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark-glass {
            background: rgba(39, 49, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ornament-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z' fill='%235d7363' fill-opacity='0.02'/%3E%3C/svg%3E");
        }

        .constellation-node {
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .constellation-node:hover {
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
            transform: scale(1.1);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-underline {
            position: relative;
        }
        .nav-underline::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #d4af37;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .nav-underline:hover::after, .nav-active::after {
            width: 100%;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f4f7f4; }
        ::-webkit-scrollbar-thumb { background: #adbdb1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #7f9684; }

        .btn-premium {
            background: var(--gold-gradient);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body class="ornament-pattern min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- Premium Localization ---
        const translations = {
            kk: {
                appName: "Bilmek",
                slogan: "Адамзаттың ойына ортақтас",
                nav: {
                    collection: "Мұра",
                    diary: "Толғаныс",
                    daily: "Таным",
                    map: "Байланыс",
                    quiz: "Сынақ",
                },
                common: {
                    search: "Іздеу...",
                    streak: "Күндік айналым",
                    badges: "Жетістіктер",
                    share: "Бөлісу",
                    download: "Жүктеу",
                    score: "Нәтиже",
                    next: "Келесі",
                    back: "Артқа",
                    save: "Сақтау",
                    cancel: "Болдырмау",
                    delete: "Өшіру",
                    edit: "Өңдеу",
                },
                streakMsg: "Сіз қатарынан {n} күн бойы ізденістесіз!",
                badgesList: {
                    thinker: "Ойшыл",
                    philosopher: "Философ",
                    sage: "Дана"
                }
            },
            en: {
                appName: "Bilmek",
                slogan: "Sharing Human Thought",
                nav: {
                    collection: "Heritage",
                    diary: "Reflections",
                    daily: "Wisdom",
                    map: "Constellation",
                    quiz: "Challenge",
                },
                common: {
                    search: "Search...",
                    streak: "Daily Streak",
                    badges: "Achievements",
                    share: "Share",
                    download: "Download",
                    score: "Score",
                    next: "Next",
                    back: "Back",
                    save: "Save",
                    cancel: "Cancel",
                    delete: "Delete",
                    edit: "Edit",
                },
                streakMsg: "You have been exploring for {n} days straight!",
                badgesList: {
                    thinker: "Thinker",
                    philosopher: "Philosopher",
                    sage: "Sage"
                }
            }
        };

        // --- Deepened Mock Data ---
        const initialThoughts = [
            {
                id: 1, author: "Abai Qunanbaiuly",
                text: { kk: "Адам болам десеңіз, оған себепші бес нәрсе бар: өсек, өтірік, мақтаншақ, еріншек, бекер мал шашпақ - бұлардан сақ бол.", en: "If you want to be a man, beware of five things: gossip, lying, boasting, laziness, and wasting wealth." },
                category: "wisdom", tags: ["morality", "values"]
            },
            {
                id: 2, author: "Al-Farabi",
                text: { kk: "Тәрбиесіз берілген білім — адамзаттың қас жауы.", en: "Knowledge without upbringing is the enemy of mankind." },
                category: "wisdom", tags: ["education", "ethics"]
            },
            {
                id: 3, author: "Shakarim Kudaiberdiuly",
                text: { kk: "Ар-ұяттың күзеті — әркімнің өз жүрегінде.", en: "The guardian of conscience is in everyone's heart." },
                category: "life", tags: ["conscience", "heart"]
            },
            {
                id: 4, author: "Marcus Aurelius",
                text: { kk: "Өміріңнің бақыты ойыңның сапасына байланысты.", en: "The happiness of your life depends upon the quality of your thoughts." },
                category: "life", tags: ["mindset", "stoicism"]
            },
            {
                id: 5, author: "Socrates",
                text: { kk: "Мен ешнәрсе білмейтінімді білемін.", en: "I know that I know nothing." },
                category: "wisdom", tags: ["humility", "knowledge"]
            },
            {
                id: 6, author: "Khoja Akhmet Yasawi",
                text: { kk: "Көңіліңді таза ұста, сонда ғана шындыққа жетесің.", en: "Keep your heart clean, only then will you reach the truth." },
                category: "wisdom", tags: ["spirituality", "truth"]
            },
            {
                id: 7, author: "Seneca",
                text: { kk: "Уақыт — біздің ең қымбат қазынамыз.", en: "Time is our most precious treasure." },
                category: "time", tags: ["stoicism", "value"]
            }
        ];

        // --- Helper Components ---
        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: iconRef.current, attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const KazakhOrnament = ({ className = "w-12 h-12 text-sage-300" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="currentColor">
                <path d="M50 0 C 60 20 80 30 100 30 C 80 30 70 50 70 70 C 70 90 50 100 50 100 C 50 100 30 90 30 70 C 30 50 20 30 0 30 C 20 30 40 20 50 0" />
            </svg>
        );

        // --- Gamification Logic ---
        const useGamification = () => {
            const [streak, setStreak] = useState(() => parseInt(localStorage.getItem('bilmek_streak') || '0'));
            const [badges, setBadges] = useState(() => JSON.parse(localStorage.getItem('bilmek_badges') || '[]'));

            const incrementStreak = useCallback(() => {
                const today = new Date().toDateString();
                const lastDate = localStorage.getItem('bilmek_last_visit');
                if (lastDate !== today) {
                    const newStreak = lastDate === new Date(Date.now() - 86400000).toDateString() ? streak + 1 : 1;
                    setStreak(newStreak);
                    localStorage.setItem('bilmek_streak', newStreak);
                    localStorage.setItem('bilmek_last_visit', today);
                }
            }, [streak]);

            const awardBadge = useCallback((badge) => {
                if (!badges.includes(badge)) {
                    const newBadges = [...badges, badge];
                    setBadges(newBadges);
                    localStorage.setItem('bilmek_badges', JSON.stringify(newBadges));
                }
            }, [badges]);

            return { streak, badges, incrementStreak, awardBadge };
        };

        // --- UI Modules ---

        const DailyThoughtModule = ({ t, lang, awardBadge }) => {
            const questions = [
                { id: 1, q: { kk: "Бүгін сізді не қуантты және неге?", en: "What made you happy today and why?" } },
                { id: 2, q: { kk: "Егер уақытты тоқтата алсаңыз, қай сәтті таңдар едіңіз?", en: "If you could stop time, which moment would you choose?" } }
            ];
            const [val, setVal] = useState('');
            const [done, setDone] = useState(false);
            const q = questions[new Date().getDate() % questions.length];

            const submit = () => {
                if (!val.trim()) return;
                setDone(true);
                awardBadge('sage');
            };

            return (
                <div className="max-w-3xl mx-auto animate-fade-in">
                    <div className="premium-glass p-16 rounded-[60px] text-center space-y-12 shadow-premium relative overflow-hidden">
                        <KazakhOrnament className="w-20 h-20 text-gold-100 absolute top-[-20px] left-[-20px] opacity-40" />
                        <div className="space-y-4">
                            <span className="text-[10px] font-black uppercase tracking-[0.4em] text-gold-500">Daily Inquiry</span>
                            <h3 className="text-4xl font-serif italic text-sage-900 leading-tight">{q.q[lang]}</h3>
                        </div>
                        {!done ? (
                            <div className="space-y-8">
                                <textarea
                                    value={val} onChange={e => setVal(e.target.value)}
                                    placeholder="..."
                                    className="w-full h-48 bg-white/40 border border-sage-100 rounded-[40px] p-10 text-2xl font-serif italic outline-none focus:bg-white focus:border-gold-300 transition-all shadow-inner"
                                />
                                <button onClick={submit} className="btn-premium text-gold-900 px-16 py-5 rounded-[25px] text-xs font-black uppercase tracking-widest">Жауап беру</button>
                            </div>
                        ) : (
                            <div className="py-20 space-y-8 animate-fade-in">
                                <div className="w-24 h-24 bg-gold-100 rounded-full flex items-center justify-center text-gold-600 mx-auto shadow-xl"><LucideIcon name="check" className="w-12 h-12" /></div>
                                <h4 className="text-2xl font-bold text-sage-900 uppercase tracking-widest">Түйін жасалды</h4>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const DiaryModule = ({ t, lang, awardBadge }) => {
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('bilmek_diary') || '[]'));
            const [text, setText] = useState('');

            const save = () => {
                if (!text.trim()) return;
                const newEntries = [{ id: Date.now(), text, date: new Date().toLocaleDateString() }, ...entries];
                setEntries(newEntries);
                localStorage.setItem('bilmek_diary', JSON.stringify(newEntries));
                setText('');
                if (newEntries.length >= 3) awardBadge('philosopher');
            };

            return (
                <div className="max-w-4xl mx-auto space-y-12 animate-fade-in">
                    <div className="premium-glass p-12 rounded-[50px] shadow-glass border-l-8 border-gold-400">
                        <textarea
                            value={text} onChange={e => setText(e.target.value)}
                            placeholder={lang === 'kk' ? "Ой толғау..." : "Write your reflections..."}
                            className="w-full h-48 bg-transparent text-2xl font-serif italic outline-none resize-none placeholder:text-sage-300"
                        />
                        <div className="mt-8 flex justify-end">
                            <button onClick={save} className="btn-premium text-gold-900 px-12 py-4 rounded-3xl font-black uppercase text-xs tracking-widest">Түю</button>
                        </div>
                    </div>
                    <div className="space-y-8">
                        {entries.map(e => (
                            <div key={e.id} className="premium-glass p-10 rounded-[40px] border-b border-sage-100">
                                <p className="text-[10px] font-black text-gold-500 uppercase tracking-widest mb-4 italic">{e.date}</p>
                                <p className="text-xl font-serif leading-relaxed text-sage-800">{e.text}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const QuizModule = ({ t, lang, awardBadge }) => {
            const quizData = [
                {
                    id: 1, difficulty: 'easy',
                    question: { kk: "«Өміріңнің бақыты ойыңның сапасына байланысты» - авторы кім?", en: "«The happiness of your life depends upon the quality of your thoughts» - author?" },
                    options: ["Abai", "Marcus Aurelius", "Socrates", "Al-Farabi"],
                    correct: "Marcus Aurelius"
                },
                {
                    id: 2, difficulty: 'medium',
                    question: { kk: "Әл-Фараби бойынша: «... берілген білім - адамзаттың қас жауы»", en: "According to Al-Farabi: «Knowledge given without ... is the enemy of mankind»" },
                    options: { kk: ["Көп", "Тәрбиесіз", "Кеш", "Ақысыз"], en: ["Wealth", "Upbringing", "Time", "Effort"] },
                    correctIndex: 1
                },
                {
                    id: 3, difficulty: 'hard',
                    question: { kk: "«Ар-ұяттың күзеті — әркімнің өз жүрегінде» - кімнің сөзі?", en: "«The guardian of conscience is in everyone's heart» - whose words?" },
                    options: ["Shakarim", "Abai", "Yasawi", "Zhumabayev"],
                    correct: "Shakarim"
                }
            ];

            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [finished, setFinished] = useState(false);
            const [selected, setSelected] = useState(null);

            const q = quizData[currentQ];

            const handleAnswer = (idx, label) => {
                setSelected(idx);
                const isCorrect = typeof q.options === 'object' && !Array.isArray(q.options) ? idx === q.correctIndex : label === q.correct;
                if (isCorrect) setScore(score + 1);

                setTimeout(() => {
                    if (currentQ < quizData.length - 1) {
                        setCurrentQ(currentQ + 1);
                        setSelected(null);
                    } else {
                        setFinished(true);
                        if (score >= 2) awardBadge('thinker');
                    }
                }, 1000);
            };

            if (finished) {
                return (
                    <div className="max-w-xl mx-auto premium-glass p-16 rounded-[60px] text-center animate-fade-in shadow-glass">
                        <KazakhOrnament className="w-16 h-16 text-gold-200 mx-auto mb-8" />
                        <h3 className="text-3xl font-display font-black uppercase italic tracking-tighter">Сынақ аяқталды</h3>
                        <p className="text-7xl font-black text-sage-900 my-10">{score} / {quizData.length}</p>
                        <button
                            onClick={() => { setFinished(false); setCurrentQ(0); setScore(0); }}
                            className="w-full btn-premium text-gold-900 py-5 rounded-3xl text-xs font-black uppercase tracking-widest"
                        >
                            Қайта тапсыру
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto animate-fade-in">
                    <div className="premium-glass p-12 rounded-[50px] space-y-12 shadow-glass border-4 border-white">
                        <div className="flex justify-between items-center">
                             <div className="space-y-1">
                                <span className="text-[9px] font-black uppercase tracking-widest text-sage-400">Difficulty: {q.difficulty}</span>
                                <p className="text-xs font-bold text-gold-600 uppercase tracking-widest">Question {currentQ+1}/{quizData.length}</p>
                             </div>
                             <div className="flex gap-1.5">
                                {quizData.map((_, i) => <div key={i} className={`h-1.5 w-10 rounded-full transition-all duration-500 ${i <= currentQ ? 'bg-gold-400' : 'bg-sage-100'}`}></div>)}
                             </div>
                        </div>

                        <h3 className="text-3xl font-serif italic text-sage-900 leading-tight">{q.question[lang]}</h3>

                        <div className="grid grid-cols-1 gap-4">
                            {(Array.isArray(q.options) ? q.options : q.options[lang]).map((opt, i) => (
                                <button
                                    key={i} onClick={() => handleAnswer(i, opt)} disabled={selected !== null}
                                    className={`p-6 rounded-3xl text-left font-bold transition-all border-2 flex items-center gap-6 ${
                                        selected === i
                                        ? ((Array.isArray(q.options) ? opt === q.correct : i === q.correctIndex) ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-red-50 border-red-500 text-red-700')
                                        : 'bg-white border-sage-100 hover:border-gold-300 hover:bg-gold-50/30 text-sage-600'
                                    }`}
                                >
                                    <span className="w-10 h-10 rounded-2xl bg-sage-50 text-sage-400 flex items-center justify-center text-xs font-black">{String.fromCharCode(65 + i)}</span>
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const QuoteCard = ({ thought, lang, onShare }) => (
            <div className="premium-glass p-8 rounded-[40px] flex flex-col justify-between hover:shadow-premium transition-all duration-500 group relative overflow-hidden">
                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <KazakhOrnament className="w-24 h-24" />
                </div>
                <div className="space-y-6 relative z-10">
                    <div className="flex justify-between items-start">
                        <div className="w-10 h-10 bg-gold-100 rounded-full flex items-center justify-center text-gold-600">
                            <LucideIcon name="quote" className="w-5 h-5" />
                        </div>
                        <button onClick={() => onShare(thought)} className="p-2 text-sage-400 hover:text-gold-600 transition-colors">
                            <LucideIcon name="share-2" className="w-4 h-4" />
                        </button>
                    </div>
                    <p className="text-2xl font-serif italic leading-relaxed text-sage-900 group-hover:text-black transition-colors">
                        "{thought.text[lang]}"
                    </p>
                </div>
                <div className="mt-8 pt-6 border-t border-sage-100 relative z-10">
                    <h4 className="font-display font-bold text-sm uppercase tracking-wider text-gold-700">{thought.author}</h4>
                    <div className="flex gap-2 mt-2">
                        {thought.tags.map(tag => (
                            <span key={tag} className="text-[9px] font-black uppercase tracking-widest text-sage-400 bg-sage-50 px-2 py-0.5 rounded-full">#{tag}</span>
                        ))}
                    </div>
                </div>
            </div>
        );

        const QuoteGenerator = ({ thought, lang, onClose }) => {
            const cardRef = useRef(null);
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm animate-fade-in">
                    <div className="max-w-xl w-full bg-white rounded-[50px] overflow-hidden shadow-2xl animate-float">
                        <div ref={cardRef} className="p-16 bg-[#fcfdfc] relative flex flex-col items-center text-center space-y-10">
                            <KazakhOrnament className="w-32 h-32 text-gold-200 absolute top-[-40px] opacity-30" />
                            <div className="w-12 h-1 bg-gold-400 rounded-full"></div>
                            <p className="text-3xl font-serif italic text-sage-900 leading-tight">"{thought.text[lang]}"</p>
                            <div className="space-y-2">
                                <h4 className="text-sm font-display font-black uppercase tracking-[0.3em] text-gold-600">{thought.author}</h4>
                                <p className="text-[10px] font-bold text-sage-400 uppercase tracking-widest italic">Bilmek App Heritage</p>
                            </div>
                            <div className="w-12 h-1 bg-gold-400 rounded-full"></div>
                            <KazakhOrnament className="w-32 h-32 text-gold-200 absolute bottom-[-40px] opacity-30 rotate-180" />
                        </div>
                        <div className="p-6 bg-sage-50 flex justify-center gap-4">
                            <button onClick={onClose} className="px-8 py-3 rounded-2xl text-xs font-black uppercase tracking-widest text-sage-400 hover:text-sage-600 transition-all">Close</button>
                            <button className="btn-premium text-gold-900 px-10 py-3 rounded-2xl text-xs font-black uppercase tracking-widest" onClick={() => window.print()}>Print / Save</button>
                        </div>
                    </div>
                </div>
            );
        };

        const HeritageModule = ({ t, lang, thoughts, onShare }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const filtered = thoughts.filter(q => q.author.toLowerCase().includes(searchTerm.toLowerCase()) || q.text[lang].toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="space-y-12 animate-fade-in">
                    <div className="flex flex-col md:flex-row gap-6 items-center justify-between premium-glass p-8 rounded-[40px] shadow-glass">
                        <div className="relative w-full md:w-1/2">
                            <LucideIcon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-sage-400 w-5 h-5" />
                            <input
                                type="text" placeholder={t.common.search}
                                value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                className="w-full bg-white/50 border border-white rounded-[25px] pl-16 pr-6 py-4 text-sm focus:border-gold-400 outline-none transition-all shadow-inner"
                            />
                        </div>
                        <div className="flex items-center gap-4 text-sage-400 font-bold uppercase text-[10px] tracking-[0.2em]">
                            <LucideIcon name="filter" className="w-4 h-4" />
                            <span>Discovering {filtered.length} insights</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                        {filtered.map(thought => <QuoteCard key={thought.id} thought={thought} lang={lang} onShare={onShare} />)}
                    </div>
                </div>
            );
        };

        const ConstellationMap = ({ t, lang }) => {
            const nodes = [
                { id: 1, label: { kk: 'Жан', en: 'Soul' }, x: 400, y: 300, glow: '#fcd34d' },
                { id: 2, label: { kk: 'Ар', en: 'Conscience' }, x: 250, y: 150, glow: '#fbbf24' },
                { id: 3, label: { kk: 'Махаббат', en: 'Love' }, x: 550, y: 150, glow: '#fbbf24' },
                { id: 4, label: { kk: 'Еркіндік', en: 'Freedom' }, x: 200, y: 450, glow: '#fbbf24' },
                { id: 5, label: { kk: 'Уақыт', en: 'Time' }, x: 600, y: 450, glow: '#fbbf24' },
                { id: 6, label: { kk: 'Шындық', en: 'Truth' }, x: 400, y: 80, glow: '#adbdb1' },
            ];
            const links = [ {s:1, t:2}, {s:1, t:3}, {s:1, t:4}, {s:1, t:5}, {s:2, t:6} ];

            return (
                <div className="premium-glass rounded-[60px] p-12 overflow-hidden animate-fade-in shadow-glass border-4 border-white">
                    <div className="relative aspect-video bg-premiumDark/5 rounded-[40px] overflow-hidden">
                        <svg viewBox="0 0 800 600" className="w-full h-full">
                            {links.map((l, i) => {
                                const sn = nodes.find(n => n.id === l.s), tn = nodes.find(n => n.id === l.t);
                                return <line key={i} x1={sn.x} y1={sn.y} x2={tn.x} y2={tn.y} stroke="#d1dbd1" strokeWidth="1" strokeDasharray="10,10" className="animate-pulse" />;
                            })}
                            {nodes.map(n => (
                                <g key={n.id} className="constellation-node cursor-pointer group">
                                    <circle cx={n.x} cy={n.y} r="35" fill="white" stroke={n.glow} strokeWidth="3" />
                                    <text x={n.x} y={n.y + 6} textAnchor="middle" className="text-[11px] font-black uppercase tracking-tighter fill-sage-900">{n.label[lang]}</text>
                                </g>
                            ))}
                        </svg>
                        <div className="absolute top-10 left-10 pointer-events-none">
                            <h3 className="text-xl font-serif italic text-sage-800">Idea Constellation</h3>
                            <p className="text-[10px] font-black uppercase tracking-widest text-sage-400 mt-2">Exploring conceptual links</p>
                        </div>
                    </div>
                </div>
            );
        };

        const MainApp = () => {
            const [lang, setLang] = useState('kk');
            const [currentTab, setTab] = useState('collection');
            const [shareQuote, setShareQuote] = useState(null);
            const { streak, badges, incrementStreak, awardBadge } = useGamification();
            const t = useMemo(() => translations[lang], [lang]);

            useEffect(() => { incrementStreak(); }, [incrementStreak]);

            const renderContent = () => {
                switch(currentTab) {
                    case 'collection': return <HeritageModule t={t} lang={lang} thoughts={initialThoughts} onShare={setShareQuote} />;
                    case 'map': return <ConstellationMap t={t} lang={lang} />;
                    case 'diary': return <DiaryModule t={t} lang={lang} awardBadge={awardBadge} />;
                    case 'daily': return <DailyThoughtModule t={t} lang={lang} awardBadge={awardBadge} />;
                    case 'quiz': return <QuizModule t={t} lang={lang} awardBadge={awardBadge} />;
                    default: return <div className="text-center py-20 text-sage-300 italic">Coming Soon...</div>;
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    {shareQuote && <QuoteGenerator thought={shareQuote} lang={lang} onClose={() => setShareQuote(null)} />}

                    {/* Premium Header */}
                    <header className="flex flex-col md:flex-row items-center justify-between mb-16 gap-8">
                        <div className="flex items-center gap-6">
                            <div className="w-16 h-16 btn-premium rounded-3xl flex items-center justify-center text-gold-900 shadow-xl">
                                <LucideIcon name="library" className="w-8 h-8" />
                            </div>
                            <div>
                                <h1 className="text-3xl font-black uppercase tracking-tighter italic text-glow">{t.appName}</h1>
                                <p className="text-[10px] font-bold text-sage-500 uppercase tracking-[0.4em]">{t.slogan}</p>
                            </div>
                        </div>

                        <nav className="flex items-center gap-8 premium-glass px-10 py-4 rounded-full shadow-glass border border-white">
                            {Object.entries(t.nav).map(([key, label]) => (
                                <button
                                    key={key} onClick={() => setTab(key)}
                                    className={`text-[11px] font-black uppercase tracking-[0.2em] nav-underline transition-all ${currentTab === key ? "text-gold-600 nav-active" : "text-sage-400 hover:text-sage-700"}`}
                                >
                                    {label}
                                </button>
                            ))}
                        </nav>

                        <div className="flex items-center gap-4">
                            <div className="flex bg-sage-200/50 p-1 rounded-2xl border border-white">
                                {['kk', 'en'].map(l => (
                                    <button key={l} onClick={() => setLang(l)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${lang === l ? "bg-white text-gold-700 shadow-sm" : "text-sage-400"}`}>{l}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Stats & Streak Bar */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-16">
                        <div className="premium-glass p-6 rounded-[30px] flex items-center gap-5">
                            <div className="w-12 h-12 bg-gold-100 rounded-2xl flex items-center justify-center text-gold-600"><LucideIcon name="zap" /></div>
                            <div>
                                <p className="text-[10px] font-black text-sage-400 uppercase tracking-widest">{t.common.streak}</p>
                                <p className="text-xl font-black text-sage-900 italic">{streak} Days</p>
                            </div>
                        </div>
                        <div className="premium-glass p-6 rounded-[30px] flex items-center gap-5 col-span-1 md:col-span-3">
                            <LucideIcon name="award" className="text-gold-500" />
                            <div className="flex gap-4">
                                {badges.length === 0 ? <p className="text-xs font-bold text-sage-300 italic">No badges earned yet. Keep exploring!</p> :
                                 badges.map(b => <span key={b} className="bg-gold-50 text-gold-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-gold-100">{t.badgesList[b]}</span>)}
                            </div>
                        </div>
                    </div>

                    {/* Content Section */}
                    <div className="min-h-[600px]">
                        <div className="mb-12 text-center max-w-2xl mx-auto space-y-4">
                             <KazakhOrnament className="w-10 h-10 text-gold-300 mx-auto opacity-40" />
                             <h2 className="text-5xl font-serif italic text-sage-900">{t.nav[currentTab]}</h2>
                             <div className="h-0.5 w-12 bg-gold-400 mx-auto rounded-full"></div>
                        </div>
                        {renderContent()}
                    </div>

                    <footer className="mt-32 py-12 border-t border-sage-200 text-center">
                         <p className="text-[10px] font-black text-sage-400 uppercase tracking-[0.5em]">© 2026 Bilmek • Intellectual Excellence</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
