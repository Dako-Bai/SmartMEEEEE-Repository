<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilmek | Philosophical Intelligence Platform</title>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0B0C10',
                        deepSlate: '#1F2833',
                        platinum: '#E5E5E5',
                        amberGold: '#FFB400',
                        sageGray: '#C5C6C7',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    boxShadow: {
                        'premium': '0 25px 60px -15px rgba(0, 0, 0, 0.6)',
                        'gold-glow': '0 0 20px rgba(255, 180, 0, 0.2)',
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #0B0C10;
            color: #E5E5E5;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(31, 40, 51, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #FFB400 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0B0C10; }
        ::-webkit-scrollbar-thumb { background: #FFB400; border-radius: 10px; }

        .ornament-watermark {
            opacity: 0.03;
            pointer-events: none;
            position: absolute;
            z-index: 0;
        }

        .breathe-animation {
            animation: breathe 12s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            33% { transform: scale(1.6); opacity: 0.4; } /* Inhale 4s */
            66% { transform: scale(1.6); opacity: 0.4; } /* Hold 4s */
        }

        .constellation-link {
            stroke: rgba(255, 180, 0, 0.1);
            stroke-dasharray: 5, 5;
            transition: all 0.5s ease;
        }

        .active-nav-glow {
            box-shadow: 0 0 15px rgba(255, 180, 0, 0.3);
        }
    </style>
</head>
<body class="selection:bg-amberGold selection:text-obsidian">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- ASSETS & CONSTANTS ---
        const KAZAKH_ORNAMENT_PATH = `M50 0 C 60 20 80 30 100 30 C 80 30 70 50 70 70 C 70 90 50 100 50 100 C 50 100 30 90 30 70 C 30 50 20 30 0 30 C 20 30 40 20 50 0`;

        const THOUGHTS_DATABASE = [
            { id: 1, author: "Abai", cat: "wisdom", tags: ["morality", "logic"], text: { kk: "Адам болам десеңіз, оған себепші бес нәрсе бар: өсек, өтірік, мақтаншақ, еріншек, бекер мал шашпақ - бұлардан сақ бол.", en: "If you want to be a human, beware of five things: gossip, lying, boasting, laziness, and waste." } },
            { id: 2, author: "Al-Farabi", cat: "wisdom", tags: ["education", "science"], text: { kk: "Тәрбиесіз берілген білім — адамзаттың қас жауы.", en: "Knowledge without upbringing is the enemy of mankind." } },
            { id: 3, author: "Shakarim", cat: "life", tags: ["conscience"], text: { kk: "Ар-ұяттың күзеті — әркімнің өз жүрегінде.", en: "The guardian of conscience is in everyone's heart." } },
            { id: 4, author: "Marcus Aurelius", cat: "life", tags: ["stoic"], text: { kk: "Өміріңнің бақыты ойыңның сапасына байланысты.", en: "The happiness of your life depends upon the quality of your thoughts." } },
            { id: 5, author: "Seneca", cat: "time", tags: ["value"], text: { kk: "Уақыт — біздің ең қымбат қазынамыз.", en: "Time is our most precious treasure." } },
            { id: 6, author: "Socrates", cat: "wisdom", tags: ["truth"], text: { kk: "Мен ешнәрсе білмейтінімді білемін.", en: "I know that I know nothing." } }
        ];

        // --- COMPONENTS ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ node: iconRef.current, attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const KazakhOrnament = ({ className = "w-10 h-10 text-amberGold" }) => (
            <svg viewBox="0 0 100 100" className={className} fill="currentColor" dangerouslySetInnerHTML={{ __html: `<path d="${KAZAKH_ORNAMENT_PATH}" />` }} />
        );

        const HeritageModule = ({ lang, addXp }) => {
            const [search, setSearch] = useState('');
            const [speaking, setSpeaking] = useState(null);
            const [activeTag, setTag] = useState(null);

            const filtered = useMemo(() => THOUGHTS_DATABASE.filter(q =>
                (q.author.toLowerCase().includes(search.toLowerCase()) || q.text[lang].toLowerCase().includes(search.toLowerCase())) &&
                (!activeTag || q.tags.includes(activeTag))
            ), [search, lang, activeTag]);

            const speak = (id, text) => {
                window.speechSynthesis.cancel();
                if (speaking === id) { setSpeaking(null); return; }
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = lang === 'kk' ? 'tr-TR' : 'en-US';
                utter.onend = () => setSpeaking(null);
                setSpeaking(id);
                window.speechSynthesis.speak(utter);
            };

            const generateCard = (q) => {
                const canvas = document.createElement('canvas');
                canvas.width = 1000; canvas.height = 1000;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#0B0C10'; ctx.fillRect(0, 0, 1000, 1000);
                ctx.fillStyle = '#FFB400'; ctx.font = '700 40px Inter'; ctx.textAlign = 'center';
                ctx.fillText('BILMEK WISDOM', 500, 150);
                ctx.fillStyle = '#E5E5E5'; ctx.font = 'italic 50px "Playfair Display"';
                const words = `"${q.text[lang]}"`.split(' ');
                let line = '', y = 450;
                for(let n=0; n<words.length; n++) {
                    let test = line + words[n] + ' ';
                    if (ctx.measureText(test).width > 700) { ctx.fillText(line, 500, y); line = words[n] + ' '; y += 75; }
                    else line = test;
                }
                ctx.fillText(line, 500, y);
                ctx.fillStyle = '#FFB400'; ctx.font = '700 30px Inter'; ctx.fillText(q.author.toUpperCase(), 500, y + 120);
                const link = document.createElement('a');
                link.download = `bilmek_${q.author}.png`; link.href = canvas.toDataURL(); link.click();
                addXp(25);
            };

            return (
                <div className="space-y-20 fade-in">
                    <div className="max-w-xl mx-auto relative group">
                        <Icon name="search" className="absolute left-6 top-1/2 -translate-y-1/2 text-sageGray" />
                        <input
                            type="text" placeholder="Discover ancient insights..." value={search} onChange={e => setSearch(e.target.value)}
                            className="w-full bg-white/5 border border-white/10 rounded-full pl-16 pr-8 py-5 text-sm focus:border-amberGold outline-none transition-all shadow-inner font-medium"
                        />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                        {filtered.map(q => (
                            <div key={q.id} className="glass p-12 rounded-[40px] flex flex-col justify-between h-[500px] hover:border-amberGold/30 transition-all duration-700 group relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-8 opacity-5 group-hover:opacity-10 transition-opacity"><KazakhOrnament className="w-24 h-24" /></div>
                                <div className="space-y-10 relative z-10">
                                    <div className="flex justify-between items-center">
                                        <div className="w-12 h-12 rounded-2xl bg-amberGold/10 flex items-center justify-center text-amberGold border border-amberGold/20"><Icon name="quote" className="w-6 h-6" /></div>
                                        <div className="flex gap-4 opacity-30 group-hover:opacity-100 transition-all">
                                            <button onClick={() => speak(q.id, q.text[lang])} className={`p-2 transition-all ${speaking === q.id ? "text-amberGold scale-125" : "hover:text-amberGold"}`}><Icon name="volume-2" /></button>
                                            <button onClick={() => generateCard(q)} className="p-2 hover:text-amberGold transition-all"><Icon name="share-2" /></button>
                                        </div>
                                    </div>
                                    <p className="text-3xl font-serif italic leading-relaxed text-platinum group-hover:text-white transition-colors">"{q.text[lang]}"</p>
                                </div>
                                <div className="mt-auto pt-10 border-t border-white/5 relative z-10 flex flex-col gap-4">
                                    <h4 className="text-[10px] font-black uppercase tracking-[0.4em] text-amberGold">{q.author}</h4>
                                    <div className="flex gap-2">
                                        {q.tags.map(t => <button key={t} onClick={() => setTag(activeTag === t ? null : t)} className={`text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-sm ${activeTag === t ? "bg-amberGold text-obsidian" : "bg-white/5 text-sageGray hover:text-white"}`}>#{t}</button>)}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ReflectionModule = ({ lang, addXp }) => {
            const [text, setText] = useState('');
            const [entries, setEntries] = useState(() => JSON.parse(localStorage.getItem('bilmek_ref_v2') || '[]'));
            const [aura, setAura] = useState({ color: 'rgba(197, 198, 199, 0.1)', mood: 'peace' });

            useEffect(() => {
                const lower = text.toLowerCase();
                if (lower.includes('happy') || lower.includes('бақыт') || lower.includes('қуаныш')) setAura({ color: 'rgba(255, 180, 0, 0.2)', mood: 'joy' });
                else if (lower.includes('sad') || lower.includes('мұң') || lower.includes('жалғыз')) setAura({ color: 'rgba(31, 40, 51, 0.4)', mood: 'melancholy' });
                else if (lower.includes('think') || lower.includes('ой') || lower.includes('сұрақ')) setAura({ color: 'rgba(255, 255, 255, 0.1)', mood: 'thought' });
                else setAura({ color: 'rgba(197, 198, 199, 0.1)', mood: 'peace' });
            }, [text]);

            const mirrored = useMemo(() => THOUGHTS_DATABASE[Math.floor(Math.random() * THOUGHTS_DATABASE.length)], [aura.mood]);

            const save = () => {
                if (!text.trim()) return;
                const entry = { id: Date.now(), text, mood: aura.mood, date: new Date().toLocaleDateString() };
                const next = [entry, ...entries];
                setEntries(next);
                localStorage.setItem('bilmek_ref_v2', JSON.stringify(next));
                setText(''); addXp(50);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-20 fade-in">
                    <div className="relative glass p-16 rounded-[60px] overflow-hidden border border-white/5">
                        <div className="absolute top-0 right-0 w-96 h-96 rounded-full blur-[100px] transition-all duration-1000" style={{ background: aura.color }}></div>
                        <div className="relative z-10 space-y-12">
                            <div className="flex justify-between items-center">
                                <span className="text-[10px] font-black uppercase tracking-[0.4em] text-amberGold">Aura: {aura.mood}</span>
                                <KazakhOrnament className="w-8 h-8 opacity-20" />
                            </div>
                            <textarea
                                value={text} onChange={e => setText(e.target.value)}
                                placeholder="Whisper your silence to the digital paper..."
                                className="w-full h-80 bg-transparent text-4xl font-serif italic text-center outline-none resize-none placeholder:opacity-10 leading-relaxed text-platinum"
                            />
                            {text.length > 50 && (
                                <div className="p-8 bg-white/5 border border-white/5 rounded-3xl animate-fade-in text-center">
                                    <p className="text-sm text-sageGray italic">"{mirrored.text[lang]}" — {mirrored.author}</p>
                                </div>
                            )}
                            <div className="flex justify-center">
                                <button onClick={save} className="px-16 py-5 bg-amberGold text-obsidian rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-105 transition-all">Enshrine Insight</button>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                        {entries.map(e => (
                            <div key={e.id} className="glass p-10 rounded-[40px] flex flex-col justify-between hover:border-white/20 transition-all group">
                                <p className="text-xl font-serif italic text-sageGray leading-relaxed">"{e.text}"</p>
                                <div className="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                                    <span className="text-[10px] font-bold text-sageGray uppercase tracking-widest">{e.date}</span>
                                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: e.mood === 'joy' ? '#FFB400' : '#1F2833' }}></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ZenModule = ({ lang, addXp }) => {
            const [stage, setStage] = useState('breathe');
            const [pollData, setPollData] = useState(() => JSON.parse(localStorage.getItem('bilmek_poll_v3') || '[45, 30, 25]'));
            const [voted, setVoted] = useState(() => localStorage.getItem('bilmek_voted_v3') === 'true');

            const vote = (idx) => {
                if (voted) return;
                const next = [...pollData]; next[idx]++;
                setPollData(next);
                localStorage.setItem('bilmek_poll_v3', JSON.stringify(next));
                localStorage.setItem('bilmek_voted_v3', 'true');
                setVoted(true);
                addXp(40);
                setStage('result');
            };

            return (
                <div className="max-w-4xl mx-auto space-y-16 fade-in">
                    {stage === 'breathe' && (
                        <div className="flex flex-col items-center justify-center py-24 space-y-20">
                            <div className="relative w-64 h-64 flex items-center justify-center">
                                <div className="absolute inset-0 border-2 border-amberGold/30 rounded-full breathe-animation"></div>
                                <div className="absolute inset-8 border border-amberGold/20 rounded-full breathe-animation" style={{ animationDelay: '3s' }}></div>
                                <Icon name="wind" className="w-12 h-12 text-amberGold relative z-10" />
                            </div>
                            <div className="text-center space-y-6">
                                <h3 className="text-5xl font-serif italic text-platinum tracking-tight">Sync Your Rhythm</h3>
                                <p className="text-[11px] font-black uppercase tracking-[0.8em] text-sageGray">Inhale Existence • Exhale Identity</p>
                            </div>
                            <button onClick={() => setStage('inquiry')} className="px-12 py-4 border border-platinum/20 text-platinum text-[10px] font-black uppercase tracking-widest hover:bg-white hover:text-obsidian transition-all duration-700">Enter Silent Inquiry</button>
                        </div>
                    )}

                    {stage === 'inquiry' && (
                        <div className="glass p-20 rounded-[60px] text-center space-y-16 border border-white/5">
                             <span className="text-[10px] font-black uppercase tracking-[0.5em] text-amberGold">Collective Dilemma</span>
                             <h4 className="text-4xl font-serif italic text-platinum leading-tight">
                                {lang === 'kk' ? "Уақыт — сызық па, әлде айналым ба?" : "Is time a forward line or a returning circle?"}
                             </h4>
                             <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-2xl mx-auto">
                                {[
                                    { kk: "Сызық", en: "A Line" },
                                    { kk: "Айналым", en: "A Circle" },
                                    { kk: "Екеуі де емес", en: "Neither" }
                                ].map((opt, i) => (
                                    <button key={i} onClick={() => vote(i)} className="p-8 border border-white/10 hover:border-amberGold transition-all font-serif italic text-xl rounded-2xl bg-white/5">
                                        {opt[lang]}
                                    </button>
                                ))}
                             </div>
                        </div>
                    )}

                    {stage === 'result' && (
                        <div className="glass p-16 rounded-[60px] space-y-16 border border-white/5">
                             <div className="text-center">
                                <h3 className="text-3xl font-serif italic text-platinum">The Shared Resonance</h3>
                                <p className="text-sageGray text-[10px] font-black uppercase tracking-widest mt-4 opacity-50">Global alignment of consciousness</p>
                             </div>
                             <div className="space-y-10 max-w-xl mx-auto">
                                {[
                                    { label: {kk: "Сызық", en: "Line"}, color: "#FFB400" },
                                    { label: {kk: "Айналым", en: "Circle"}, color: "#C5C6C7" },
                                    { label: {kk: "Басқа", en: "Other"}, color: "#1F2833" }
                                ].map((item, i) => {
                                    const total = pollData.reduce((a,b)=>a+b, 0);
                                    const p = Math.round((pollData[i]/total)*100);
                                    return (
                                        <div key={i} className="space-y-3">
                                            <div className="flex justify-between items-end px-2">
                                                <span className="text-xs font-black uppercase tracking-widest text-sageGray">{item.label[lang]}</span>
                                                <span className="text-2xl font-serif italic text-amberGold">{p}%</span>
                                            </div>
                                            <div className="w-full h-1 bg-white/5 relative overflow-hidden rounded-full">
                                                <div className="absolute top-0 left-0 h-full transition-all duration-1000 ease-out" style={{ width: `${p}%`, background: item.color }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                             </div>
                             <div className="text-center">
                                <button onClick={() => setStage('breathe')} className="text-[10px] font-black uppercase tracking-widest text-sageGray hover:text-amberGold transition-colors">Reset Experience</button>
                             </div>
                        </div>
                    )}
                </div>
            );
        };

        const ConnectionModule = ({ lang, addXp }) => {
            const [nodes, setNodes] = useState([
                { id: 1, x: 500, y: 300, label: {kk: "Жан", en: "Soul"}, color: "#FFB400" },
                { id: 2, x: 300, y: 150, label: {kk: "Ар", en: "Truth"}, color: "#platinum" },
                { id: 3, x: 700, y: 150, label: {kk: "Махаббат", en: "Love"}, color: "#platinum" },
                { id: 4, x: 250, y: 450, label: {kk: "Еркіндік", en: "Freedom"}, color: "#platinum" },
                { id: 5, x: 750, y: 450, label: {kk: "Уақыт", en: "Time"}, color: "#platinum" },
            ]);
            const links = [ {s: 1, t: 2}, {s: 1, t: 3}, {s: 1, t: 4}, {s: 1, t: 5} ];
            const [dragging, setDragging] = useState(null);
            const [activeNode, setActiveNode] = useState(null);

            const onMouseMove = (e) => {
                if (dragging === null) return;
                const rect = e.currentTarget.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (1000 / rect.width);
                const y = (e.clientY - rect.top) * (600 / rect.height);
                setNodes(nodes.map(n => n.id === dragging ? { ...n, x, y } : n));
            };

            return (
                <div className="max-w-6xl mx-auto space-y-16 fade-in">
                    <div className="relative aspect-[10/6] glass rounded-[60px] border border-white/5 overflow-hidden cursor-crosshair shadow-premium"
                         onMouseMove={onMouseMove} onMouseUp={() => setDragging(null)}>
                        <svg viewBox="0 0 1000 600" className="w-full h-full select-none">
                            {links.map((l, i) => {
                                const sn = nodes.find(n => n.id === l.s), tn = nodes.find(n => n.id === l.t);
                                return <line key={i} x1={sn.x} y1={sn.y} x2={tn.x} y2={tn.y} className="constellation-link" strokeWidth="1" />;
                            })}
                            {nodes.map(n => (
                                <g key={n.id} onMouseDown={() => setDragging(n.id)} onClick={() => setActiveNode(n)} className="cursor-grab active:cursor-grabbing group">
                                    <circle cx={n.x} cy={n.y} r="45" fill="#0B0C10" stroke={activeNode?.id === n.id ? "#FFB400" : "rgba(255,255,255,0.1)"} strokeWidth="2" className="transition-all duration-500 group-hover:stroke-amberGold" />
                                    <text x={n.x} y={n.y + 6} textAnchor="middle" className="text-[10px] font-black uppercase tracking-widest fill-sageGray group-hover:fill-white transition-colors pointer-events-none">{n.label[lang]}</text>
                                </g>
                            ))}
                        </svg>
                        <div className="absolute top-10 left-10 pointer-events-none">
                             <h3 className="text-3xl font-serif italic text-platinum">Relational Graph</h3>
                             <p className="text-[10px] font-black uppercase tracking-widest text-amberGold mt-2">Interact to reveal Socratic Dialogues</p>
                        </div>
                    </div>

                    {activeNode && (
                        <div className="glass p-16 rounded-[50px] border-l-8 border-amberGold animate-slide-up relative">
                             <button onClick={() => setActiveNode(null)} className="absolute top-8 right-8 text-sageGray hover:text-white transition-colors"><Icon name="x" /></button>
                             <div className="max-w-2xl mx-auto space-y-12 text-center">
                                <h4 className="text-3xl font-serif italic text-platinum">Inquiry: {activeNode.label[lang]}</h4>
                                <p className="text-xl text-sageGray italic">"If you claim to know the {activeNode.label[lang].toLowerCase()}, do you know its weight upon the soul when the truth is absent?"</p>
                                <div className="flex justify-center gap-8">
                                    <button onClick={() => { addXp(20); setActiveNode(null); }} className="px-10 py-4 border border-white/10 hover:border-amberGold transition-all rounded-xl text-[10px] font-black uppercase tracking-widest">Rational Path</button>
                                    <button onClick={() => { addXp(20); setActiveNode(null); }} className="px-10 py-4 border border-white/10 hover:border-amberGold transition-all rounded-xl text-[10px] font-black uppercase tracking-widest">Mystic Path</button>
                                </div>
                             </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChallengeModule = ({ lang, addXp }) => {
            const [mode, setMode] = useState('menu');
            const [scramble, setScramble] = useState({ s: [], r: [] });

            const solutions = {
                kk: "Мен ешнәрсе білмейтінімді білемін",
                en: "I know that I know nothing"
            };

            const startScramble = () => {
                const words = solutions[lang].split(' ');
                const shuffled = [...words].sort(() => Math.random() - 0.5);
                setScramble({ s: shuffled, r: [] });
                setMode('scramble');
            };

            const pick = (w, i) => {
                const nextR = [...scramble.r, w];
                const nextS = scramble.s.filter((_, idx) => idx !== i);
                setScramble({ s: nextS, r: nextR });

                const targetLength = solutions[lang].split(' ').length;
                if (nextR.length === targetLength) {
                    if (nextR.join(' ') === solutions[lang]) {
                        addXp(100);
                        setTimeout(() => setMode('menu'), 1500);
                    } else {
                        setTimeout(() => startScramble(), 1000);
                    }
                }
            };

            return (
                <div className="max-w-5xl mx-auto space-y-16 fade-in">
                    {mode === 'menu' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <div onClick={startScramble} className="glass p-16 rounded-[50px] border border-white/5 cursor-pointer hover:border-amberGold transition-all group text-center">
                                <Icon name="brain" className="w-16 h-16 mb-8 text-amberGold group-hover:scale-110 transition-transform" />
                                <h3 className="text-3xl font-serif italic text-platinum mb-4">Axiom Reconstructor</h3>
                                <p className="text-[10px] font-black uppercase tracking-widest text-sageGray">Logical structural challenge</p>
                            </div>
                            <div className="glass p-16 rounded-[50px] border border-white/5 opacity-40 cursor-not-allowed text-center">
                                <Icon name="zap" className="w-16 h-16 mb-8 text-sageGray" />
                                <h3 className="text-3xl font-serif italic text-platinum mb-4">Speed Trials</h3>
                                <p className="text-[10px] font-black uppercase tracking-widest text-sageGray">Cognitive fast-path coming soon</p>
                            </div>
                        </div>
                    )}

                    {mode === 'scramble' && (
                        <div className="glass p-20 rounded-[60px] border border-white/5 space-y-16 text-center">
                             <div className="space-y-4">
                                <span className="text-[10px] font-black uppercase tracking-[0.5em] text-amberGold">Axiom Reconstruction</span>
                                <h3 className="text-2xl font-serif italic text-platinum">
                                    {lang === 'kk' ? "Сократ логикасын қалпына келтіріңіз" : "Restore the logic of Socrates"}
                                </h3>
                             </div>
                             <div className="min-h-[120px] p-12 border border-dashed border-white/10 bg-white/5 rounded-[40px] flex flex-wrap justify-center gap-6 items-center">
                                {scramble.r.map((w, i) => <span key={i} className="text-3xl font-serif italic text-platinum animate-fade-in">{w}</span>)}
                             </div>
                             <div className="flex flex-wrap justify-center gap-8">
                                {scramble.s.map((w, i) => (
                                    <button key={i} onClick={() => pick(w, i)} className="px-10 py-5 border border-white/10 hover:border-amberGold transition-all font-serif italic text-2xl rounded-2xl bg-white/5 text-platinum">
                                        {w}
                                    </button>
                                ))}
                             </div>
                             <button onClick={() => setMode('menu')} className="text-[10px] font-black uppercase tracking-widest text-sageGray hover:text-white transition-colors">Abort Trial</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('kk');
            const [activeTab, setTab] = useState('library');
            const [xp, setXp] = useState(() => parseInt(localStorage.getItem('bilmek_xp_pro') || '0'));
            const [level, setLevel] = useState(1);

            useEffect(() => {
                const newLevel = Math.floor(xp / 1000) + 1;
                if (newLevel !== level) setLevel(newLevel);
                localStorage.setItem('bilmek_xp_pro', xp);
            }, [xp]);

            const addXp = (val) => setXp(prev => prev + val);

            const translations = {
                kk: {
                    library: "Мұра", reflection: "Толғаныс", zen: "Таным", connection: "Байланыс", challenge: "Сынақ",
                    level: "Деңгей", xp: "XP Тәжірибе", slogan: "Адамзаттың ойына ортақтас"
                },
                en: {
                    library: "Heritage", reflection: "Neural Reflection", zen: "Mindfulness", connection: "Knowledge Graph", challenge: "Logic Lab",
                    level: "Level", xp: "XP Progress", slogan: "Sharing the mind of humanity"
                }
            };

            const t = translations[lang];

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header: Elite Glassmorphism */}
                    <header className="fixed top-0 left-0 w-full z-[100] glass border-b border-white/5 px-8 h-20 flex items-center justify-between">
                        <div className="flex items-center gap-6">
                            <KazakhOrnament className="w-10 h-10 shadow-gold-glow" />
                            <div>
                                <h1 className="text-2xl font-black italic gold-gradient tracking-tighter uppercase leading-none">BILMEK</h1>
                                <p className="text-[9px] font-bold text-sageGray uppercase tracking-[0.4em]">{t.slogan}</p>
                            </div>
                        </div>

                        <nav className="hidden xl:flex items-center gap-12">
                            {Object.entries(t).filter(([k]) => ['library', 'reflection', 'zen', 'connection', 'challenge'].includes(k)).map(([key, label]) => (
                                <button
                                    key={key}
                                    onClick={() => setTab(key)}
                                    className={`relative text-[11px] font-black uppercase tracking-[0.2em] transition-all duration-500 ${activeTab === key ? "text-amberGold active-nav-glow" : "text-sageGray hover:text-platinum"}`}
                                >
                                    {label}
                                    {activeTab === key && <span className="absolute -bottom-8 left-1/2 -translate-x-1/2 w-10 h-1 bg-amberGold rounded-t-full shadow-gold-glow"></span>}
                                </button>
                            ))}
                        </nav>

                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex flex-col items-end">
                                <p className="text-[10px] font-black uppercase tracking-widest text-sageGray">{t.level} {level}</p>
                                <div className="w-32 h-1.5 bg-white/5 rounded-full mt-1 overflow-hidden border border-white/5">
                                    <div className="h-full bg-amberGold transition-all duration-1000 shadow-gold-glow" style={{ width: `${(xp % 1000) / 10}%` }}></div>
                                </div>
                            </div>
                            <button onClick={() => setLang(lang === 'kk' ? 'en' : 'kk')} className="w-12 h-12 rounded-2xl glass border border-white/10 text-[10px] font-black uppercase hover:bg-amberGold hover:text-obsidian transition-all duration-500">
                                {lang}
                            </button>
                        </div>
                    </header>

                    {/* Content Viewport */}
                    <main className="flex-1 pt-32 pb-20 px-8 max-w-7xl mx-auto w-full relative z-10">
                        {activeTab === 'library' && <HeritageModule lang={lang} addXp={addXp} />}
                        {activeTab === 'reflection' && <ReflectionModule lang={lang} addXp={addXp} />}
                        {activeTab === 'zen' && <ZenModule lang={lang} addXp={addXp} />}
                        {activeTab === 'connection' && <ConnectionModule lang={lang} addXp={addXp} />}
                        {activeTab === 'challenge' && <ChallengeModule lang={lang} addXp={addXp} />}
                        {!['library', 'reflection', 'zen', 'connection', 'challenge'].includes(activeTab) && (
                            <div className="flex flex-col items-center justify-center py-40 text-center fade-in">
                                <KazakhOrnament className="w-16 h-16 opacity-10 mb-12" />
                                <h2 className="text-6xl font-serif italic mb-6 leading-tight">Syncing Neural Networks...</h2>
                                <div className="w-24 h-[1px] bg-amberGold opacity-30"></div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 border-t border-white/5 text-center px-8">
                         <p className="text-[10px] font-medium text-sageGray uppercase tracking-[0.8em]">© 2026 Bilmek Professional • Neural Intelligence Platform</p>
                    </footer>

                    {/* Ambient Background Elements */}
                    <div className="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
                         <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-amberGold/5 rounded-full blur-[120px]"></div>
                         <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-amberGold/5 rounded-full blur-[120px]"></div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
