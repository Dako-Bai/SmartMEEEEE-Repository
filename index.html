<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mercury Energy | Интеллектуалды Басқару Хабы</title>

    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cosmicDeep: '#0b1329',
                        cosmicSurface: '#121f3d',
                        mercuryGold: '#fcd34d',
                        royalBlue: '#2563eb',
                        safetyGreen: '#34d399',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #0b1329;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(18, 31, 61, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 3D Tank Styles */
        .tank-cylinder {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                rgba(30, 41, 59, 0.9) 0%,
                rgba(71, 85, 105, 0.4) 50%,
                rgba(30, 41, 59, 0.9) 100%);
            border-radius: 10px / 20px;
            box-shadow:
                inset 0 0 30px rgba(0,0,0,0.7),
                0 10px 20px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tank-glint {
            position: absolute;
            top: 0;
            left: 20%;
            width: 15%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            z-index: 15;
            pointer-events: none;
        }

        .tank-top {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            height: 20px;
            background: linear-gradient(90deg, #334155, #64748b, #334155);
            border-radius: 50%;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.3);
        }

        /* Liquid Wave Animation */
        .liquid-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .wave {
            position: absolute;
            top: -15px;
            left: 0;
            width: 200%;
            height: 30px;
            background: inherit;
            border-radius: 38%;
            opacity: 0.8;
            filter: brightness(1.1);
        }

        .wave-1 { animation: waveMoveSlow 5s linear infinite; }
        .wave-2 { animation: waveMoveFast 3s linear infinite reverse; top: -20px; opacity: 0.4; }

        @keyframes waveMoveSlow {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }
        @keyframes waveMoveFast {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(-360deg); }
        }

        /* Water level styling */
        .water-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #0f766e 0%, #14b8a6 50%, #0f766e 100%);
            z-index: 5;
            transition: height 1s ease-in-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b1329; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- Helper Logic ---
        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };

        const showToast = (message, type = 'info') => {
            let container = document.getElementById('toast-root');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-root';
                container.className = 'fixed top-10 right-10 z-[1000] space-y-4 pointer-events-none';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `glass p-4 rounded-2xl border-l-4 shadow-2xl animate-fade-in flex items-center gap-3 min-w-[300px] pointer-events-auto ${
                type === 'success' ? 'border-emerald-500 text-emerald-100' :
                type === 'error' ? 'border-red-500 text-red-100' : 'border-blue-500 text-blue-100'
            }`;
            toast.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                    <i data-lucide="${type === 'error' ? 'alert-circle' : (type === 'success' ? 'check-circle' : 'info')}" class="w-4 h-4"></i>
                </div>
                <span class="text-xs font-bold uppercase tracking-tight">${message}</span>
            `;
            container.appendChild(toast);
            if (window.lucide) lucide.createIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        };

        // --- Translations ---
        const translations = {
            kk: {
                title: "Smart Mercury Energy",
                dashboard: "Басқару панелі",
                monitoring: "Мониторинг",
                depot: "Мұнай базасы",
                stations: "Жанармай бекеттері",
                admin: "Әкімшілік",
                prices: "Бағалар",
                requests: "Тіркелу өтінімдері",
                audit: "Аудит журналы",

                oilDepot: "НБ (Мұнай базасы)",

                regular: "Regular АИ-92",
                diesel: "Дизель (ДТ)",
                volume: "Көлем",
                temp: "Температура",
                density: "Тығыздық",
                water: "Төменгі су",

                edit: "Өңдеу",
                save: "Сақтау",
                cancel: "Болдырмау",
                addStation: "Бекет қосу",
                stationName: "Бекет атауы",
                region: "Аймақ",
                actions: "Әрекеттер",
                systemStatus: "Жүйе күйі",
                active: "Белсенді",
                warning: "Ескерту",
                critical: "Қауіпті",
                stock: "Қоймада",
                priceList: "Ағымдағы бағалар",
                userRoles: "Пайдаланушылар",
                export: "Экспорт",
                notification: "Хабарламалар"
            },
            ru: {
                title: "Smart Mercury Energy",
                dashboard: "Панель управления",
                monitoring: "Мониторинг",
                depot: "Нефтебаза",
                stations: "Автозаправочные станции",
                admin: "Администрирование",
                prices: "Цены",
                requests: "Заявки на регистрацию",
                audit: "Журнал аудита",
                settings: "Настройки",
                oilDepot: "НБ (Нефтебаза)",
                azsNetwork: "Сеть АЗС",
                premium: "Premium АИ-95",
                regular: "Regular АИ-92",
                diesel: "Дизельное топливо",
                volume: "Объем",
                temp: "Температура",
                density: "Плотность",
                water: "Подтоварная вода",
                lastUpdate: "Последнее обновление",
                edit: "Изменить",
                save: "Сохранить",
                cancel: "Отмена",
                addStation: "Добавить станцию",
                stationName: "Название станции",
                region: "Регион",
                actions: "Действия",
                systemStatus: "Статус системы",
                active: "Активен",
                warning: "Предупреждение",
                critical: "Критично",
                stock: "В наличии",
                priceList: "Текущие цены",
                userRoles: "Пользователи",
                export: "Экспорт",
                notification: "Уведомления"
            },
            en: {
                title: "Smart Mercury Energy",
                dashboard: "Dashboard",
                monitoring: "Monitoring",
                depot: "Oil Depot",
                stations: "Fuel Stations",
                admin: "Administration",
                prices: "Prices",
                requests: "Registration Requests",
                audit: "Audit Log",
                settings: "Settings",
                oilDepot: "Oil Depot (NB)",
                azsNetwork: "AZS Network",
                premium: "Premium AI-95",
                regular: "Regular AI-92",
                diesel: "Diesel Fuel",
                volume: "Volume",
                temp: "Temperature",
                density: "Density",
                water: "Bottom Water",
                lastUpdate: "Last Update",
                edit: "Edit",
                save: "Save",
                cancel: "Cancel",
                addStation: "Add Station",
                stationName: "Station Name",
                region: "Region",
                actions: "Actions",
                systemStatus: "System Status",
                active: "Active",
                warning: "Warning",
                critical: "Critical",
                stock: "In Stock",
                priceList: "Current Prices",
                userRoles: "Users",
                export: "Export",
                notification: "Notifications"
            }
        };

        // --- Mock Data ---
        const initialDepotState = [
            { id: 't1', name: 'РВС-5000 #1', fuelType: 'premium', capacity: 5000, current: 3850, water: 12, temp: 18.5, density: 745 },
            { id: 't2', name: 'РВС-5000 #2', fuelType: 'regular', capacity: 5000, current: 4200, water: 8, temp: 19.2, density: 730 },
            { id: 't3', name: 'РВС-3000 #3', fuelType: 'diesel', capacity: 3000, current: 1200, water: 25, temp: 17.8, density: 835 },
            { id: 't4', name: 'РВС-2000 #4', fuelType: 'premium', capacity: 2000, current: 1800, water: 5, temp: 18.1, density: 742 },
            { id: 't5', name: 'РВС-5000 #5', fuelType: 'regular', capacity: 5000, current: 2100, water: 15, temp: 18.9, density: 735 },
            { id: 't6', name: 'РВС-3000 #6', fuelType: 'diesel', capacity: 3000, current: 2800, water: 4, temp: 17.5, density: 840 },
            { id: 't7', name: 'РВС-5000 #7', fuelType: 'premium', capacity: 5000, current: 4900, water: 2, temp: 19.5, density: 748 },
            { id: 't8', name: 'РВС-2000 #8', fuelType: 'regular', capacity: 2000, current: 500, water: 30, temp: 18.0, density: 732 },
        ];

        const initialStations = [
            { id: 1, name: 'SME Almaty-01', region: 'Almaty', stocks: { premium: 85, regular: 60, diesel: 40 } },
            { id: 2, name: 'SME Astana-04', region: 'Astana', stocks: { premium: 45, regular: 90, diesel: 75 } },
            { id: 3, name: 'SME Shymkent-02', region: 'Shymkent', stocks: { premium: 70, regular: 30, diesel: 95 } },
        ];

        const initialPrices = {
            premium: { kk: 255, ru: 255, en: 255 },
            regular: { kk: 205, ru: 205, en: 205 },
            diesel: { kk: 295, ru: 295, en: 295 }
        };

        // --- Components ---

        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Tank3D = ({ label, percentage, fuelType, capacity, current, waterLevel, variant = "large", t }) => {
            const getFuelColor = (type) => {
                switch(type) {
                    case 'premium': return 'linear-gradient(90deg, #b45309 0%, #fbbf24 50%, #b45309 100%)';
                    case 'regular': return 'linear-gradient(90deg, #1e3a8a 0%, #3b82f6 50%, #1e3a8a 100%)';
                    case 'diesel': return 'linear-gradient(90deg, #064e3b 0%, #10b981 50%, #064e3b 100%)';
                    default: return '#334155';
                }
            };

            const heightVal = Math.min(percentage, 100);
            const waterHeight = variant === "large" ? (waterLevel / 50) * 100 : 0;

            return (
                <div className={`flex flex-col items-center ${variant === "large" ? "w-full" : "w-24"}`}>
                    <div className={`${variant === "large" ? "h-64 w-32" : "h-32 w-12"} relative`}>
                        {/* Tank Cap */}
                        <div className="tank-top"></div>

                        {/* Scale Markings */}
                        {variant === "large" && (
                            <div className="absolute right-[-45px] top-0 h-full flex flex-col justify-between text-[10px] font-black text-slate-600 py-1 border-r border-white/5 pr-2">
                                {[100, 80, 60, 40, 20, 0].map(v => <span key={v}>{v}%</span>)}
                            </div>
                        )}

                        {/* Cylinder Body */}
                        <div className="tank-cylinder">
                            <div className="tank-glint"></div>

                            {/* Liquid */}
                            <div
                                className="liquid-container"
                                style={{
                                    height: `${heightVal}%`,
                                    background: getFuelColor(fuelType)
                                }}
                            >
                                <div className="wave wave-1"></div>
                                <div className="wave wave-2"></div>
                                {/* Surface reflection glint */}
                                <div className="absolute top-0 left-0 w-full h-[2px] bg-white/20 blur-[1px] z-10"></div>
                            </div>

                            {/* Water Layer */}
                            {variant === "large" && waterLevel > 0 && (
                                <div className="water-layer" style={{ height: `${waterHeight}%` }}>
                                    <div className="absolute top-0 left-0 w-full h-[1px] bg-white/30"></div>
                                </div>
                            )}
                        </div>

                        {/* 3D Base Shadow */}
                        <div className="absolute bottom-[-15px] left-0 w-full h-[25px] bg-black/60 blur-lg rounded-full -z-10"></div>
                    </div>

                    <div className="mt-8 text-center">
                        <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-1">{label}</p>
                        <div className="flex items-center justify-center gap-2">
                            <span className="text-lg font-display font-black text-white italic">{percentage}%</span>
                            <span className={`text-[10px] font-bold ${percentage > 20 ? 'text-emerald-400' : 'text-red-400'} animate-pulse`}>
                                ●
                            </span>
                        </div>
                        {variant === "large" && (
                            <div className="mt-3 p-3 bg-white/5 rounded-2xl grid grid-cols-1 gap-1 text-[10px] font-bold">
                                <div className="flex justify-between gap-4">
                                    <span className="text-slate-500 uppercase">{t.volume}:</span>
                                    <span className="text-mercuryGold">{current.toLocaleString()} m³</span>
                                </div>
                                <div className="flex justify-between gap-4">
                                    <span className="text-slate-500 uppercase">{t.water}:</span>
                                    <span className="text-blue-400">{waterLevel} cm</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

            const Sidebar = ({ currentTab, setTab, t, role }) => {
            const items = [
                { id: 'monitoring', icon: 'activity', label: t.monitoring },
                { id: 'prices', icon: 'tags', label: t.prices },
                { id: 'admin', icon: 'shield-check', label: t.admin },
                    { id: 'requests', icon: 'user-plus', label: t.requests, adminOnly: true },
                { id: 'audit', icon: 'clipboard-list', label: t.audit },
            ];

            return (
                <div className="fixed left-0 top-0 h-full w-20 lg:w-64 glass z-50 flex flex-col">
                    <div className="p-6 flex items-center gap-3">
                        <div className="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center text-cosmicDeep shadow-lg shadow-amber-400/20">
                            <LucideIcon name="zap" className="w-6 h-6 fill-current" />
                        </div>
                        <span className="hidden lg:block font-display font-black text-lg uppercase tracking-tighter italic">Smart Mercury</span>
                    </div>

                    <nav className="flex-1 mt-10 px-4 space-y-2">
                        {items.filter(i => !i.adminOnly || role === 'admin').map(item => (
                            <button
                                key={item.id}
                                onClick={() => setTab(item.id)}
                                className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all duration-300 ${
                                    currentTab === item.id
                                    ? "bg-royalBlue text-white shadow-xl shadow-blue-600/30"
                                    : "text-slate-400 hover:bg-white/5"
                                }`}
                            >
                                <LucideIcon name={item.icon} />
                                <span className="hidden lg:block font-bold text-sm tracking-tight">{item.label}</span>
                            </button>
                        ))}
                    </nav>

                    <div className="p-6 border-t border-white/5 space-y-4">
                        <div className="hidden lg:block">
                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">{t.systemStatus}</p>
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                <span className="text-xs font-bold text-emerald-400 uppercase tracking-tight">{t.active}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [lang, setLang] = useState('kk');
            const [t, setT] = useState(translations.kk);
            const [user, setUser] = useState(null); // { name, role }
            const [authMode, setAuthMode] = useState('login'); // 'login' | 'register'
            const [currentTab, setCurrentTab] = useState('monitoring');
            const [notifications, setNotifications] = useState([]);

            // Core States with LocalStorage
            const [depotTanks, setDepotState] = useState(() => {
                const saved = localStorage.getItem('sme_depot');
                return saved ? JSON.parse(saved) : initialDepotState;
            });
            const [stations, setStations] = useState(() => {
                const saved = localStorage.getItem('sme_stations');
                return saved ? JSON.parse(saved) : initialStations;
            });
            const [prices, setPrices] = useState(() => {
                const saved = localStorage.getItem('sme_prices');
                return saved ? JSON.parse(saved) : initialPrices;
            });
            const [logs, setLogs] = useState(() => {
                const saved = localStorage.getItem('sme_audit');
                return saved ? JSON.parse(saved) : [{ id: 1, action: 'Система инициализирована', time: new Date().toLocaleString(), user: 'System' }];
            });
            const [userRequests, setUserRequests] = useState(() => {
                const saved = localStorage.getItem('sme_requests');
                return saved ? JSON.parse(saved) : [
                    { id: 101, name: 'OilTrans LLP', email: 'manager@oiltrans.kz', date: '16.06.2026', bin: '123456789012' },
                    { id: 102, name: 'Aviation Group', email: 'ops@avg.com', date: '17.06.2026', bin: '987654321098' }
                ];
            });
            const [registeredUsers, setRegisteredUsers] = useState(() => {
                const saved = localStorage.getItem('sme_users');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: 'Admin Hub', role: 'admin', email: 'admin@sme.kz' },
                    { id: 2, name: 'Operator_Almaty', role: 'operator', email: 'alm@sme.kz' }
                ];
            });

            useEffect(() => {
                setT(translations[lang]);
            }, [lang]);

            // Simulation of live data changes and alerts
            useEffect(() => {
                const interval = setInterval(() => {
                    setDepotState(prev => prev.map(tank => {
                        const change = (Math.random() - 0.5) * 20;
                        const newCurrent = Math.max(0, Math.min(tank.capacity, tank.current + change));

                        // Alert Logic
                        if (newCurrent < tank.capacity * 0.1 && tank.current >= tank.capacity * 0.1) {
                            addNotification(`Критикалық деңгей: ${tank.name} отыны таусылуда!`, 'error');
                        }

                        return { ...tank, current: Math.round(newCurrent) };
                    }));
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            const addNotification = (message, type = 'info') => {
                const newNotif = { id: Date.now(), message, type, time: new Date().toLocaleTimeString() };
                setNotifications(prev => [newNotif, ...prev].slice(0, 5));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (authMode === 'register') {
                    const name = e.target.companyName.value;
                    const email = e.target.email.value;
                    const bin = e.target.bin.value;
                    const newRequest = { id: Date.now(), name, email, bin, date: new Date().toLocaleDateString() };
                    setUserRequests(prev => [newRequest, ...prev]);
                    logAction(`Новая заявка на регистрацию от ${name}`, 'Guest');
                    showToast('Өтінім жіберілді. Менеджер жауабын күтіңіз.', 'success');
                    setAuthMode('login');
                    return;
                }
                const email = e.target.email.value;
                if (email === 'admin@sme.kz') {
                    setUser({ name: 'Super Admin', role: 'admin' });
                    logAction('Вход в систему (Админ)', 'Super Admin');
                } else {
                    setUser({ name: email.split('@')[0], role: 'client' });
                    logAction('Вход в систему (Клиент)', email);
                }
            };

            const handleLogout = () => {
                logAction('Выход из системы', user?.name);
                setUser(null);
                setCurrentTab('monitoring');
            };

            const logAction = useCallback((action, userName = "Admin") => {
                const newLog = {
                    id: Date.now(),
                    action,
                    time: new Date().toLocaleString(),
                    user
                };
                setLogs(prev => {
                    const updated = [newLog, ...prev].slice(0, 50);
                    localStorage.setItem('sme_audit', JSON.stringify(updated));
                    return updated;
                });
            }, []);

            useEffect(() => {
                localStorage.setItem('sme_depot', JSON.stringify(depotTanks));
                localStorage.setItem('sme_stations', JSON.stringify(stations));
                localStorage.setItem('sme_prices', JSON.stringify(prices));
                localStorage.setItem('sme_requests', JSON.stringify(userRequests));
                localStorage.setItem('sme_users', JSON.stringify(registeredUsers));
            }, [depotTanks, stations, prices, userRequests, registeredUsers]);

            // --- Components ---
            const NotificationToast = ({ notif, onClose }) => (
                <div className={`flex items-center justify-between p-4 mb-3 rounded-2xl border glass animate-fade-in ${
                    notif.type === 'error' ? 'border-red-500/50 text-red-200' : 'border-blue-500/50 text-blue-200'
                }`}>
                    <div className="flex items-center gap-3">
                        <LucideIcon name={notif.type === 'error' ? 'alert-triangle' : 'info'} className="w-5 h-5" />

                    const ctx = canvasRef.current.getContext('2d');
                    const data = [65, 82, 45, 90, 70, 85, 95];
                    const labels = ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '23:59'];

                    ctx.clearRect(0, 0, 800, 200);

                    // Draw Grid
                    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                    ctx.lineWidth = 1;
                    for(let i=0; i<6; i++) {
                        ctx.beginPath();
                        ctx.moveTo(0, i * 40);
                        ctx.lineTo(800, i * 40);
                        ctx.stroke();
                    }

                    // Draw Line
                    ctx.beginPath();
                    ctx.strokeStyle = '#fcd34d';
                    ctx.lineWidth = 3;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';

                    const step = 800 / (data.length - 1);
                    data.forEach((val, i) => {
                        const x = i * step;
                        const y = 200 - (val / 100 * 180);
                        if(i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    });
                    ctx.stroke();

                    // Fill Area
                    ctx.lineTo(800, 200);
                    ctx.lineTo(0, 200);
                    const grad = ctx.createLinearGradient(0, 0, 0, 200);
                    grad.addColorStop(0, 'rgba(252, 211, 77, 0.2)');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.fill();

                    // Draw Points
                    ctx.fillStyle = '#fcd34d';
                    data.forEach((val, i) => {
                        const x = i * step;
                        const y = 200 - (val / 100 * 180);
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    });

                                    <div className="text-right hidden sm:block">
                                <p className="text-sm font-black text-white italic tracking-tight">{user.name}</p>
                                <p className="text-[10px] font-bold text-mercuryGold uppercase tracking-widest opacity-70">{user.role === 'admin' ? 'Chief Hub Controller' : 'Client Access'}</p>
                                    </div>
                            <button
                                onClick={handleLogout}
                                className="w-12 h-12 bg-mercuryGold rounded-2xl shadow-xl shadow-amber-400/10 flex items-center justify-center font-black text-cosmicDeep italic hover:bg-white transition-all"
                            >
                                <LucideIcon name="log-out" className="w-5 h-5" />
                            </button>
                                </div>
                            </div>
                        </header>

                        {/* Page Content */}
                        <div className="p-8 max-w-7xl mx-auto">
                            {currentTab === 'monitoring' && <MonitoringHub />}
                            {currentTab === 'prices' && <PriceManagement />}
                            {currentTab === 'admin' && <AdminPanel />}
                            {currentTab === 'requests' && <UserRequests />}
                            {currentTab === 'audit' && <AuditLogs />}
                        </div>
                    </main>

                    {/* Footer Background Effect */}
                    <div className="fixed bottom-0 right-0 w-[500px] h-[500px] bg-royalBlue/5 blur-[150px] -z-10 rounded-full"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
