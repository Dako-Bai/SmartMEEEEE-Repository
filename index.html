<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cosmic-deep: #0B1329;
            --cosmic-slate: #121F3D;
            --cosmic-accent: #3B82F6;
            --cosmic-gold: #FBBF24;
            --cosmic-emerald: #10B981;
            --cosmic-rose: #F43F5E;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--cosmic-deep);
            color: #F8FAFC;
            margin: 0;
            overflow-x: hidden;
        }

        /* Глассморфизм стильдері */
        .glass-panel {
            background: rgba(18, 31, 61, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.6);
        }

        button:active {
            transform: scale(0.96);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            border-color: var(--cosmic-accent) !important;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* 3D Barrel Effect */
        .barrel {
            position: relative;
            width: 100%;
            height: 120px;
            background: linear-gradient(to right, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .barrel-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(to top, rgba(59, 130, 246, 0.8), rgba(59, 130, 246, 0.4));
        }
        .fluid-wave {
            position: absolute;
            top: -10px;
            left: 0;
            width: 200%;
            height: 20px;
            background: radial-gradient(circle at 50% 100%, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: waveMove 3s infinite linear;
        }
        @keyframes waveMove {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Арнайы Скроллбар */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--cosmic-deep); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .shine { position: relative; overflow: hidden; }
        .shine::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.05) 50%, transparent 55%);
            animation: shineMove 4s infinite;
        }
        @keyframes shineMove {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pt-16">

            const tabs = ['home', 'monitoring', 'prices', 'contacts'];
            if (state.user?.role === 'Admin') tabs.push('admin');
            else if (state.user?.role === 'User') tabs.push('cabinet');

            nav.innerHTML = tabs.map(tab => `
                <button onclick="switchTab('${tab}')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all ${state.activeTab === tab ? 'bg-blue-600 text-white shadow-lg' : (tab==='admin'||tab==='cabinet'?'text-amber-500 hover:text-amber-400':'text-slate-400 hover:text-slate-200')}">
                    ${dict[state.lang][tab] || tab}
                </button>
            `).join('');
        }

        function renderAuth() {
            const zone = document.getElementById('auth-zone');
            if (state.user) {
                zone.innerHTML = `
                    <div class="flex items-center gap-3">

                `;
            } else {
                zone.innerHTML = `
                    <button onclick="switchTab('login')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-xs font-black shadow-lg shadow-blue-900/40 uppercase tracking-tighter">
                        ${dict[state.lang].login}
                    </button>
                `;
            }
        }

        function switchTab(tab) {
            state.activeTab = tab;
            renderNav();
            const content = document.getElementById('main-content');
            content.className = "flex-grow max-w-7xl mx-auto w-full px-6 py-10 fade-in";

            if (tab === 'home') renderHome();
            else if (tab === 'monitoring') renderMonitoring();
            else if (tab === 'prices') renderPrices();
            else if (tab === 'contacts') renderContacts();
            else if (tab === 'login') renderLogin();
            else if (tab === 'register') renderRegister();
            else if (tab === 'admin') renderAdmin();
            else if (tab === 'cabinet') renderCabinet();

            window.location.hash = `#/${tab}`;
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `glass-panel px-8 py-4 rounded-2xl flex items-center gap-4 shadow-2xl min-w-[320px] border-l-4 transition-all duration-300 fade-in ${type === 'error' ? 'border-rose-500' : type === 'success' ? 'border-emerald-500' : 'border-blue-500'}`;
            toast.innerHTML = `
                <div class="w-8 h-8 rounded-full flex items-center justify-center ${type==='error'?'bg-rose-500/20 text-rose-400':type==='success'?'bg-emerald-500/20 text-emerald-400':'bg-blue-500/20 text-blue-400'}">

                </div>
                <span class="text-sm font-black text-white">${msg}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        window.openModal = function(html) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.innerHTML = html;
            overlay.classList.remove('hidden');
            setTimeout(() => content.classList.remove('scale-95'), 10);
        };

        window.closeModal = function() {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95');
            setTimeout(() => { overlay.classList.add('hidden'); }, 300);
        };

            state.user.balance -= cost;
            state.user.orders.unshift({ id: Math.floor(Math.random()*1000), fuel, mass, cost, date: new Date().toISOString().split('T')[0], status: 'Processing' });

                                            <tr>
                                                <th class="p-8 text-[10px] uppercase font-black text-slate-500">Identity</th>
                                                <th class="p-8 text-[10px] uppercase font-black text-slate-500">Role & Security</th>
                                                <th class="p-8 text-[10px] uppercase font-black text-slate-500">Permissions</th>
                                                <th class="p-8 text-[10px] uppercase font-black text-slate-500 text-right">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-white/5 font-bold">
                                            ${state.users.map(u => `
                                                <tr class="hover:bg-white/[0.02] transition-colors group">
                                                    <td class="p-8">
                                                        <div class="flex items-center gap-4">
                                                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-slate-700 to-slate-800 flex items-center justify-center text-xs text-white border border-white/10 uppercase">${u.name.charAt(0)}</div>
                                                            <div><p class="text-sm font-black text-white">${u.name}</p><p class="text-[10px] text-slate-500 lowercase font-bold">${u.email}</p></div>
                                                        </div>
                                                    </td>
                                                    <td class="p-8">
                                                        <div class="flex flex-col gap-2">
                                                            <span class="inline-block px-3 py-1 rounded-lg ${u.role==='Admin'?'bg-amber-500/10 text-amber-500 border border-amber-500/20':'bg-blue-500/10 text-blue-500 border border-blue-500/20'} text-[9px] font-black uppercase w-fit tracking-widest">${u.role}</span>
                                                            <p class="text-[8px] text-slate-600 uppercase">Auth: Biometric/2FA</p>
                                                        </div>
                                                    </td>
                                                    <td class="p-8">
                                                        <div class="flex gap-2">
                                                            ${['CMS', 'TELE', 'CRUD'].map(p => `<span class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-[8px] text-slate-500 hover:text-blue-400 cursor-help" title="${p}">${p}</span>`).join('')}
                                                        </div>
                                                    </td>
                                                    <td class="p-8 text-right">
                                                        <span class="px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-[9px] uppercase tracking-widest border border-emerald-500/20">● Operational</span>
                                                    </td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ` : ''}
                        ${subTab === 'audit' ? `
                            <div class="space-y-12 fade-in">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-3xl font-black uppercase tracking-tighter text-white">Security <span class="text-blue-500">Audit</span></h3>
                                    <div class="flex gap-3">
                                        <button onclick="showToast('Audit report exported', 'success')" class="bg-white/5 border border-white/10 text-white text-[9px] font-black uppercase px-6 py-3 rounded-2xl hover:bg-white/10">Export PDF</button>
                                        <button onclick="state.auditLogs=[]; renderAdmin(); showToast('Logs Purged', 'success')" class="bg-rose-500/10 border border-rose-500/20 text-rose-400 text-[9px] font-black uppercase px-6 py-3 rounded-2xl hover:bg-rose-500 hover:text-white transition-all">Purge All</button>
                                    </div>
                                </div>

                                <div class="glass-panel p-4 rounded-[32px] border-white/5 flex gap-4 items-center">
                                    <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-slate-500"><i class="fa-solid fa-magnifying-glass"></i></div>
                                    <input id="audit-search" placeholder="Search system movements, user actions or timestamps..." class="bg-transparent flex-1 outline-none text-sm font-bold text-white tracking-tight" oninput="filterAudit(this.value)" />
                                </div>

                                <div class="space-y-4 max-h-[600px] overflow-y-auto pr-4 no-scrollbar" id="audit-list-container">
                                    ${state.auditLogs.map(l => `
                                        <div class="glass-card p-8 rounded-[32px] flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border-white/5 hover:border-blue-500/20 transition-all">
                                            <div class="flex items-center gap-6">
                                                <div class="w-14 h-14 rounded-2xl bg-blue-600/10 border border-blue-600/20 flex items-center justify-center text-blue-400 shadow-inner">
                                                    <i class="fa-solid ${l.action.includes('Approved') ? 'fa-user-check' : l.action.includes('Updated') ? 'fa-pen-to-square' : 'fa-bolt-lightning'}"></i>
                                                </div>
                                                <div class="space-y-1">
                                                    <p class="text-sm font-black text-white uppercase tracking-tight">${l.user}</p>
                                                    <p class="text-xs text-slate-400 font-bold leading-relaxed">${l.action}</p>
                                                </div>
                                            </div>
                                            <div class="text-right">
                                                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">${l.time}</p>
                                                <p class="text-[8px] text-emerald-500 font-bold uppercase mt-1 tracking-widest">Verified Log</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                    ${state.auditLogs.length === 0 ? `
                                        <div class="py-20 text-center space-y-6">
                                            <div class="w-24 h-24 rounded-full bg-white/5 flex items-center justify-center mx-auto text-slate-700 text-4xl"><i class="fa-solid fa-box-open"></i></div>
                                            <p class="text-slate-500 font-black uppercase text-xs tracking-[0.3em]">No movements documented</p>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // 4. HANDLERS
        window.login = function() {
            const email = document.getElementById('login-email').value;
            const user = state.users.find(u => u.email === email);
            if (user) {
                state.user = user;
                showToast(`Welcome back, ${user.name}!`, 'success');
                logAction("Logged in");
                switchTab('home');
                renderAuth();
            } else {
                showToast("User not found", 'error');
            }
        };

        window.logout = function() {
            logAction("Logged out");
            state.user = null;
            showToast("Logged out");
            switchTab('home');
            renderAuth();
        };

        window.registerRequest = function() {
            const name = document.getElementById('reg-name').value;
            const bin = document.getElementById('reg-bin').value;
            const email = document.getElementById('reg-email').value;

            if (!name || !bin || !email) { showToast("All fields required", 'error'); return; }

            state.registrations.push({
                id: Date.now(), name, bin, email, status: 'Pending', time: new Date().toLocaleString()
            });
            showToast("Request submitted for approval", 'success');
            logAction(`New registration request from: ${name}`);
            switchTab('home');
        };

        window.approveUser = function(id) {
            const req = state.registrations.find(r => r.id === id);
            if (req) {
                state.users.push({ id: Date.now(), name: req.name, email: req.email, role: 'User', status: 'Active', bin: req.bin });
                state.registrations = state.registrations.filter(r => r.id !== id);
                showToast(`User Approved: ${req.name}`, 'success');
                logAction(`Approved user request: ${req.name}`);
                renderAdmin();
            }
        };

        window.rejectUser = function(id) {
            const req = state.registrations.find(r => r.id === id);
            if (req) {
                state.registrations = state.registrations.filter(r => r.id !== id);
                showToast(`Request Rejected`, 'error');
                logAction(`Rejected user request: ${req.name}`);
                renderAdmin();
            }
        };

        window.switchAdminTab = function(tab) {
            state.adminTab = tab;
            renderAdmin();
        };

        window.filterAudit = function(val) {
            const list = document.getElementById('audit-list-container');
            const items = list.querySelectorAll('.glass-card');
            const query = val.toLowerCase();
            items.forEach(item => {
                const text = item.innerText.toLowerCase();
                item.style.display = text.includes(query) ? 'flex' : 'none';
            });
        };

        window.openLeaderBio = function(idx) {
            const leader = state.leaders[idx];
            openModal(`
                <div class="space-y-8">
                    <div class="flex items-center gap-6">
                        <div class="w-24 h-24 rounded-3xl bg-blue-600/10 flex items-center justify-center text-4xl text-blue-400 border border-blue-500/20"><i class="fa-solid fa-user-tie"></i></div>
                        <div>
                            <span class="bg-cosmic-gold/10 text-cosmic-gold text-[9px] font-black uppercase px-3 py-1 rounded-full border border-cosmic-gold/20 tracking-widest">${leader.badge}</span>
                            <h3 class="text-3xl font-black text-white mt-2 uppercase tracking-tighter">${leader.name}</h3>
                            <p class="text-xs font-bold text-blue-400 uppercase tracking-widest">${leader.role}</p>
                        </div>
                    </div>
                    <div class="bg-white/5 p-8 rounded-[32px] border border-white/5 space-y-4">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Biography / Exp</p>
                        <p class="text-slate-300 leading-relaxed font-medium">${leader.bio}</p>
                    </div>
                    <div class="flex justify-between items-center pt-4">
                        <div class="flex items-center gap-3 text-emerald-400 text-xs font-bold"><i class="fa-solid fa-envelope"></i><span>${leader.email}</span></div>
                        <button onclick="closeModal()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Close Bio</button>
                    </div>
                </div>
            `);
        };

        window.changeLang = function(l) { state.lang = l; init(); };

        // 5. LIVE MARKET SIMULATION
        setInterval(() => {
            state.prices.spot.forEach(p => {
                const change = (Math.random() - 0.5) * 500;
                p.price += change;
                p.trend = Math.abs(((change / p.price) * 100).toFixed(2));
                p.status = change > 0 ? 'up' : 'down';
            });
            if (state.activeTab === 'home') renderHome();
            if (state.activeTab === 'admin' && state.adminTab === 'prices') renderAdmin();
        }, 5000);

        // INITIALIZE
        init();
    </script>
</body>
</html>
