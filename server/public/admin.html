<!DOCTYPE html>
<html lang="kk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navarro Admin — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070B] text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <header class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
          <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
        </div>
        <div>
          <div class="font-bold">Navarro Admin</div>
          <div class="text-xs text-gray-400">Admin panel</div>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div id="user-info" class="text-right text-sm"></div>
        <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-3 py-2 rounded">Шығу</button>
      </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <section class="col-span-2 bg-slate-900/50 p-6 rounded-2xl">
        <h2 class="font-bold text-xl mb-4">Жүйе бақылауы</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
          <div class="p-4 bg-white/5 rounded-lg">
            <div class="text-2xl font-black" id="stat-users">—</div>
            <div class="text-xs text-gray-400">Пайдаланушылар</div>
          </div>
          <div class="p-4 bg-white/5 rounded-lg">
            <div class="text-2xl font-black" id="stat-orders">—</div>
            <div class="text-xs text-gray-400">Тапсырыстар</div>
          </div>
          <div class="p-4 bg-white/5 rounded-lg">
            <div class="text-2xl font-black" id="stat-pricing">—</div>
            <div class="text-xs text-gray-400">Бағалар</div>
          </div>
        </div>

        <div class="mb-6">
          <h3 class="font-semibold mb-2">Хабарламалар (SSE)</h3>
          <div id="notifications" class="space-y-2 max-h-40 overflow-auto p-2 bg-black/40 rounded"></div>
        </div>

        <div>
          <h3 class="font-semibold mb-2">Аудит журнал (соңғы жазбалар)</h3>
          <div id="audit-list" class="space-y-2 max-h-60 overflow-auto p-2 bg-black/40 rounded"></div>
        </div>
      </section>

      <aside class="bg-slate-900/50 p-6 rounded-2xl">
        <h3 class="font-bold mb-3">Жылдам операциялар</h3>
        <div class="space-y-3">
          <div>
            <label class="text-xs text-gray-400">Жаңа прайс қосу</label>
            <input id="p_product" placeholder="Өнім" class="w-full mt-1 p-2 rounded bg-white/5 text-sm" />
            <input id="p_region" placeholder="Аймақ" class="w-full mt-1 p-2 rounded bg-white/5 text-sm" />
            <input id="p_price" placeholder="Баға" class="w-full mt-1 p-2 rounded bg-white/5 text-sm" />
            <button id="createPricing" class="mt-2 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded">Қосу</button>
          </div>

          <div>
            <label class="text-xs text-gray-400">Экспорт тапсырыстар CSV</label>
            <a href="/api/reports/export/orders.csv" class="block mt-2 bg-white/5 p-2 rounded text-center">Жүктеу</a>
          </div>
        </div>
      </aside>
    </main>

    <footer class="mt-8 text-xs text-gray-500">Navarro Admin — demo</footer>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
